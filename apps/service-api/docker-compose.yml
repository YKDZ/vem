name: vem-service-api

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vem
      POSTGRES_USER: vem
      POSTGRES_PASSWORD: vem_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vem -d vem"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - vem-postgres-data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    command:
      - /bin/sh
      - -c
      - "printf 'listener 1883\\nallow_anonymous true\\n\\nlistener 9001\\nprotocol websockets\\n' > /mosquitto/config/mosquitto.conf && mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t vem/healthcheck -m ok"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  vem-postgres-data:
