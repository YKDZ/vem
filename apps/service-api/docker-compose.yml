name: vem-service-api

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vem
      POSTGRES_USER: vem
      POSTGRES_PASSWORD: vem_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vem -d vem"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - vem-postgres-data:/var/lib/postgresql/data

  mqtt:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-vem_mqtt}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-vem_mqtt_password}
    volumes:
      - vem-mqtt-data:/mosquitto/data
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mosquitto_pub -h localhost -p 1883 -t vem/healthcheck -m ok -u "$${MQTT_USERNAME}" -P "$${MQTT_PASSWORD}"',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  vem-postgres-data:
  vem-mqtt-data:
