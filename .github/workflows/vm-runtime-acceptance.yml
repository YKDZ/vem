name: VM Runtime Acceptance

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Windows runtime testbed operation
        required: true
        default: full
        type: choice
        options: [fast, full, clear_cache]

concurrency:
  group: vem-windows-runtime-testbed
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reconstruct-local-testbed:
    name: Reconstruct Local Testbed
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 30
    outputs:
      mode: ${{ steps.testbed.outputs.mode }}
    env:
      TESTBED_MODE: ${{ inputs.mode || 'full' }}
      VEM_LOCAL_TESTBED_BASELINE_CONTRACT: ${{ vars.VEM_LOCAL_TESTBED_BASELINE_CONTRACT }}
      VEM_LOCAL_TESTBED_HOST_ADDRESS: ${{ vars.VEM_LOCAL_TESTBED_HOST_ADDRESS }}
      VEM_LOCAL_TESTBED_STATE_ROOT: ${{ vars.VEM_LOCAL_TESTBED_STATE_ROOT }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - id: testbed
        name: Reconstruct C Drive And Local Platform
        run: |
          set -euo pipefail
          test -n "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT"
          test -n "$VEM_LOCAL_TESTBED_HOST_ADDRESS"
          test -n "$VEM_LOCAL_TESTBED_STATE_ROOT"
          node scripts/testbed/local-testbed.mjs reconstruct \
            --mode "$TESTBED_MODE" \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --workspace "$GITHUB_WORKSPACE" \
            --state-root "$VEM_LOCAL_TESTBED_STATE_ROOT" \
            --baseline-contract "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT" \
            --host-private-address "$VEM_LOCAL_TESTBED_HOST_ADDRESS" \
            --out "$RUNNER_TEMP/vem-local-testbed-reconstruction.json"
          echo "mode=$TESTBED_MODE" >> "$GITHUB_OUTPUT"

  run-inside-windows:
    name: Build Deploy And Test Inside Windows
    needs: reconstruct-local-testbed
    if: ${{ needs.reconstruct-local-testbed.result == 'success' }}
    runs-on: [self-hosted, Windows, X64, vem-runtime]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Build Deploy Claim And Test
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VISION_GITHUB_TOKEN: ${{ github.token }}
        run: |
          & scripts/testbed/run-local-testbed-guest.ps1 -Mode '${{ needs.reconstruct-local-testbed.outputs.mode }}'
      - name: Collect Compact Fast Sale Evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-fast-route-stress-sale-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\ProgramData\VEM\runtime\testbed\fast-route-stress-sale.json
            C:\ProgramData\VEM\runtime\testbed\fast-route-stress-sale-artifacts\*.png
            C:\ProgramData\VEM\runtime\testbed\fast-route-stress-sale-artifacts\*.log
          if-no-files-found: warn
          retention-days: 7
      - name: Collect Compact Vision Experience Evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-vision-try-on-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\ProgramData\VEM\runtime\testbed\vision-try-on-acceptance.json
            C:\ProgramData\VEM\runtime\testbed\vision-try-on-acceptance-artifacts\*.png
            C:\ProgramData\VEM\runtime\testbed\vision-try-on-acceptance-artifacts\*.log
          if-no-files-found: warn
          retention-days: 7
      - name: Collect Bounded Issue17 Delayed Pickup Evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-issue17-delayed-pickup-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio.json
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\*.json
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\*.log
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\*.wav
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\screenshots\*.png
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\live-production-track\*.json
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\live-production-track\host-default-audio\*.json
            C:\ProgramData\VEM\runtime\testbed\delayed-pickup-native-audio-artifacts\live-production-track\host-default-audio\*.wav
          if-no-files-found: warn
          retention-days: 7
      - name: Collect Full Workflow Track Summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-full-workflow-tracks-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\ProgramData\VEM\runtime\testbed\full-workflow-tracks.json
          if-no-files-found: warn
          retention-days: 7
