name: VM Runtime Acceptance

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run id used for evidence and testbed machine identity
        required: false
        default: ""
      windows_ssh_user:
        description: Windows VM maintenance SSH user
        required: false
        default: YKDZ

concurrency:
  group: vm-runtime-acceptance
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  vm-runtime-acceptance:
    name: Restore VM And Run Acceptance
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 120
    environment: vem-maintenance-testbed
    permissions:
      actions: read
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    env:
      RUN_ID: ${{ inputs.run_id || format('RUN-{0}', github.run_number) }}
      WINDOWS_SSH_USER: ${{ inputs.windows_ssh_user }}
      DATABASE_URL: postgresql://vem:vem_password@localhost:55432/vem_runtime
      EPHEMERAL_API_BASE_URL: http://127.0.0.1:26849/api
      EPHEMERAL_MQTT_URL: mqtt://127.0.0.1:18883
      PAYMENT_MOCK_ENABLED: "true"
      MAINTENANCE_CONTROL_PLANE_URL: ${{ vars.VEM_MAINTENANCE_CONTROL_PLANE_URL }}
      MAINTENANCE_ALLOW_INSECURE_HTTP: ${{ vars.VEM_MAINTENANCE_ALLOW_INSECURE_HTTP }}
      MAINTENANCE_RUNNER_PEER_ID: ${{ vars.VEM_MAINTENANCE_RUNNER_PEER_ID }}
      MAINTENANCE_TARGET_MACHINE_ID: ${{ vars.VEM_MAINTENANCE_TARGET_MACHINE_ID }}
      VEM_VM_HOST_TARGET_ID: ${{ vars.VEM_VM_HOST_TARGET_ID }}
      VEM_VM_HOST_APPROVED_BASE_ID: ${{ vars.VEM_VM_HOST_APPROVED_BASE_ID }}
      VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY }}
      VEM_VM_HOST_EXPECTED_ADAPTER_SHA256: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_SHA256 }}
      # Factory/ISO integration must retain this daemon-selected stable endpoint contract.
      VEM_VM_AUDIO_ENDPOINT_ID: ${{ vars.VEM_VM_AUDIO_ENDPOINT_ID }}
    steps:
      - name: Checkout Trusted Commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Guard Protected Maintenance Trust Boundary
        env:
          EXPECTED_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/vm-runtime-acceptance.yml@refs/heads/main
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
          RUNNER_LABELS_JSON: ${{ toJSON(runner.labels) }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$OBSERVED_WORKFLOW_REF" = "$EXPECTED_WORKFLOW_REF"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          node scripts/testbed/validate-vm-runtime-acceptance-inputs.mjs >> "$GITHUB_ENV"
          node -e '
            const labels = JSON.parse(process.env.RUNNER_LABELS_JSON);
            for (const required of ["self-hosted", "Linux", "X64", "vem-runtime"]) {
              if (!labels.includes(required)) throw new Error(`missing trusted runner label: ${required}`);
            }
          '

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Host Adapter Conformance
        run: |
          set -euo pipefail
          test -n "${VEM_VM_HOST_ADAPTER:-}"
          test -x "$VEM_VM_HOST_ADAPTER"
          test -n "${VEM_VM_HOST_TARGET_ID:-}"
          test -n "${VEM_VM_HOST_APPROVED_BASE_ID:-}"
          test -n "${VEM_VM_HOST_FACTORY_ISO_ID:-}"
          test -n "${VEM_VM_HOST_FACTORY_PERSONALIZATION_MEDIA_ID:-}"
          observed_adapter_sha256="$(sha256sum "$VEM_VM_HOST_ADAPTER" | awk '{print $1}')"
          test "$observed_adapter_sha256" = "$VEM_VM_HOST_EXPECTED_ADAPTER_SHA256"
          node scripts/testbed/vm-host-adapter-conformance.mjs \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-conformance.json"

      - name: Exchange OIDC And Create Maintenance Session
        run: |
          set -euo pipefail
          umask 077
          MAINTENANCE_SSH_DIR="$RUNNER_TEMP/vem-maintenance-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          export MAINTENANCE_SSH_DIR
          printf 'MAINTENANCE_SSH_DIR=%s\n' "$MAINTENANCE_SSH_DIR" >> "$GITHUB_ENV"
          oidc_response_path="$RUNNER_TEMP/maintenance-oidc-response.json"
          oidc_token_path="$RUNNER_TEMP/maintenance-oidc-token.jwt"
          exchange_request_path="$RUNNER_TEMP/maintenance-exchange-request.json"
          exchange_response_path="$RUNNER_TEMP/maintenance-exchange-response.json"
          automation_token_path="$RUNNER_TEMP/automation-token.jwt"
          session_create_path="$RUNNER_TEMP/maintenance-session-create.json"
          session_verify_path="$RUNNER_TEMP/maintenance-session-verify.json"
          rm -f \
            "$oidc_response_path" \
            "$oidc_token_path" \
            "$exchange_request_path" \
            "$exchange_response_path" \
            "$automation_token_path" \
            "$session_create_path" \
            "$session_verify_path"

          {
            printf 'url = "%s&audience=vem-maintenance"\n' "$ACTIONS_ID_TOKEN_REQUEST_URL"
            printf 'header = "Authorization: Bearer %s"\n' "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          } | curl --globoff --config - \
            --fail-with-body \
            --silent \
            --show-error \
            --output "$oidc_response_path"
          chmod 600 "$oidc_response_path"
          node - "$oidc_response_path" "$oidc_token_path" <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (typeof payload.value !== "string" || payload.value.split(".").length !== 3) {
            throw new Error("GitHub OIDC endpoint returned no JWT value");
          }
          fs.writeFileSync(process.argv[3], payload.value, {
            encoding: "utf8",
            flag: "wx",
            mode: 0o600,
          });
          NODE
          id_token="$(<"$oidc_token_path")"
          printf '::add-mask::%s\n' "$id_token"
          unset id_token

          node - "$oidc_token_path" "$exchange_request_path" <<'NODE'
          const fs = require("node:fs");
          const body = {
            idToken: fs.readFileSync(process.argv[2], "utf8"),
            runId: process.env.GITHUB_RUN_ID,
            runAttempt: process.env.GITHUB_RUN_ATTEMPT,
            sha: process.env.GITHUB_SHA,
            sourcePeerId: process.env.MAINTENANCE_RUNNER_PEER_ID,
            targetMachineId: process.env.MAINTENANCE_TARGET_MACHINE_ID,
            reason: "Run VM Runtime Acceptance",
          };
          fs.writeFileSync(process.argv[3], JSON.stringify(body), {
            encoding: "utf8",
            flag: "wx",
            mode: 0o600,
          });
          NODE
          curl --globoff --fail-with-body \
            --silent \
            --show-error \
            --header 'Content-Type: application/json' \
            --data-binary @"$exchange_request_path" \
            --output "$exchange_response_path" \
            "$MAINTENANCE_CONTROL_PLANE_CANONICAL_URL/maintenance-automation/exchange"
          chmod 600 "$exchange_response_path"
          node - "$exchange_response_path" "$automation_token_path" <<'NODE'
          const fs = require("node:fs");
          const response = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const exchange = response.data;
          if (
            typeof exchange?.accessToken !== "string" ||
            exchange.accessToken.split(".").length !== 3 ||
            exchange.actor?.runId !== process.env.GITHUB_RUN_ID ||
            exchange.actor?.runAttempt !== process.env.GITHUB_RUN_ATTEMPT ||
            exchange.sessionTtlMinutes !== 150
          ) {
            throw new Error("maintenance automation exchange response is invalid");
          }
          const remainingSeconds = (Date.parse(exchange.expiresAt) - Date.now()) / 1000;
          if (remainingSeconds < 120 * 60 || remainingSeconds > 125 * 60 + 60) {
            throw new Error("maintenance automation token does not cover the cleanup window");
          }
          fs.writeFileSync(process.argv[3], exchange.accessToken, {
            encoding: "utf8",
            flag: "wx",
            mode: 0o600,
          });
          NODE
          automation_token="$(<"$automation_token_path")"
          printf '::add-mask::%s\n' "$automation_token"
          unset automation_token
          rm -f \
            "$oidc_response_path" \
            "$oidc_token_path" \
            "$exchange_request_path" \
            "$exchange_response_path"

          automation_token="$(<"$automation_token_path")"
          {
            printf 'header = "Authorization: Bearer %s"\n' "$automation_token"
            printf 'request = "POST"\n'
          } | curl --globoff --config - \
            --fail-with-body \
            --silent \
            --show-error \
            --output "$session_create_path" \
            "$MAINTENANCE_CONTROL_PLANE_CANONICAL_URL/maintenance-automation/session"
          unset automation_token
          chmod 600 "$session_create_path"

          automation_token="$(<"$automation_token_path")"
          {
            printf 'header = "Authorization: Bearer %s"\n' "$automation_token"
            printf 'request = "GET"\n'
          } | curl --globoff --config - \
            --fail-with-body \
            --silent \
            --show-error \
            --output "$session_verify_path" \
            "$MAINTENANCE_CONTROL_PLANE_CANONICAL_URL/maintenance-automation/session"
          unset automation_token
          chmod 600 "$session_verify_path"
          node - "$session_create_path" "$session_verify_path" <<'NODE'
          const fs = require("node:fs");
          const created = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data;
          const verified = JSON.parse(fs.readFileSync(process.argv[3], "utf8")).data;
          const ttlMinutes = (Date.parse(created?.expiresAt) - Date.parse(created?.issuedAt)) / 60000;
          if (
            !created?.id ||
            created.kind !== "ci" ||
            created.status !== "active" ||
            created.sourcePeer?.id !== process.env.MAINTENANCE_RUNNER_PEER_ID ||
            created.targetMachine?.id !== process.env.MAINTENANCE_TARGET_MACHINE_ID ||
            created.relayPeer?.role !== "relay" ||
            typeof created.relayPeer?.publicKey !== "string" ||
            typeof created.relayPeer?.tunnelAddress !== "string" ||
            ttlMinutes !== 150 ||
            verified?.id !== created.id ||
            verified.status !== "active"
          ) {
            throw new Error("maintenance session create/get verification failed");
          }
          const relaySession = {
            sessionId: created.id,
            relayPeer: created.relayPeer,
            sourceTunnelAddress: created.sourcePeer.tunnelAddress,
            endpointTunnelAddress: created.targetMachine.tunnelAddress,
          };
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `VEM_MAINTENANCE_RELAY_SESSION_JSON=${JSON.stringify(relaySession)}\n`,
            { mode: 0o600 },
          );
          NODE
          rm -rf -- "$MAINTENANCE_SSH_DIR"
          install -d -m 0700 "$MAINTENANCE_SSH_DIR"
          ssh_key_path="$MAINTENANCE_SSH_DIR/id_ed25519"
          ssh_public_key_path="$MAINTENANCE_SSH_DIR/id_ed25519.pub"
          ssh_certificate_path="$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub"
          ssh_request_path="$MAINTENANCE_SSH_DIR/certificate-request.json"
          ssh_response_path="$MAINTENANCE_SSH_DIR/certificate-response.json"
          ssh-keygen -q -t ed25519 -N '' -f "$ssh_key_path"
          chmod 600 "$ssh_key_path" "$ssh_public_key_path"
          node - "$ssh_public_key_path" "$ssh_request_path" <<'NODE'
          const fs = require("node:fs");
          const publicKey = fs.readFileSync(process.argv[2], "utf8").trim().split(/\s+/).slice(0, 2).join(" ");
          fs.writeFileSync(process.argv[3], JSON.stringify({ publicKey, requestId: crypto.randomUUID() }), { mode: 0o600 });
          NODE
          automation_token="$(<"$automation_token_path")"
          { printf 'header = "Authorization: Bearer %s"\n' "$automation_token"; printf 'request = "POST"\n'; } | curl --globoff --config - --fail-with-body --silent --show-error --header 'Content-Type: application/json' --data-binary @"$ssh_request_path" --output "$ssh_response_path" "$MAINTENANCE_CONTROL_PLANE_CANONICAL_URL/maintenance-automation/session/ssh-certificate"
          unset automation_token
          node - "$ssh_response_path" "$ssh_certificate_path" <<'NODE'
          const fs = require("node:fs");
          const certificate = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data?.certificate;
          if (typeof certificate !== "string" || !certificate.startsWith("ssh-ed25519-cert-v01@openssh.com ")) throw new Error("maintenance SSH certificate response is invalid");
          fs.writeFileSync(process.argv[3], `${certificate}\n`, { mode: 0o600 });
          NODE
          chmod 600 "$ssh_certificate_path"
          rm -f "$ssh_request_path" "$ssh_response_path"
          rm -f "$session_create_path" "$session_verify_path"

      - name: Start Runner Maintenance Relay WireGuard Peer
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          test -n "${VEM_MAINTENANCE_RELAY_INTERFACE:-}"
          test -n "${VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP:-}"
          case "$VEM_MAINTENANCE_RELAY_INTERFACE" in *[!A-Za-z0-9_.-]*|'') exit 1;; esac
          installed_config_path="/etc/wireguard/${VEM_MAINTENANCE_RELAY_INTERFACE}.conf"
          record_config_metadata() {
            label="$1"
            path="$2"
            if [ -f "$path" ]; then
              permissions="$(stat -c '%a' "$path" 2>/dev/null || stat -f '%Lp' "$path" 2>/dev/null || echo unknown)"
              hash="$(sha256sum "$path" | awk '{print $1}')"
              echo "${label}.exists=true"
              echo "${label}.permissions=${permissions}"
              echo "${label}.sha256=${hash}"
            else
              echo "${label}.exists=false"
            fi
          }
          {
            echo "Controlled Maintenance Ingress: WireGuard Maintenance Relay"
            echo "interface=${VEM_MAINTENANCE_RELAY_INTERFACE}"
            echo "runnerPeerIp=runner-service-configured"
            echo "runnerWireGuardConfig=root-owned runner WireGuard config"
            echo "vmRelayBootstrapContract=preconfigured-base-image"
            echo "repositoryConfiguresVmRelay=false"
          } > "$diagnostics"

          command -v wg-quick >/dev/null || {
            echo "::error::wg-quick is required on the self-hosted VM runner for Maintenance Relay startup."
            echo "wg-quick=missing" >> "$diagnostics"
            exit 1
          }
          command -v wg >/dev/null || {
            echo "::error::wg is required on the self-hosted VM runner for Maintenance Relay diagnostics."
            echo "wg=missing" >> "$diagnostics"
            exit 1
          }

          if [ ! -f "$installed_config_path" ] || [ "$(stat -c '%U:%G:%a' "$installed_config_path")" != "root:root:600" ]; then
            echo "::error::Missing or unsafe root-owned runner WireGuard config."
            echo "runnerWireGuardConfig=missing" >> "$diagnostics"
            exit 1
          fi

          {
            record_config_metadata "runnerWireGuardConfig" "$installed_config_path"
          } >> "$diagnostics"

          sudo wg-quick down "$VEM_MAINTENANCE_RELAY_INTERFACE" >/dev/null 2>&1 || true
          sudo wg-quick up "$VEM_MAINTENANCE_RELAY_INTERFACE"
          {
            echo "wgShowSummary.interface=${VEM_MAINTENANCE_RELAY_INTERFACE}"
            echo "wgShowSummary.latestHandshakes<<EOF"
            sudo wg show "$VEM_MAINTENANCE_RELAY_INTERFACE" latest-handshakes
            echo "EOF"
            echo "wgShowSummary.endpoints<<EOF"
            sudo wg show "$VEM_MAINTENANCE_RELAY_INTERFACE" endpoints
            echo "EOF"
            echo "wgShowSummary.allowedIps<<EOF"
            sudo wg show "$VEM_MAINTENANCE_RELAY_INTERFACE" allowed-ips
            echo "EOF"
          } >> "$diagnostics"

      - name: Preflight Maintenance Relay Bootstrap Contract
        run: |
          set -euo pipefail
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          {
            echo "preflight.vmRelayBootstrapContract=preconfigured-base-image"
            echo "preflight.vmWireGuardPeer=must-already-be-configured-and-running-in-base-image"
            echo "preflight.windowsControlledMaintenanceIngress=host-configured-runner-peer-only"
            echo "preflight.repositoryConfiguresVmRelay=false"
          } >> "$diagnostics"

      - name: Start Ephemeral Postgres And MQTT
        run: |
          set -euo pipefail
          postgres_name="vem-runtime-postgres-${GITHUB_RUN_ID}"
          mqtt_name="vem-runtime-mqtt-${GITHUB_RUN_ID}"
          docker rm -f "$postgres_name" "$mqtt_name" >/dev/null 2>&1 || true
          docker run -d --name "$postgres_name" \
            -e POSTGRES_DB=vem_runtime \
            -e POSTGRES_USER=vem \
            -e POSTGRES_PASSWORD=vem_password \
            -p 55432:5432 \
            postgres:16
          mkdir -p "$RUNNER_TEMP/vem-runtime-mosquitto"
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf"
          docker run -d --name "$mqtt_name" \
            -p 18883:1883 \
            -v "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          wait_for_tcp() {
            host="$1"
            port="$2"
            timeout 2 bash -c "</dev/tcp/${host}/${port}" >/dev/null 2>&1
          }
          postgres_ready=false
          for attempt in $(seq 1 120); do
            postgres_status="$(docker inspect -f '{{.State.Status}}' "$postgres_name" 2>/dev/null || true)"
            if [ "$postgres_status" = "exited" ] || [ "$postgres_status" = "dead" ]; then
              echo "::error::Postgres container exited before readiness."
              docker ps -a --filter "name=$postgres_name"
              docker logs "$postgres_name"
              exit 1
            fi
            if wait_for_tcp 127.0.0.1 55432; then
              postgres_ready=true
              break
            fi
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "Waiting for Postgres readiness: attempt=${attempt} status=${postgres_status:-unknown}"
            fi
            sleep 2
          done
          if [ "$postgres_ready" != "true" ]; then
            echo "::error::Postgres did not become ready."
            docker ps -a --filter "name=$postgres_name"
            docker logs "$postgres_name"
            exit 1
          fi
          sleep 2
          mqtt_ready=false
          for attempt in $(seq 1 60); do
            mqtt_status="$(docker inspect -f '{{.State.Status}}' "$mqtt_name" 2>/dev/null || true)"
            if [ "$mqtt_status" = "exited" ] || [ "$mqtt_status" = "dead" ]; then
              echo "::error::MQTT container exited before readiness."
              docker ps -a --filter "name=$mqtt_name"
              docker logs "$mqtt_name"
              exit 1
            fi
            if wait_for_tcp 127.0.0.1 18883; then
              mqtt_ready=true
              break
            fi
            sleep 1
          done
          if [ "$mqtt_ready" != "true" ]; then
            echo "::error::MQTT did not become ready."
            docker ps -a --filter "name=$mqtt_name"
            docker logs "$mqtt_name"
            exit 1
          fi

      - name: Build And Start Service API
        run: |
          set -euo pipefail
          pnpm turbo build --filter @vem/shared --filter @vem/db --filter service-api
          pnpm --filter @vem/db migrate
          node apps/service-api/dist/main.js > service-api.log 2>&1 &
          echo "$!" > service-api.pid
          for attempt in $(seq 1 60); do
            if curl --globoff -fsS http://127.0.0.1:26849/api/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat service-api.log
          exit 1
        env:
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-chars!!
          MACHINE_JWT_SECRET: ci-machine-jwt-secret-min-32-chars-long!
          MACHINE_CREDENTIAL_ENCRYPTION_KEY: ci-machine-cred-enc-key-32-chars!!
          MQTT_URL: ${{ env.EPHEMERAL_MQTT_URL }}
          PAYMENT_WEBHOOK_BASE_URL: http://127.0.0.1:26849
          BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          SERVICE_PORT: "26849"

      - name: Restore Windows Runtime VM Through Host Adapter
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          test -n "${VEM_VM_HOST_ADAPTER:-}"
          test -n "$VEM_VM_HOST_TARGET_ID"
          test -n "$VEM_VM_HOST_APPROVED_BASE_ID"
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation restore-approved-base \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --maintenance-relay-session-json "$VEM_MAINTENANCE_RELAY_SESSION_JSON" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json"
          node - "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json" <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (report.adapter?.identity !== process.env.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY) {
            throw new Error(`VM Host Adapter identity mismatch: ${report.adapter?.identity ?? "missing"}`);
          }
          NODE

      - name: Consume Discovered Guest Maintenance Endpoint
        run: |
          set -euo pipefail
          report="artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json"
          node - "$report" >> "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const endpoint = report.guest?.maintenanceEndpoint;
          const session = JSON.parse(process.env.VEM_MAINTENANCE_RELAY_SESSION_JSON);
          const proof = endpoint?.relayProof;
          if (
            endpoint?.protocol !== "ssh" ||
            endpoint.reachability !== "discovered" ||
            typeof endpoint.host !== "string" ||
            !Number.isInteger(endpoint.port) ||
            endpoint.host !== session.endpointTunnelAddress ||
            JSON.stringify({
              sessionId: proof?.sessionId,
              relayPeer: proof?.relayPeer,
              sourceTunnelAddress: proof?.sourceTunnelAddress,
              endpointTunnelAddress: proof?.endpointTunnelAddress,
            }) !== JSON.stringify(session) ||
            proof?.endpointAllowedIp !== `${endpoint.host}/32` ||
            proof?.endpointRoute !== `${endpoint.host}/32` ||
            !Number.isInteger(proof?.handshakeUnixSeconds) ||
            proof.handshakeUnixSeconds < 1
          ) {
            throw new Error("VM Host Adapter did not provide the maintenance-session Relay-bound guest endpoint");
          }
          process.stdout.write(`VM_GUEST_MAINTENANCE_ENDPOINT_JSON=${JSON.stringify(endpoint)}\n`);
          NODE

      - name: Initialize Run-Scoped VM Guest SSH Trust
        run: |
          set -euo pipefail
          test -n "${MAINTENANCE_SSH_DIR:-}"
          install -d -m 0700 "$MAINTENANCE_SSH_DIR"
          known_hosts_path="$MAINTENANCE_SSH_DIR/known_hosts"
          : > "$known_hosts_path"
          chmod 600 "$known_hosts_path"
          host_key_alias="vem-runtime-$(printf '%s' "$RUN_ID" | tr '[:upper:]' '[:lower:]')"
          printf 'VM_RUNTIME_SSH_KNOWN_HOSTS_PATH=%s\n' "$known_hosts_path" >> "$GITHUB_ENV"
          printf 'VM_RUNTIME_SSH_HOST_KEY_ALIAS=%s\n' "$host_key_alias" >> "$GITHUB_ENV"

      - name: Prove Relay WireGuard SSH Data Plane
        run: |
          set -euo pipefail
          artifact_dir="artifacts/vm-runtime-acceptance/${RUN_ID}"
          mkdir -p "$artifact_dir"
          endpoint_host="$(node -e 'process.stdout.write(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).host)')"
          endpoint_port="$(node -e 'process.stdout.write(String(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).port))')"
          session_json="$VEM_MAINTENANCE_RELAY_SESSION_JSON"
          route_json="$(ip -j route get "$endpoint_host" from "$VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP")"
          allowed_ips="$(sudo wg show "$VEM_MAINTENANCE_RELAY_INTERFACE" allowed-ips)"
          node - "$route_json" "$session_json" "$VM_GUEST_MAINTENANCE_ENDPOINT_JSON" <<'NODE'
          const [routeJson, sessionJson, endpointJson] = process.argv.slice(2);
          const routes = JSON.parse(routeJson);
          const session = JSON.parse(sessionJson);
          const endpoint = JSON.parse(endpointJson);
          const route = routes[0];
          if (
            !route ||
            route.dev !== process.env.VEM_MAINTENANCE_RELAY_INTERFACE ||
            endpoint.host !== session.endpointTunnelAddress ||
            process.env.VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP !== session.sourceTunnelAddress
          ) {
            throw new Error("Relay WireGuard SSH data-plane route is not bound to the maintenance session endpoint and source address");
          }
          NODE
          node - "$allowed_ips" "$session_json" <<'NODE'
          const [lines, sessionJson] = process.argv.slice(2);
          const session = JSON.parse(sessionJson);
          const selected = lines.trim().split(/\r?\n/).map((line) => line.trim().split(/\s+/)).find(
            ([peer]) => peer === session.relayPeer.publicKey,
          );
          if (!selected || !selected.slice(1).join(" ").split(",").includes(`${session.endpointTunnelAddress}/32`)) {
            throw new Error("maintenance-session Relay peer does not own the endpoint /32 AllowedIPs route");
          }
          NODE
          ssh_common=(
            -b "$VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP"
            -p "$endpoint_port"
            -i "$MAINTENANCE_SSH_DIR/id_ed25519"
            -o "CertificateFile=$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub"
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH"
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS"
            -o StrictHostKeyChecking=accept-new
            -o IdentitiesOnly=yes
            -o IdentityAgent=none
            -o BatchMode=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o PreferredAuthentications=publickey
            -o ProxyCommand=none
          )
          target="${WINDOWS_SSH_USER}@${endpoint_host}"
          proof_started_at="$(date +%s)"
          ssh "${ssh_common[@]}" "$target" "powershell.exe -NoProfile -NonInteractive -Command \"whoami | Out-Null\"" >/dev/null
          handshake_observed=false
          for attempt in $(seq 1 15); do
            handshakes="$(sudo wg show "$VEM_MAINTENANCE_RELAY_INTERFACE" latest-handshakes)"
            if node - "$handshakes" "$proof_started_at" "$session_json" <<'NODE'
          const [lines, startedAt, sessionJson] = process.argv.slice(2);
          const session = JSON.parse(sessionJson);
          const relayHandshake = lines
            .trim()
            .split(/\r?\n/)
            .map((line) => line.trim().split(/\s+/))
            .find(([peer]) => peer === session.relayPeer.publicKey);
          if (
            !relayHandshake ||
            !Number.isInteger(Number(relayHandshake.at(-1))) ||
            Number(relayHandshake.at(-1)) < Number(startedAt) - 5
          ) {
            process.exit(1);
          }
          NODE
            then
              handshake_observed=true
              break
            fi
            sleep 2
          done
          if [ "$handshake_observed" != true ]; then
            echo "Relay WireGuard SSH data-plane proof failed: no fresh Relay handshake after certificate SSH." >&2
            exit 1
          fi
          node - "$artifact_dir/wireguard-ssh-data-plane.json" <<'NODE'
          const fs = require("node:fs");
          fs.writeFileSync(process.argv[2], `${JSON.stringify({
            schemaVersion: "vem-wireguard-ssh-data-plane/v1",
            interface: process.env.VEM_MAINTENANCE_RELAY_INTERFACE,
            sessionId: JSON.parse(process.env.VEM_MAINTENANCE_RELAY_SESSION_JSON).sessionId,
            relayPeerPublicKey: JSON.parse(process.env.VEM_MAINTENANCE_RELAY_SESSION_JSON).relayPeer.publicKey,
            sourceAddress: process.env.VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP,
            endpointAllowedIp: `${endpoint_host}/32`,
            endpointRoute: `${endpoint_host}/32`,
            routeBoundToWireGuard: true,
            certificateSshAuthenticated: true,
            freshRelayHandshakeObserved: true,
          })}\n`, { mode: 0o600 });
          NODE

      - name: Prepare Protected Simulated Scanner Code
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          scanner_code_file="$RUNNER_TEMP/vem-scanner-code-$RUN_ID"
          node -e 'const { randomInt } = require("node:crypto"); let value = "28"; while (value.length < 18) value += randomInt(10); process.stdout.write(value)' > "$scanner_code_file"
          chmod 600 "$scanner_code_file"
          echo "VEM_VM_HOST_SCANNER_CODE_FILE=$scanner_code_file" >> "$GITHUB_ENV"

      - name: Run VM Runtime Acceptance
        run: |
          set -euo pipefail
          test -n "${VEM_VM_HOST_SCANNER_CODE_FILE:-}"
          test -f "$VEM_VM_HOST_SCANNER_CODE_FILE"
          test "$(stat -c '%a' "$VEM_VM_HOST_SCANNER_CODE_FILE")" = "600"
          node scripts/testbed/win10-vem-e2e.mjs \
            --mode vm-runtime-acceptance \
            --run-id "$RUN_ID" \
            --platform-target "self-hosted-${RUN_ID}" \
            --ephemeral-database-url "$DATABASE_URL" \
            --ephemeral-api-base-url "$EPHEMERAL_API_BASE_URL" \
            --ephemeral-mqtt-url "$EPHEMERAL_MQTT_URL" \
            --factory-guest-endpoint-json "$VM_GUEST_MAINTENANCE_ENDPOINT_JSON" \
            --expected-testbed-user "$WINDOWS_SSH_USER" \
            --ssh-known-hosts-path "$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH" \
            --ssh-host-key-alias "$VM_RUNTIME_SSH_HOST_KEY_ALIAS" \
            --maintenance-ingress-source-allowlist "$VEM_MAINTENANCE_RELAY_RUNNER_PEER_IP" \
            --identity "$MAINTENANCE_SSH_DIR/id_ed25519" \
            --certificate "$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub" \
            --scanner-code-file "$VEM_VM_HOST_SCANNER_CODE_FILE" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json"

      - name: Accept Windows LocalSystem WireGuard Claim To Handshake
        if: success()
        run: |
          set -euo pipefail
          artifact_dir="artifacts/vm-runtime-acceptance/${RUN_ID}"
          mkdir -p "$artifact_dir"
          endpoint_host="$(node -e 'process.stdout.write(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).host)' )"
          endpoint_port="$(node -e 'process.stdout.write(String(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).port))' )"
          remote_script='C:/Windows/Temp/vem-wireguard-localsystem-acceptance.ps1'
          remote_evidence='C:/ProgramData/VEM/evidence/wireguard-localsystem-acceptance.json'
          ssh_common=(
            -p "$endpoint_port"
            -i "$MAINTENANCE_SSH_DIR/id_ed25519"
            -o "CertificateFile=$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub"
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH"
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS"
            -o StrictHostKeyChecking=yes
          )
          target="${WINDOWS_SSH_USER}@${endpoint_host}"
          ssh "${ssh_common[@]}" "$target" "powershell.exe -NoProfile -NonInteractive -Command \"Remove-Item -LiteralPath 'C:\\ProgramData\\VEM\\evidence\\wireguard-localsystem-acceptance.json' -Force -ErrorAction SilentlyContinue\""
          scp -P "$endpoint_port" \
            -i "$MAINTENANCE_SSH_DIR/id_ed25519" \
            -o "CertificateFile=$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub" \
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH" \
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS" \
            -o StrictHostKeyChecking=yes \
            scripts/windows/test-wireguard-localsystem-acceptance.ps1 \
            "${target}:${remote_script}"
          set +e
          ssh "${ssh_common[@]}" "$target" "powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File C:\\Windows\\Temp\\vem-wireguard-localsystem-acceptance.ps1"
          acceptance_status="$?"
          scp -P "$endpoint_port" \
            -i "$MAINTENANCE_SSH_DIR/id_ed25519" \
            -o "CertificateFile=$MAINTENANCE_SSH_DIR/id_ed25519-cert.pub" \
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH" \
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS" \
            -o StrictHostKeyChecking=yes \
            "${target}:${remote_evidence}" \
            "$artifact_dir/wireguard-localsystem-acceptance.json"
          copy_status="$?"
          set -e
          test "$copy_status" -eq 0
          node - "$artifact_dir/wireguard-localsystem-acceptance.json" "$acceptance_status" <<'NODE'
          const fs = require("node:fs");
          const [path, sshStatus] = process.argv.slice(2);
          const evidence = JSON.parse(fs.readFileSync(path, "utf8"));
          if (
            evidence.schemaVersion !== "vem-wireguard-localsystem-acceptance/v2" ||
            evidence.ok !== true ||
            evidence.daemonService?.localSystem !== true ||
            evidence.tunnelService?.localSystem !== true ||
            evidence.configAclProtected !== true ||
            evidence.daemonRestartRead !== true ||
            evidence.tunnelConnectedAfterRestart !== true ||
            evidence.claimRetainedAfterRestart !== true ||
            evidence.configReplayIdempotent !== true ||
            typeof evidence.firstHandshakeVerifiedAt !== "string" ||
            evidence.firstHandshakeVerifiedAt.length < 1 ||
            !Number.isInteger(evidence.handshakeUnixSeconds) ||
            evidence.handshakeUnixSeconds < 1
          ) throw new Error("Windows LocalSystem WireGuard acceptance evidence is incomplete");
          if (Number(sshStatus) !== 0) console.log("wireguard-acceptance-ssh-disconnected-during-tunnel-restart=true");
          NODE

      - name: Remove Protected Simulated Scanner Code
        if: always()
        shell: bash
        run: rm -f -- "${VEM_VM_HOST_SCANNER_CODE_FILE:-}"

      - name: Bind Active Kiosk Session For Native Audio Capture
        if: success()
        run: |
          set -euo pipefail
          report="artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json"
          node - "$report" >> "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const value = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const runtime = value.runtimeAcceptanceReport;
          const kiosk = runtime.kioskRuntime;
          if (
            value.ok !== true ||
            runtime.result?.runtimeReady?.status !== "passed" ||
            kiosk?.sessionUser !== "VEMKiosk" ||
            !Number.isInteger(kiosk.sessionId) ||
            kiosk.sessionId < 1 ||
            typeof kiosk.url !== "string" ||
            kiosk.url !== "http://tauri.localhost/#/" ||
            typeof kiosk.cdpTargetId !== "string" ||
            !/^[A-Za-z0-9._:-]{8,256}$/.test(kiosk.cdpTargetId) ||
            !Number.isInteger(kiosk.processId) ||
            !Number.isInteger(kiosk.cdpListenerProcessId) ||
            kiosk.cdpListenerSessionId !== kiosk.sessionId ||
            kiosk.cdpMachineAncestorProcessId !== kiosk.processId
          ) throw new Error("runtime acceptance did not observe an active VEMKiosk session");
          process.stdout.write(`VEM_ACTIVE_KIOSK_SESSION_USER=${kiosk.sessionUser}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_SESSION_ID=${kiosk.sessionId}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_TAURI_ROUTE=${kiosk.url}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_CDP_TARGET_ID=${kiosk.cdpTargetId}\n`);
          NODE

      - name: Capture Windows Display Evidence Through Host Adapter
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation capture-display \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --active-kiosk-session-user "$VEM_ACTIVE_KIOSK_SESSION_USER" \
            --active-kiosk-session-id "$VEM_ACTIVE_KIOSK_SESSION_ID" \
            --tauri-route "$VEM_ACTIVE_KIOSK_TAURI_ROUTE" \
            --cdp-target-id "$VEM_ACTIVE_KIOSK_CDP_TARGET_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-display-capture-report.json"

      - name: Capture Windows Default Audio Evidence Through Host Adapter
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation capture-default-audio \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --active-kiosk-session-user "$VEM_ACTIVE_KIOSK_SESSION_USER" \
            --active-kiosk-session-id "$VEM_ACTIVE_KIOSK_SESSION_ID" \
            --selected-audio-endpoint-id "$VEM_VM_AUDIO_ENDPOINT_ID" \
            --daemon-calibration-response-out "artifacts/vm-runtime-acceptance/${RUN_ID}/daemon-audio-calibration-response.json" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-audio-capture-report.json"

      - name: Verify Windows Native Audio Evidence
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/windows-native-audio-evidence.mjs \
            --run-id "$RUN_ID" \
            --runtime-report "artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json" \
            --adapter-report "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-audio-capture-report.json" \
            --daemon-calibration-response "artifacts/vm-runtime-acceptance/${RUN_ID}/daemon-audio-calibration-response.json" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/windows-native-audio-evidence.json"

      - name: Cleanup VM Host Adapter Overlay
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation cleanup \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-cleanup-report.json"

      - name: Cleanup Ephemeral Services
        if: always()
        run: |
          set +e
          cleanup_status=0
          ssh_directory="${MAINTENANCE_SSH_DIR:-$RUNNER_TEMP/vem-maintenance-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          automation_token_path="$RUNNER_TEMP/automation-token.jwt"
          revoke_response_path="$RUNNER_TEMP/maintenance-session-revoke.json"
          if [ -s "$automation_token_path" ]; then
            automation_token="$(<"$automation_token_path")"
            {
              printf 'header = "Authorization: Bearer %s"\n' "$automation_token"
              printf 'request = "POST"\n'
            } | curl --globoff --config - \
              --fail-with-body \
              --silent \
              --show-error \
              --output "$revoke_response_path" \
              "$MAINTENANCE_CONTROL_PLANE_CANONICAL_URL/maintenance-automation/session/revoke"
            revoke_status="$?"
            unset automation_token
            if [ "$revoke_status" -eq 0 ]; then
              node -e '
                const fs = require("node:fs");
                const revoked = JSON.parse(fs.readFileSync(process.argv[1], "utf8")).data;
                if (!revoked?.id || revoked.status !== "revoked") {
                  throw new Error("maintenance session revoke response is invalid");
                }
              ' "$revoke_response_path"
              revoke_status="$?"
            fi
            if [ "$revoke_status" -ne 0 ]; then
              echo "::error::Maintenance Session explicit cleanup failed; the fixed 150-minute session TTL remains the fallback."
              cleanup_status=1
            fi
          fi
          sudo wg-quick down "$VEM_MAINTENANCE_RELAY_INTERFACE" >/dev/null 2>&1
          wg_down_status="$?"
          rm -f \
            "$automation_token_path" \
            "$revoke_response_path" \
            "$RUNNER_TEMP/maintenance-oidc-response.json" \
            "$RUNNER_TEMP/maintenance-oidc-token.jwt" \
            "$RUNNER_TEMP/maintenance-exchange-request.json" \
            "$RUNNER_TEMP/maintenance-exchange-response.json" \
            "$RUNNER_TEMP/maintenance-session-create.json" \
            "$RUNNER_TEMP/maintenance-session-verify.json"
          rm -rf -- "$ssh_directory"
          ssh_cleanup_status="$?"
          if [ "$ssh_cleanup_status" -ne 0 ] || [ -e "$ssh_directory" ]; then
            echo "::error::Run-scoped Maintenance SSH directory cleanup failed."
            cleanup_status=1
          fi
          {
            echo "cleanup.wgQuickDownExit=${wg_down_status}"
            echo "cleanup.rootOwnedWireGuardConfigPreserved=true"
            echo "cleanup.sshDirectoryRemoved=$([ "$ssh_cleanup_status" -eq 0 ] && [ ! -e "$ssh_directory" ] && echo true || echo false)"
            echo "cleanup.maintenanceSessionExplicitRevoke=$([ "$cleanup_status" -eq 0 ] && echo passed || echo failed)"
          } >> "$diagnostics" 2>/dev/null || true
          if [ -f service-api.pid ]; then kill "$(cat service-api.pid)" 2>/dev/null || true; fi
          docker rm -f "vem-runtime-postgres-${GITHUB_RUN_ID}" "vem-runtime-mqtt-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true
          exit "$cleanup_status"

      - name: Guard Maintenance Automation Evidence
        id: maintenance_leak_guard
        if: always()
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const forbiddenTempFiles = [
            "automation-token.jwt",
            "maintenance-oidc-token.jwt",
            "maintenance-exchange-request.json",
            "maintenance-exchange-response.json",
          ].map((name) => path.join(process.env.RUNNER_TEMP, name));
          const sshDirectory = process.env.MAINTENANCE_SSH_DIR ?? path.join(
            process.env.RUNNER_TEMP,
            `vem-maintenance-ssh-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}`,
          );
          for (const name of [
            "id_ed25519",
            "id_ed25519.pub",
            "id_ed25519-cert.pub",
            "known_hosts",
            "certificate-request.json",
            "certificate-response.json",
          ]) {
            forbiddenTempFiles.push(path.join(sshDirectory, name));
          }
          forbiddenTempFiles.push(sshDirectory);
          const leaks = forbiddenTempFiles.filter((candidate) => fs.existsSync(candidate));
          const roots = [
            path.join("artifacts", "vm-runtime-acceptance", process.env.RUN_ID),
            "service-api.log",
          ];
          const jwt = /\beyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\b/;
          const plaintextTokenField = /"(?:accessToken|idToken)"\s*:\s*"(?!\[REDACTED\])[^"\r\n]+"/;
          function visit(candidate) {
            if (!fs.existsSync(candidate)) return;
            const stat = fs.statSync(candidate);
            if (stat.isDirectory()) {
              for (const entry of fs.readdirSync(candidate)) visit(path.join(candidate, entry));
              return;
            }
            if (stat.size > 10 * 1024 * 1024) return;
            const content = fs.readFileSync(candidate);
            if (content.includes(0)) return;
            const text = content.toString("utf8");
            if (jwt.test(text) || plaintextTokenField.test(text)) leaks.push(candidate);
          }
          for (const root of roots) visit(root);
          if (leaks.length > 0) {
            throw new Error(`maintenance automation credential material found in: ${leaks.join(", ")}`);
          }
          console.log("maintenance-automation-leak-guard=passed");
          NODE

      - name: Upload VM Runtime Acceptance Artifacts
        if: always() && steps.maintenance_leak_guard.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-acceptance-${{ env.RUN_ID }}
          path: |
            artifacts/vm-runtime-acceptance/${{ env.RUN_ID }}/
            service-api.log
          if-no-files-found: warn
          retention-days: 14
