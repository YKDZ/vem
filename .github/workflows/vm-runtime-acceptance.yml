name: VM Runtime Acceptance

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run id used for evidence and testbed machine identity
        required: false
        default: ""
      runner_labels:
        description: JSON array for the self-hosted VM host runner labels
        required: false
        default: '["self-hosted","vem-runtime"]'
      base_image:
        description: VM host base qcow2 image path
        required: false
        default: /mnt/user/isos/vem-factory-runtime-image-RUN-191-20260705.qcow2
      overlay_disk:
        description: VM host overlay qcow2 path to rebuild
        required: false
        default: /mnt/user/domains/win10-vem-solidified-acceptance/vdisk1.qcow2
      target_vm:
        description: VM host target VM name
        required: false
        default: win10-vem-solidified-acceptance
      vm_wireguard_ip:
        description: Windows VM WireGuard peer IP used for SSH over Controlled Maintenance Ingress
        required: false
        default: 10.91.2.10
      runner_wireguard_peer_ip:
        description: Runner WireGuard peer IP allowed by Windows Controlled Maintenance Ingress
        required: false
        default: 10.91.1.10
      runner_wireguard_interface:
        description: Runner WireGuard interface name for the Maintenance Relay
        required: false
        default: wg-vem-maint
      windows_ssh_user:
        description: Windows VM maintenance SSH user
        required: false
        default: YKDZ

concurrency:
  group: vm-runtime-acceptance
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  build-windows-artifacts:
    name: Build Windows Runtime Artifacts
    uses: ./.github/workflows/build-windows-runtime-artifacts.yml
    with:
      artifact_name: vm-runtime-windows-artifacts
      retention_days: 7

  vm-runtime-acceptance:
    name: Restore VM And Run Acceptance
    needs: build-windows-artifacts
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      RUN_ID: ${{ inputs.run_id || format('RUN-{0}', github.run_number) }}
      DATABASE_URL: postgresql://vem:vem_password@localhost:55432/vem_runtime
      EPHEMERAL_API_BASE_URL: http://127.0.0.1:26849/api
      EPHEMERAL_MQTT_URL: mqtt://127.0.0.1:18883
      PAYMENT_MOCK_ENABLED: "true"
      SSHPASS: ${{ secrets.VEM_TESTBED_WINDOWS_PASSWORD }}
      MAINTENANCE_RELAY_WINDOWS_SSH_HOST: ${{ inputs.vm_wireguard_ip }}
      MAINTENANCE_RELAY_RUNNER_PEER_IP: ${{ inputs.runner_wireguard_peer_ip }}
      MAINTENANCE_RELAY_INTERFACE: ${{ inputs.runner_wireguard_interface }}
      VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG: ${{ secrets.VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG }}
      VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG_PATH: ${{ secrets.VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Download Windows Runtime Artifacts
        timeout-minutes: 25
        env:
          ARTIFACT_NAME: ${{ needs.build-windows-artifacts.outputs.artifact_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/vm-runtime-inputs "$RUNNER_TEMP"
          rm -rf artifacts/vm-runtime-inputs/*
          artifacts_json="$RUNNER_TEMP/vm-runtime-artifacts.json"
          artifact_zip="$RUNNER_TEMP/vm-runtime-artifacts.zip"
          curl --fail --silent --show-error --location \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?name=${ARTIFACT_NAME}" \
            --output "$artifacts_json"
          archive_url="$(node -e '
            const fs = require("node:fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const artifact = payload.artifacts?.find((entry) => entry.name === process.env.ARTIFACT_NAME);
            if (!artifact) {
              throw new Error(`artifact not found: ${process.env.ARTIFACT_NAME}`);
            }
            if (artifact.expired) {
              throw new Error(`artifact is expired: ${process.env.ARTIFACT_NAME}`);
            }
            process.stdout.write(artifact.archive_download_url);
          ' "$artifacts_json")"
          cache_root="${VEM_RUNTIME_ARTIFACT_CACHE_DIR:-${RUNNER_TOOL_CACHE:-$HOME/.cache}/vem-runtime-artifacts}"
          cache_key="$(printf '%s-%s' "$GITHUB_SHA" "$ARTIFACT_NAME" | tr -c 'A-Za-z0-9._-' '_')"
          cache_zip="$cache_root/${cache_key}.zip"
          mkdir -p "$cache_root"
          if [ -f "$cache_zip" ] && unzip -tq "$cache_zip" >/dev/null 2>&1; then
            echo "::notice::Using cached Windows runtime artifact zip for ${GITHUB_SHA}."
            cp "$cache_zip" "$artifact_zip"
          else
            rm -f "$cache_zip"
            curl --fail --silent --show-error --location \
              --connect-timeout 20 \
              --max-time 1200 \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$archive_url" \
              --output "$artifact_zip"
            unzip -tq "$artifact_zip" >/dev/null
            cp "$artifact_zip" "$cache_zip"
          fi
          unzip -q "$artifact_zip" -d artifacts/vm-runtime-inputs

      - name: Validate Windows Runtime Artifacts
        run: |
          set -euo pipefail
          test -f artifacts/vm-runtime-inputs/vending-daemon.exe
          test -f artifacts/vm-runtime-inputs/machine.exe
          test -f artifacts/vm-runtime-inputs/WebView2Loader.dll

      - name: Start Runner Maintenance Relay WireGuard Peer
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          temp_config_path="$RUNNER_TEMP/${MAINTENANCE_RELAY_INTERFACE}-${GITHUB_RUN_ID}.conf"
          installed_config_path="/etc/wireguard/${MAINTENANCE_RELAY_INTERFACE}.conf"
          record_config_metadata() {
            label="$1"
            path="$2"
            if [ -f "$path" ]; then
              permissions="$(stat -c '%a' "$path" 2>/dev/null || stat -f '%Lp' "$path" 2>/dev/null || echo unknown)"
              hash="$(sha256sum "$path" | awk '{print $1}')"
              echo "${label}.exists=true"
              echo "${label}.permissions=${permissions}"
              echo "${label}.sha256=${hash}"
            else
              echo "${label}.exists=false"
            fi
          }
          {
            echo "Controlled Maintenance Ingress: WireGuard Maintenance Relay"
            echo "interface=${MAINTENANCE_RELAY_INTERFACE}"
            echo "runnerPeerIp=${MAINTENANCE_RELAY_RUNNER_PEER_IP}"
            echo "windowsSshHost=${MAINTENANCE_RELAY_WINDOWS_SSH_HOST}"
            echo "vmRelayBootstrapContract=preconfigured-base-image"
            echo "repositoryConfiguresVmRelay=false"
          } > "$diagnostics"

          command -v wg-quick >/dev/null || {
            echo "::error::wg-quick is required on the self-hosted VM runner for Maintenance Relay startup."
            echo "wg-quick=missing" >> "$diagnostics"
            exit 1
          }
          command -v wg >/dev/null || {
            echo "::error::wg is required on the self-hosted VM runner for Maintenance Relay diagnostics."
            echo "wg=missing" >> "$diagnostics"
            exit 1
          }

          config_path="${VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG_PATH:-}"
          if [ -n "${VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG:-}" ]; then
            config_path="$temp_config_path"
            printf '%s\n' "$VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG" > "$config_path"
            chmod 600 "$config_path"
          fi
          if [ -z "$config_path" ] || [ ! -f "$config_path" ]; then
            echo "::error::Missing runner WireGuard peer config. Set VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG or VEM_MAINTENANCE_RELAY_RUNNER_WG_CONFIG_PATH."
            echo "runnerWireGuardConfig=missing" >> "$diagnostics"
            exit 1
          fi

          {
            record_config_metadata "runnerWireGuardConfig" "$config_path"
            record_config_metadata "installedWireGuardConfigBeforeStart" "$installed_config_path"
          } >> "$diagnostics"

          sudo install -m 0600 "$config_path" "$installed_config_path"
          sudo wg-quick down "$MAINTENANCE_RELAY_INTERFACE" >/dev/null 2>&1 || true
          sudo wg-quick up "$MAINTENANCE_RELAY_INTERFACE"
          {
            record_config_metadata "installedWireGuardConfigAfterStart" "$installed_config_path"
            echo "wgShowSummary.interface=${MAINTENANCE_RELAY_INTERFACE}"
            echo "wgShowSummary.latestHandshakes<<EOF"
            sudo wg show "$MAINTENANCE_RELAY_INTERFACE" latest-handshakes
            echo "EOF"
            echo "wgShowSummary.endpoints<<EOF"
            sudo wg show "$MAINTENANCE_RELAY_INTERFACE" endpoints
            echo "EOF"
            echo "wgShowSummary.allowedIps<<EOF"
            sudo wg show "$MAINTENANCE_RELAY_INTERFACE" allowed-ips
            echo "EOF"
          } >> "$diagnostics"

      - name: Preflight Maintenance Relay Bootstrap Contract
        run: |
          set -euo pipefail
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          {
            echo "preflight.vmRelayBootstrapContract=preconfigured-base-image"
            echo "preflight.vmWireGuardPeer=must-already-be-configured-and-running-in-base-image"
            echo "preflight.windowsControlledMaintenanceIngress=must-already-allow-runner-peer-ip"
            echo "preflight.repositoryConfiguresVmRelay=false"
          } >> "$diagnostics"
          if [ -z "${SSHPASS:-}" ]; then
            echo "::error::SSHPASS is required because VM runtime acceptance uses password SSH over the Maintenance Relay."
            echo "preflight.sshpass=missing" >> "$diagnostics"
            exit 1
          fi

      - name: Start Ephemeral Postgres And MQTT
        run: |
          set -euo pipefail
          postgres_name="vem-runtime-postgres-${GITHUB_RUN_ID}"
          mqtt_name="vem-runtime-mqtt-${GITHUB_RUN_ID}"
          docker rm -f "$postgres_name" "$mqtt_name" >/dev/null 2>&1 || true
          docker run -d --name "$postgres_name" \
            -e POSTGRES_DB=vem_runtime \
            -e POSTGRES_USER=vem \
            -e POSTGRES_PASSWORD=vem_password \
            -p 55432:5432 \
            postgres:16
          mkdir -p "$RUNNER_TEMP/vem-runtime-mosquitto"
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf"
          docker run -d --name "$mqtt_name" \
            -p 18883:1883 \
            -v "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          postgres_ready=false
          for attempt in $(seq 1 120); do
            postgres_status="$(docker inspect -f '{{.State.Status}}' "$postgres_name" 2>/dev/null || true)"
            if [ "$postgres_status" = "exited" ] || [ "$postgres_status" = "dead" ]; then
              echo "::error::Postgres container exited before readiness."
              docker ps -a --filter "name=$postgres_name"
              docker logs "$postgres_name"
              exit 1
            fi
            if docker exec "$postgres_name" pg_isready -h 127.0.0.1 -p 5432 -U vem -d vem_runtime >/tmp/vem-runtime-pg-isready.log 2>&1; then
              postgres_ready=true
              break
            fi
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "Waiting for Postgres readiness: attempt=${attempt} status=${postgres_status:-unknown}"
              cat /tmp/vem-runtime-pg-isready.log || true
            fi
            sleep 2
          done
          if [ "$postgres_ready" != "true" ]; then
            echo "::error::Postgres did not become ready."
            docker ps -a --filter "name=$postgres_name"
            docker logs "$postgres_name"
            exit 1
          fi
          mqtt_ready=false
          for attempt in $(seq 1 60); do
            mqtt_status="$(docker inspect -f '{{.State.Status}}' "$mqtt_name" 2>/dev/null || true)"
            if [ "$mqtt_status" = "exited" ] || [ "$mqtt_status" = "dead" ]; then
              echo "::error::MQTT container exited before readiness."
              docker ps -a --filter "name=$mqtt_name"
              docker logs "$mqtt_name"
              exit 1
            fi
            if timeout 2 bash -c '</dev/tcp/127.0.0.1/18883' >/dev/null 2>&1; then
              mqtt_ready=true
              break
            fi
            sleep 1
          done
          if [ "$mqtt_ready" != "true" ]; then
            echo "::error::MQTT did not become ready."
            docker ps -a --filter "name=$mqtt_name"
            docker logs "$mqtt_name"
            exit 1
          fi

      - name: Build And Start Service API
        run: |
          set -euo pipefail
          pnpm turbo build --filter @vem/shared --filter @vem/db --filter service-api
          pnpm --filter @vem/db migrate
          node apps/service-api/dist/main.js > service-api.log 2>&1 &
          echo "$!" > service-api.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:26849/api/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat service-api.log
          exit 1
        env:
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-chars!!
          MACHINE_JWT_SECRET: ci-machine-jwt-secret-min-32-chars-long!
          MACHINE_CREDENTIAL_ENCRYPTION_KEY: ci-machine-cred-enc-key-32-chars!!
          MQTT_URL: ${{ env.EPHEMERAL_MQTT_URL }}
          PAYMENT_WEBHOOK_BASE_URL: http://127.0.0.1:26849
          BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          PORT: "26849"

      - name: Restore Windows Runtime VM
        run: |
          set -euo pipefail
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          trap 'echo "windowsSshReadiness=failed" >> "$diagnostics"' ERR
          command -v sshpass >/dev/null || {
            echo "::error::sshpass is required on the self-hosted VM runner for password-based Windows SSH readiness checks."
            echo "sshpassBinary=missing" >> "$diagnostics"
            exit 1
          }
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          node scripts/testbed/vm-host-adapter.mjs \
            --mode restore \
            --adapter libvirt-qcow2 \
            --run-id "$RUN_ID" \
            --target-vm "${{ inputs.target_vm }}" \
            --base-image "${{ inputs.base_image }}" \
            --overlay-disk "${{ inputs.overlay_disk }}" \
            --windows-ssh-host "$MAINTENANCE_RELAY_WINDOWS_SSH_HOST" \
            --windows-ssh-user "${{ inputs.windows_ssh_user }}" \
            --maintenance-relay-interface "$MAINTENANCE_RELAY_INTERFACE" \
            --maintenance-relay-runner-peer-ip "$MAINTENANCE_RELAY_RUNNER_PEER_IP" \
            --sshpass \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-restore-report.json" \
            --allow-restore

      - name: Run VM Runtime Acceptance
        run: |
          set -euo pipefail
          node scripts/testbed/win10-vem-e2e.mjs \
            --mode vm-runtime-acceptance \
            --run-id "$RUN_ID" \
            --platform-target "self-hosted-${RUN_ID}" \
            --ephemeral-database-url "$DATABASE_URL" \
            --ephemeral-api-base-url "$EPHEMERAL_API_BASE_URL" \
            --ephemeral-mqtt-url "$EPHEMERAL_MQTT_URL" \
            --daemon-artifact artifacts/vm-runtime-inputs/vending-daemon.exe \
            --machine-ui-artifact artifacts/vm-runtime-inputs/machine.exe \
            --remote "${{ inputs.windows_ssh_user }}@$MAINTENANCE_RELAY_WINDOWS_SSH_HOST" \
            --maintenance-ingress-source-allowlist "$MAINTENANCE_RELAY_RUNNER_PEER_IP" \
            --sshpass \
            --factory-credentials-from-sshpass

      - name: Cleanup Ephemeral Services
        if: always()
        run: |
          set +e
          diagnostics="artifacts/vm-runtime-acceptance/${RUN_ID}/maintenance-relay-diagnostics.txt"
          temp_config_path="$RUNNER_TEMP/${MAINTENANCE_RELAY_INTERFACE}-${GITHUB_RUN_ID}.conf"
          installed_config_path="/etc/wireguard/${MAINTENANCE_RELAY_INTERFACE}.conf"
          sudo wg-quick down "$MAINTENANCE_RELAY_INTERFACE" >/dev/null 2>&1
          wg_down_status="$?"
          sudo rm -f "$installed_config_path"
          rm -f "$temp_config_path"
          {
            echo "cleanup.wgQuickDownExit=${wg_down_status}"
            echo "cleanup.installedConfigRemoved=true"
            echo "cleanup.tempConfigRemoved=true"
          } >> "$diagnostics" 2>/dev/null || true
          if [ -f service-api.pid ]; then kill "$(cat service-api.pid)" 2>/dev/null || true; fi
          docker rm -f "vem-runtime-postgres-${GITHUB_RUN_ID}" "vem-runtime-mqtt-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true

      - name: Upload VM Runtime Acceptance Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vm-runtime-acceptance-${{ env.RUN_ID }}
          path: |
            artifacts/vm-runtime-acceptance/${{ env.RUN_ID }}/
            service-api.log
          if-no-files-found: warn
          retention-days: 14
