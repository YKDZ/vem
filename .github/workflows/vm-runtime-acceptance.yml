name: VM Runtime Acceptance

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Windows runtime testbed operation
        required: true
        default: full
        type: choice
        options: [fast, full, clear_cache]

concurrency:
  group: vem-windows-runtime-testbed
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reconstruct-local-testbed:
    name: Reconstruct Local Testbed Pass 1
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 30
    outputs:
      mode: ${{ steps.testbed.outputs.mode }}
    env:
      TESTBED_MODE: ${{ inputs.mode || 'full' }}
      GITHUB_SHA: ${{ github.sha }}
      CARGO_HOME: /opt/vem/runtime-testbed/cargo
      RUSTUP_HOME: /opt/vem/runtime-testbed/rustup
      CARGO_TARGET_DIR: /opt/vem/runtime-testbed/cargo-target
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "30"
      CARGO_NET_RETRY: "10"
      VEM_LOCAL_TESTBED_BASELINE_CONTRACT: ${{ vars.VEM_LOCAL_TESTBED_BASELINE_CONTRACT }}
      VEM_LOCAL_TESTBED_HOST_ADDRESS: ${{ vars.VEM_LOCAL_TESTBED_HOST_ADDRESS }}
      VEM_LOCAL_TESTBED_STATE_ROOT: ${{ vars.VEM_LOCAL_TESTBED_STATE_ROOT }}
    steps:
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - id: testbed
        name: Reconstruct C Drive And Local Platform
        run: |
          set -euo pipefail
          test -n "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT"
          test -n "$VEM_LOCAL_TESTBED_HOST_ADDRESS"
          test -n "$VEM_LOCAL_TESTBED_STATE_ROOT"
          node scripts/testbed/local-testbed.mjs reconstruct \
            --mode "$TESTBED_MODE" \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --workspace "$GITHUB_WORKSPACE" \
            --state-root "$VEM_LOCAL_TESTBED_STATE_ROOT" \
            --baseline-contract "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT" \
            --host-private-address "$VEM_LOCAL_TESTBED_HOST_ADDRESS" \
            --out "$RUNNER_TEMP/vem-local-testbed-reconstruction.json"
          echo "mode=$TESTBED_MODE" >> "$GITHUB_OUTPUT"

  run-inside-windows-pass-1:
    name: Build Deploy And Test Inside Windows Pass 1
    needs: reconstruct-local-testbed
    if: ${{ needs.reconstruct-local-testbed.result == 'success' }}
    runs-on: [self-hosted, Windows, X64, vem-runtime]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Build Deploy Claim And Test
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VISION_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          & scripts/testbed/run-local-testbed-guest.ps1 -Mode '${{ needs.reconstruct-local-testbed.outputs.mode }}'
      - name: Collect Compact Runtime Acceptance Evidence Pass 1
        if: ${{ always() && needs.reconstruct-local-testbed.outputs.mode != 'clear_cache' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-acceptance-pass-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: C:\ProgramData\VEM\runtime\testbed\full-workflow-evidence-bundle\**
          if-no-files-found: error
          retention-days: 7
      - name: Collect Clear Cache Report Pass 1
        if: ${{ always() && needs.reconstruct-local-testbed.outputs.mode == 'clear_cache' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-clear-cache-pass-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: C:\ProgramData\VEM\runtime\testbed\clear-cache-report.json
          if-no-files-found: error
          retention-days: 7

  reconstruct-local-testbed-pass-2:
    name: Reconstruct Local Testbed Pass 2
    needs: [reconstruct-local-testbed, run-inside-windows-pass-1]
    if: ${{ always() && needs.reconstruct-local-testbed.outputs.mode == 'full' && needs.run-inside-windows-pass-1.result != 'cancelled' }}
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 30
    env:
      CARGO_HOME: /opt/vem/runtime-testbed/cargo
      RUSTUP_HOME: /opt/vem/runtime-testbed/rustup
      CARGO_TARGET_DIR: /opt/vem/runtime-testbed/cargo-target
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "30"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Reconstruct C Drive And Local Platform Again
        run: |
          set -euo pipefail
          test -n "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT"
          test -n "$VEM_LOCAL_TESTBED_HOST_ADDRESS"
          test -n "$VEM_LOCAL_TESTBED_STATE_ROOT"
          node scripts/testbed/local-testbed.mjs reconstruct \
            --mode full \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-pass-2" \
            --workspace "$GITHUB_WORKSPACE" \
            --state-root "$VEM_LOCAL_TESTBED_STATE_ROOT" \
            --baseline-contract "$VEM_LOCAL_TESTBED_BASELINE_CONTRACT" \
            --host-private-address "$VEM_LOCAL_TESTBED_HOST_ADDRESS" \
            --out "$RUNNER_TEMP/vem-local-testbed-reconstruction-pass-2.json"
        env:
          GITHUB_SHA: ${{ github.sha }}
          VEM_LOCAL_TESTBED_BASELINE_CONTRACT: ${{ vars.VEM_LOCAL_TESTBED_BASELINE_CONTRACT }}
          VEM_LOCAL_TESTBED_HOST_ADDRESS: ${{ vars.VEM_LOCAL_TESTBED_HOST_ADDRESS }}
          VEM_LOCAL_TESTBED_STATE_ROOT: ${{ vars.VEM_LOCAL_TESTBED_STATE_ROOT }}

  run-inside-windows-pass-2:
    name: Build Deploy And Test Inside Windows Pass 2
    needs: reconstruct-local-testbed-pass-2
    if: ${{ needs.reconstruct-local-testbed-pass-2.result == 'success' }}
    runs-on: [self-hosted, Windows, X64, vem-runtime]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Build Deploy Claim And Test Again
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VISION_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          & scripts/testbed/run-local-testbed-guest.ps1 -Mode 'full'
      - name: Collect Compact Runtime Acceptance Evidence Pass 2
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-acceptance-pass-2-${{ github.run_id }}-${{ github.run_attempt }}
          path: C:\ProgramData\VEM\runtime\testbed\full-workflow-evidence-bundle\**
          if-no-files-found: error
          retention-days: 7

  full-workflow-stability-gate:
    name: Full Workflow Stability Gate
    needs:
      [
        reconstruct-local-testbed,
        run-inside-windows-pass-1,
        reconstruct-local-testbed-pass-2,
        run-inside-windows-pass-2,
      ]
    if: ${{ always() && needs.reconstruct-local-testbed.outputs.mode == 'full' && needs.run-inside-windows-pass-1.result != 'cancelled' && needs.run-inside-windows-pass-2.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download pass 1 runtime evidence
        uses: actions/download-artifact@v4
        with:
          name: vm-runtime-acceptance-pass-1-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vm-runtime-pass-1
      - name: Download pass 2 runtime evidence
        uses: actions/download-artifact@v4
        with:
          name: vm-runtime-acceptance-pass-2-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vm-runtime-pass-2
      - name: Validate same-commit two-pass stability gate
        run: |
          PASS_A="$(find "${RUNNER_TEMP}/vm-runtime-pass-1" -name full-workflow-tracks.json | head -n1)"
          PASS_B="$(find "${RUNNER_TEMP}/vm-runtime-pass-2" -name full-workflow-tracks.json | head -n1)"
          test -n "$PASS_A"
          test -n "$PASS_B"
          node scripts/testbed/full-workflow-stability-gate.mjs \
            --commit "${GITHUB_SHA}" \
            --pass-a "$PASS_A" \
            --pass-b "$PASS_B" \
            --out "${RUNNER_TEMP}/full-workflow-stability-gate.json"
      - name: Upload stability gate report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-stability-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/full-workflow-stability-gate.json
          if-no-files-found: error
          retention-days: 7
