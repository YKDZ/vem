name: VM Runtime Acceptance

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Runtime testbed operation
        required: true
        default: full
        type: choice
        options: [fast, full, clear_cache]
  workflow_call:
    inputs:
      mode:
        description: Runtime testbed operation
        required: false
        default: full
        type: string

concurrency:
  group: vem-windows-runtime-testbed
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  invoke-runtime-testbed-caller:
    name: Invoke Runtime Testbed Caller
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 120
    env:
      VEM_TESTBED_HOST_CONFIG: ${{ vars.VEM_TESTBED_HOST_CONFIG }}
      TESTBED_MODE: ${{ inputs.mode || 'full' }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Run VM runtime testbed caller
        id: caller
        run: |
          set -uo pipefail
          node scripts/testbed/runtime-testbed-trigger.mjs run \
            --mode "$TESTBED_MODE" \
            --commit "$GITHUB_SHA" \
            --config "$VEM_TESTBED_HOST_CONFIG" \
            --out "$RUNNER_TEMP/vm-runtime-acceptance-caller-result.json"
          caller_exit=$?
          test -f "$RUNNER_TEMP/vm-runtime-acceptance-caller-result.json"
          node --input-type=module - <<'NODE' "$RUNNER_TEMP/vm-runtime-acceptance-caller-result.json"
          import { readFile, writeFile } from "node:fs/promises";

          const [,, resultPath] = process.argv;
          if (!resultPath) process.exit(1);
          const payload = JSON.parse(await readFile(resultPath, "utf8"));
          const artifactPath =
            payload?.canonicalCompactArtifact ??
            payload?.canonicalCompactArtifactPath ??
            payload?.artifact?.canonicalCompactArtifact ??
            payload?.artifactPath;
          if (!artifactPath) {
            throw new Error("canonicalCompactArtifact not found in caller result");
          }
          await writeFile(process.env.GITHUB_OUTPUT, `artifact_path=${artifactPath}\n`, {
            flag: "a",
          });
          NODE
          echo "caller_exit=$caller_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload canonical compact artifact
        if: always() && steps.caller.outputs.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: vm-runtime-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.caller.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 7
      - name: Apply canonical result
        if: always()
        env:
          CALLER_RESULT: ${{ runner.temp }}/vm-runtime-acceptance-caller-result.json
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(node -e 'console.log(require(process.argv[1]).status)' "$CALLER_RESULT")"
          case "$status" in
            passed) exit 0 ;;
            superseded)
              gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/cancel" || true
              exit 0
              ;;
            failed) exit 1 ;;
            infrastructure_failed) exit 2 ;;
            *) echo "unknown canonical status: $status" >&2; exit 2 ;;
          esac
