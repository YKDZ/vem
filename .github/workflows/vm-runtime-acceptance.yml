name: VM Runtime Acceptance

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run id used for evidence and testbed machine identity
        required: false
        default: ""
      windows_ssh_user:
        description: Windows VM maintenance SSH user
        required: false
        default: YKDZ
      runtime_artifact_run_id:
        description: Prior VM runtime workflow run whose Windows artifact can be reused for workflow-only changes
        required: false
        default: ""

concurrency:
  group: vm-runtime-acceptance-v2
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  build-windows-runtime:
    name: Build Current Windows Runtime
    if: inputs.runtime_artifact_run_id == ''
    uses: ./.github/workflows/build-windows-runtime-artifacts.yml
    with:
      artifact_name: windows-runtime-artifacts-${{ github.run_id }}
      retention_days: 1

  vm-runtime-acceptance:
    name: Restore VM And Run Acceptance
    needs: build-windows-runtime
    if: github.ref == 'refs/heads/main' && always() && (needs.build-windows-runtime.result == 'success' || needs.build-windows-runtime.result == 'skipped')
    runs-on: [self-hosted, Linux, X64, vem-runtime]
    timeout-minutes: 120
    environment: vem-maintenance-testbed
    permissions:
      actions: read
      contents: read
    defaults:
      run:
        shell: bash
    env:
      RUN_ID: ${{ inputs.run_id || format('RUN-{0}', github.run_number) }}
      WINDOWS_SSH_USER: ${{ inputs.windows_ssh_user }}
      VEM_RUNTIME_PLATFORM_HOST: ${{ vars.VEM_VM_RUNTIME_PLATFORM_INGRESS_HOST }}
      VEM_RUNTIME_RUNNER_SOURCE_ALLOWLIST: ${{ vars.VEM_VM_RUNTIME_RUNNER_SOURCE_ALLOWLIST }}
      DATABASE_URL: postgresql://vem:vem_password@127.0.0.1:55432/vem_runtime
      # Keep the long-running API process and the run-local claim seeder
      # independent from any untracked .env left on the self-hosted runner.
      MACHINE_CLAIM_LOOKUP_HMAC_KEY: ci-machine-claim-lookup-hmac-key-v1
      EPHEMERAL_API_READY_URL: http://127.0.0.1:26849/api
      EPHEMERAL_API_BASE_URL: ${{ format('http://{0}:26849/api', vars.VEM_VM_RUNTIME_PLATFORM_INGRESS_HOST) }}
      EPHEMERAL_MQTT_URL: ${{ format('mqtt://{0}:18883', vars.VEM_VM_RUNTIME_PLATFORM_INGRESS_HOST) }}
      PAYMENT_MOCK_ENABLED: "true"
      VEM_VM_HOST_TARGET_ID: ${{ vars.VEM_VM_HOST_TARGET_ID }}
      VEM_VM_HOST_APPROVED_BASE_ID: ${{ vars.VEM_VM_HOST_APPROVED_BASE_ID }}
      VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY }}
      VEM_VM_HOST_EXPECTED_ADAPTER_SHA256: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_SHA256 }}
      # Factory/ISO integration must retain this daemon-selected stable endpoint contract.
      VEM_VM_AUDIO_ENDPOINT_ID: ${{ vars.VEM_VM_AUDIO_ENDPOINT_ID }}
      VEM_RUNTIME_ARTIFACT_CACHE_ROOT: ${{ vars.VEM_VM_RUNTIME_ARTIFACT_CACHE_ROOT }}
    steps:
      - name: Checkout Trusted Commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Guard Local VM Runtime Trust Boundary
        env:
          EXPECTED_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/vm-runtime-acceptance.yml@refs/heads/main
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$OBSERVED_WORKFLOW_REF" = "$EXPECTED_WORKFLOW_REF"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          node <<'NODE'
          const patterns = {
            RUN_ID: /^[A-Za-z0-9][A-Za-z0-9_-]{0,63}$/,
            WINDOWS_SSH_USER: /^[A-Za-z0-9][A-Za-z0-9_.-]{0,63}$/,
            VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY: /^vm-host-adapter:\/\/[A-Za-z0-9._/-]+@[0-9]+\.[0-9]+\.[0-9]+$/,
            VEM_VM_HOST_EXPECTED_ADAPTER_SHA256: /^[a-f0-9]{64}$/,
          };
          for (const [name, pattern] of Object.entries(patterns)) {
            if (!pattern.test(process.env[name] ?? "")) throw new Error(`workflow input is invalid: ${name}`);
          }
          for (const name of [
            "VEM_VM_HOST_ADAPTER",
            "VEM_VM_HOST_TARGET_ID",
            "VEM_VM_HOST_APPROVED_BASE_ID",
            "VEM_VM_AUDIO_ENDPOINT_ID",
          ]) {
            if (!process.env[name]) throw new Error(`environment variable is required: ${name}`);
          }
          const net = require("node:net");
          if (net.isIP(process.env.VEM_RUNTIME_PLATFORM_HOST) !== 4) {
            throw new Error("VEM_RUNTIME_PLATFORM_HOST must be the runner's LAN IPv4 address");
          }
          if (process.env.VEM_RUNTIME_RUNNER_SOURCE_ALLOWLIST !== `${process.env.VEM_RUNTIME_PLATFORM_HOST}/32`) {
            throw new Error("VEM_RUNTIME_RUNNER_SOURCE_ALLOWLIST must bind only the runner LAN address");
          }
          NODE
          [[ "$VEM_VM_HOST_ADAPTER" = /* && -x "$VEM_VM_HOST_ADAPTER" ]]
          ip -o -4 addr show scope global | awk '{ sub(/\/.*/, "", $4); print $4 }' | grep -Fx "$VEM_RUNTIME_PLATFORM_HOST"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Host Windows Runtime Artifact Cache
        id: runtime-artifact-cache
        env:
          REQUESTED_RUNTIME_ARTIFACT_RUN_ID: ${{ inputs.runtime_artifact_run_id }}
        run: |
          set -euo pipefail
          artifact_run_id="${REQUESTED_RUNTIME_ARTIFACT_RUN_ID:-$GITHUB_RUN_ID}"
          [[ "$artifact_run_id" =~ ^[0-9]+$ ]]
          cache_root="${VEM_RUNTIME_ARTIFACT_CACHE_ROOT:-${RUNNER_TEMP%/_temp}/_runtime-artifact-cache}"
          cache_dir="$cache_root/$artifact_run_id"
          runtime_dir="$RUNNER_TEMP/vem-current-windows-runtime"
          if [[ "$cache_dir" = /* ]] && test -f "$cache_dir/WINDOWS-RUNTIME-ARTIFACTS.json" && test -f "$cache_dir/vending-daemon.exe" && test -f "$cache_dir/machine.exe" && test -f "$cache_dir/WebView2Loader.dll"; then
            rm -rf -- "$runtime_dir"
            mkdir -p "$runtime_dir"
            cp -a "$cache_dir/." "$runtime_dir/"
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
          echo "artifact_run_id=$artifact_run_id" >> "$GITHUB_OUTPUT"

      - name: Download Current Windows Runtime
        if: inputs.runtime_artifact_run_id == '' && steps.runtime-artifact-cache.outputs.hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows-runtime.outputs.artifact_name }}
          path: ${{ runner.temp }}/vem-current-windows-runtime

      - name: Download Reused Windows Runtime
        if: inputs.runtime_artifact_run_id != '' && steps.runtime-artifact-cache.outputs.hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: windows-runtime-artifacts-${{ inputs.runtime_artifact_run_id }}
          path: ${{ runner.temp }}/vem-current-windows-runtime
          github-token: ${{ github.token }}
          run-id: ${{ inputs.runtime_artifact_run_id }}

      - name: Persist Host Windows Runtime Artifact Cache
        if: steps.runtime-artifact-cache.outputs.hit != 'true'
        run: |
          set -euo pipefail
          cache_root="${VEM_RUNTIME_ARTIFACT_CACHE_ROOT:-${RUNNER_TEMP%/_temp}/_runtime-artifact-cache}"
          [[ "$cache_root" = /* ]]
          runtime_dir="$RUNNER_TEMP/vem-current-windows-runtime"
          cache_dir="$cache_root/${{ steps.runtime-artifact-cache.outputs.artifact_run_id }}"
          staging="${cache_dir}.tmp-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          rm -rf -- "$staging"
          mkdir -p "$staging"
          cp -a "$runtime_dir/." "$staging/"
          rm -rf -- "$cache_dir"
          mv "$staging" "$cache_dir"

      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Prepare Local VM Testbed SSH Access
        run: |
          set -euo pipefail
          umask 077
          artifact_dir="artifacts/vm-runtime-acceptance/${RUN_ID}"
          mkdir -p "$artifact_dir"
          ca_key_path="${VEM_VM_RUNTIME_SSH_CA_PRIVATE_KEY_PATH:-${VEM_FACTORY_MAINTENANCE_SSH_CA_PRIVATE_KEY_PATH:-${VEM_TESTBED_MAINTENANCE_SSH_CA_PRIVATE_KEY_PATH:-}}}"
          [[ "$ca_key_path" = /* && -f "$ca_key_path" ]] || {
            echo "A local VM runtime, Factory, or testbed SSH CA private key path is required." >&2
            exit 1
          }
          ssh_dir="$RUNNER_TEMP/vem-vm-runtime-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          ssh_key_path="$ssh_dir/id_ed25519"
          ssh_public_key_path="$ssh_dir/id_ed25519.pub"
          ssh_certificate_path="$ssh_dir/id_ed25519-cert.pub"
          known_hosts_path="$ssh_dir/known_hosts"
          rm -rf -- "$ssh_dir"
          install -d -m 0700 "$ssh_dir"
          ssh-keygen -q -t ed25519 -N '' -f "$ssh_key_path"
          chmod 600 "$ssh_key_path" "$ssh_public_key_path"
          ssh-keygen -q -s "$ca_key_path" \
            -I "vem-vm-runtime-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -n "$WINDOWS_SSH_USER" \
            -V -5m:+150m \
            "$ssh_public_key_path"
          chmod 600 "$ssh_certificate_path"
          : > "$known_hosts_path"
          chmod 600 "$known_hosts_path"
          ssh-keygen -Lf "$ssh_certificate_path" > "$artifact_dir/local-ssh-certificate.txt"
          node - "$ssh_dir" "$known_hosts_path" >> "$GITHUB_ENV" <<'NODE'
          const crypto = require("node:crypto");
          const [sshDir, knownHostsPath] = process.argv.slice(2);
          const runId = process.env.RUN_ID;
          const target = process.env.VEM_VM_HOST_TARGET_ID;
          const lifecycleSeed = crypto.createHash("sha256").update(`${runId}\n${target}`).digest("hex").slice(0, 32);
          const adapterLifecycle = `vm-lifecycle://${runId.toLowerCase()}.${lifecycleSeed}`;
          const publicKey = () => crypto.randomBytes(32).toString("base64");
          const session = {
            sessionId: crypto.randomUUID(),
            relayPeer: { publicKey: publicKey(), tunnelAddress: "10.91.0.1" },
            sourceTunnelAddress: "10.91.0.2",
            endpointTunnelAddress: "10.91.0.3",
          };
          const policy = (lifecycleReference) => ({
            transport: "testbed-runner-direct",
            runnerSourceAllowlist: [process.env.VEM_RUNTIME_RUNNER_SOURCE_ALLOWLIST],
            lifecycleReference,
          });
          const hostKeyAlias = `vem-runtime-${runId.toLowerCase()}`;
          process.stdout.write(`VM_RUNTIME_SSH_DIR=${sshDir}\n`);
          process.stdout.write(`VM_RUNTIME_SSH_KNOWN_HOSTS_PATH=${knownHostsPath}\n`);
          process.stdout.write(`VM_RUNTIME_SSH_HOST_KEY_ALIAS=${hostKeyAlias}\n`);
          process.stdout.write(`VM_TESTBED_MAINTENANCE_SESSION_JSON=${JSON.stringify(session)}\n`);
          process.stdout.write(`VM_TESTBED_ENDPOINT_POLICY_JSON=${JSON.stringify(policy(adapterLifecycle))}\n`);
          process.stdout.write(`VM_TESTBED_SERIAL_ENDPOINT_POLICY_JSON=${JSON.stringify(policy(adapterLifecycle))}\n`);
          process.stdout.write(`MAINTENANCE_RELAY_PEER_ID=${crypto.randomUUID()}\n`);
          process.stdout.write(`MAINTENANCE_RELAY_PUBLIC_KEY=${session.relayPeer.publicKey}\n`);
          process.stdout.write(`MAINTENANCE_RELAY_TUNNEL_ADDRESS=${session.relayPeer.tunnelAddress}\n`);
          NODE

      - name: Start Ephemeral Postgres And MQTT
        run: |
          set -euo pipefail
          postgres_name="vem-runtime-postgres-${GITHUB_RUN_ID}"
          mqtt_name="vem-runtime-mqtt-${GITHUB_RUN_ID}"
          docker rm -f "$postgres_name" "$mqtt_name" >/dev/null 2>&1 || true
          docker run -d --name "$postgres_name" \
            -e POSTGRES_DB=vem_runtime \
            -e POSTGRES_USER=vem \
            -e POSTGRES_PASSWORD=vem_password \
            -p 55432:5432 \
            postgres:16
          mkdir -p "$RUNNER_TEMP/vem-runtime-mosquitto"
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf"
          docker run -d --name "$mqtt_name" \
            -p 18883:1883 \
            -v "$RUNNER_TEMP/vem-runtime-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          wait_for_tcp() {
            host="$1"
            port="$2"
            timeout 2 bash -c "</dev/tcp/${host}/${port}" >/dev/null 2>&1
          }
          postgres_ready=false
          for attempt in $(seq 1 120); do
            postgres_status="$(docker inspect -f '{{.State.Status}}' "$postgres_name" 2>/dev/null || true)"
            if [ "$postgres_status" = "exited" ] || [ "$postgres_status" = "dead" ]; then
              echo "::error::Postgres container exited before readiness."
              docker ps -a --filter "name=$postgres_name"
              docker logs "$postgres_name"
              exit 1
            fi
            if wait_for_tcp 127.0.0.1 55432; then
              postgres_ready=true
              break
            fi
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "Waiting for Postgres readiness: attempt=${attempt} status=${postgres_status:-unknown}"
            fi
            sleep 2
          done
          if [ "$postgres_ready" != "true" ]; then
            echo "::error::Postgres did not become ready."
            docker ps -a --filter "name=$postgres_name"
            docker logs "$postgres_name"
            exit 1
          fi
          mqtt_ready=false
          for attempt in $(seq 1 60); do
            mqtt_status="$(docker inspect -f '{{.State.Status}}' "$mqtt_name" 2>/dev/null || true)"
            if [ "$mqtt_status" = "exited" ] || [ "$mqtt_status" = "dead" ]; then
              echo "::error::MQTT container exited before readiness."
              docker ps -a --filter "name=$mqtt_name"
              docker logs "$mqtt_name"
              exit 1
            fi
            if wait_for_tcp 127.0.0.1 18883; then
              mqtt_ready=true
              break
            fi
            sleep 1
          done
          if [ "$mqtt_ready" != "true" ]; then
            echo "::error::MQTT did not become ready."
            docker ps -a --filter "name=$mqtt_name"
            docker logs "$mqtt_name"
            exit 1
          fi

      - name: Build And Start Service API
        run: |
          set -euo pipefail
          pnpm turbo build --filter @vem/shared --filter @vem/db --filter service-api
          pnpm --filter @vem/db migrate
          node apps/service-api/dist/main.js > service-api.log 2>&1 &
          echo "$!" > service-api.pid
          for attempt in $(seq 1 60); do
            if curl --globoff -fsS "$EPHEMERAL_API_READY_URL/health" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat service-api.log
          exit 1
        env:
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-chars!!
          MACHINE_JWT_SECRET: ci-machine-jwt-secret-min-32-chars-long!
          MACHINE_CREDENTIAL_ENCRYPTION_KEY: ci-machine-cred-enc-key-32-chars!!
          MACHINE_PROVISIONING_PROFILE: testbed
          MAINTENANCE_RELAY_ENDPOINT: 127.0.0.1:51820
          MQTT_URL: mqtt://127.0.0.1:18883
          MACHINE_MQTT_URL: ${{ env.EPHEMERAL_MQTT_URL }}
          MACHINE_API_BASE_URL: ${{ env.EPHEMERAL_API_BASE_URL }}
          PAYMENT_WEBHOOK_BASE_URL: http://127.0.0.1:26849
          BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          SERVICE_PORT: "26849"
          SERVICE_HOST: "0.0.0.0"

      - name: Create Windows Runtime VM Direct Testbed Overlay
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          test -n "${VEM_VM_HOST_ADAPTER:-}"
          test -n "$VEM_VM_HOST_TARGET_ID"
          test -n "$VEM_VM_HOST_APPROVED_BASE_ID"
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation create-disposable-overlay \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --maintenance-relay-session-json "$VM_TESTBED_MAINTENANCE_SESSION_JSON" \
            --maintenance-endpoint-policy-json "$VM_TESTBED_ENDPOINT_POLICY_JSON" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json"
          node - "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json" <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (report.adapter?.identity !== process.env.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY) {
            throw new Error(`VM Host Adapter identity mismatch: ${report.adapter?.identity ?? "missing"}`);
          }
          NODE

      - name: Consume Direct Testbed Guest Maintenance Endpoint
        run: |
          set -euo pipefail
          report="artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-adapter-report.json"
          node - "$report" >> "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const net = require("node:net");
          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const endpoint = report.guest?.maintenanceEndpoint;
          if (
            endpoint?.transport !== "testbed-runner-direct" ||
            endpoint?.protocol !== "ssh" ||
            net.isIP(endpoint.host) === 0 ||
            ["0.0.0.0", "::", "127.0.0.1", "::1", process.env.VEM_RUNTIME_PLATFORM_HOST].includes(endpoint.host) ||
            endpoint.port !== 22 ||
            !["discovered", "authenticated"].includes(endpoint.reachability) ||
            endpoint.relayProof !== undefined
          ) {
            throw new Error("VM Host Adapter did not provide a direct testbed-runner SSH endpoint");
          }
          process.stdout.write(`VM_GUEST_MAINTENANCE_ENDPOINT_JSON=${JSON.stringify(endpoint)}\n`);
          NODE

      - name: Prove Direct Certificate SSH Data Plane
        run: |
          set -euo pipefail
          artifact_dir="artifacts/vm-runtime-acceptance/${RUN_ID}"
          mkdir -p "$artifact_dir"
          endpoint_host="$(node -e 'process.stdout.write(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).host)')"
          endpoint_port="$(node -e 'process.stdout.write(String(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).port))')"
          ssh_common=(
            -p "$endpoint_port"
            -i "$VM_RUNTIME_SSH_DIR/id_ed25519"
            -o "CertificateFile=$VM_RUNTIME_SSH_DIR/id_ed25519-cert.pub"
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH"
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS"
            -o StrictHostKeyChecking=accept-new
            -o IdentitiesOnly=yes
            -o IdentityAgent=none
            -o BatchMode=yes
            -o PasswordAuthentication=no
            -o KbdInteractiveAuthentication=no
            -o PreferredAuthentications=publickey
            -o ProxyCommand=none
          )
          target="${WINDOWS_SSH_USER}@${endpoint_host}"
          ssh "${ssh_common[@]}" "$target" "powershell.exe -NoProfile -NonInteractive -Command \"whoami | Out-Null\""
          node - "$artifact_dir/direct-ssh-certificate-proof.json" <<'NODE'
          const fs = require("node:fs");
          fs.writeFileSync(process.argv[2], `${JSON.stringify({
            schemaVersion: "vem-direct-ssh-certificate-proof/v1",
            transport: "testbed-runner-direct",
            runnerHost: process.env.VEM_RUNTIME_PLATFORM_HOST,
            endpoint: JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON),
            hostKeyAlias: process.env.VM_RUNTIME_SSH_HOST_KEY_ALIAS,
            certificateSshAuthenticated: true,
          })}\n`, { mode: 0o600 });
          NODE

      - name: Deploy Current Windows Runtime To Overlay
        run: |
          set -euo pipefail
          runtime_dir="$RUNNER_TEMP/vem-current-windows-runtime"
          daemon="$runtime_dir/vending-daemon.exe"
          machine="$runtime_dir/machine.exe"
          webview_loader="$runtime_dir/WebView2Loader.dll"
          test -f "$daemon" -a -f "$machine" -a -f "$webview_loader"
          endpoint_host="$(node -e 'process.stdout.write(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).host)')"
          endpoint_port="$(node -e 'process.stdout.write(String(JSON.parse(process.env.VM_GUEST_MAINTENANCE_ENDPOINT_JSON).port))')"
          ssh_options=(
            -i "$VM_RUNTIME_SSH_DIR/id_ed25519"
            -o "CertificateFile=$VM_RUNTIME_SSH_DIR/id_ed25519-cert.pub"
            -o "UserKnownHostsFile=$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH"
            -o "HostKeyAlias=$VM_RUNTIME_SSH_HOST_KEY_ALIAS"
            -o StrictHostKeyChecking=yes
            -o IdentitiesOnly=yes
            -o IdentityAgent=none
            -o BatchMode=yes
            -o ProxyCommand=none
          )
          target="${WINDOWS_SSH_USER}@${endpoint_host}"
          scp -O -P "$endpoint_port" "${ssh_options[@]}" "$daemon" "$target:C:/Windows/Temp/vem-current-vending-daemon.exe"
          scp -O -P "$endpoint_port" "${ssh_options[@]}" "$machine" "$target:C:/Windows/Temp/vem-current-machine.exe"
          scp -O -P "$endpoint_port" "${ssh_options[@]}" "$webview_loader" "$target:C:/Windows/Temp/vem-current-WebView2Loader.dll"
          remote_script='$ErrorActionPreference = "Stop"; $runtimeRoot = "C:\VEM\bringup"; $daemon = Join-Path $runtimeRoot "vending-daemon.exe"; $machine = Join-Path $runtimeRoot "machine.exe"; $webviewLoader = Join-Path $runtimeRoot "WebView2Loader.dll"; $manifestPath = "C:\ProgramData\VEM\factory\factory-runtime-manifest.json"; Stop-ScheduledTask -TaskName "VEMMachineUI" -ErrorAction SilentlyContinue; Get-Process -Name "machine" -ErrorAction SilentlyContinue | Stop-Process -Force; Stop-Service -Name "VemVendingDaemon" -Force; Copy-Item -LiteralPath "C:\Windows\Temp\vem-current-vending-daemon.exe" -Destination $daemon -Force; Copy-Item -LiteralPath "C:\Windows\Temp\vem-current-machine.exe" -Destination $machine -Force; Copy-Item -LiteralPath "C:\Windows\Temp\vem-current-WebView2Loader.dll" -Destination $webviewLoader -Force; Remove-Item -LiteralPath "C:\Windows\Temp\vem-current-vending-daemon.exe","C:\Windows\Temp\vem-current-machine.exe","C:\Windows\Temp\vem-current-WebView2Loader.dll" -Force; $manifest = [IO.File]::ReadAllText($manifestPath, [Text.Encoding]::UTF8) | ConvertFrom-Json; foreach ($entry in @(@{ component = "daemon"; path = $daemon }, @{ component = "ui"; path = $machine })) { $component = @($manifest.components | Where-Object { $_.component -eq $entry.component }); if ($component.Count -ne 1) { throw "Factory runtime manifest $($entry.component) component is missing or ambiguous" }; $component[0].sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $entry.path).Hash.ToLowerInvariant() }; [IO.File]::WriteAllText($manifestPath, ($manifest | ConvertTo-Json -Depth 50), [Text.UTF8Encoding]::new($false)); Start-Service -Name "VemVendingDaemon"; Start-ScheduledTask -TaskName "VEMMachineUI"'
          encoded_script="$(printf '%s' "$remote_script" | iconv -f UTF-8 -t UTF-16LE | base64 -w0)"
          ssh -p "$endpoint_port" "${ssh_options[@]}" "$target" "powershell.exe -NoProfile -NonInteractive -EncodedCommand $encoded_script"

      - name: Prepare Protected Simulated Scanner Code
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          scanner_code_file="$RUNNER_TEMP/vem-scanner-code-$RUN_ID"
          node -e 'const { randomInt } = require("node:crypto"); let value = "28"; while (value.length < 18) value += randomInt(10); process.stdout.write(value)' > "$scanner_code_file"
          chmod 600 "$scanner_code_file"
          echo "VEM_VM_HOST_SCANNER_CODE_FILE=$scanner_code_file" >> "$GITHUB_ENV"

      - name: Run VM Runtime Acceptance
        run: |
          set -euo pipefail
          test -n "${VEM_VM_HOST_SCANNER_CODE_FILE:-}"
          test -f "$VEM_VM_HOST_SCANNER_CODE_FILE"
          test "$(stat -c '%a' "$VEM_VM_HOST_SCANNER_CODE_FILE")" = "600"
          VEM_EPHEMERAL_DATABASE_URL="$DATABASE_URL" node scripts/testbed/win10-vem-e2e.mjs \
            --mode vm-runtime-acceptance \
            --run-id "$RUN_ID" \
            --platform-target "self-hosted-${RUN_ID}" \
            --ephemeral-api-base-url "$EPHEMERAL_API_BASE_URL" \
            --ephemeral-mqtt-url "$EPHEMERAL_MQTT_URL" \
            --factory-guest-endpoint-json "$VM_GUEST_MAINTENANCE_ENDPOINT_JSON" \
            --maintenance-relay-session-json "$VM_TESTBED_MAINTENANCE_SESSION_JSON" \
            --maintenance-relay-peer-id "$MAINTENANCE_RELAY_PEER_ID" \
            --maintenance-relay-public-key "$MAINTENANCE_RELAY_PUBLIC_KEY" \
            --maintenance-relay-tunnel-address "$MAINTENANCE_RELAY_TUNNEL_ADDRESS" \
            --maintenance-endpoint-policy-json "$VM_TESTBED_SERIAL_ENDPOINT_POLICY_JSON" \
            --expected-testbed-user "$WINDOWS_SSH_USER" \
            --ssh-known-hosts-path "$VM_RUNTIME_SSH_KNOWN_HOSTS_PATH" \
            --ssh-host-key-alias "$VM_RUNTIME_SSH_HOST_KEY_ALIAS" \
            --identity "$VM_RUNTIME_SSH_DIR/id_ed25519" \
            --certificate "$VM_RUNTIME_SSH_DIR/id_ed25519-cert.pub" \
            --scanner-code-file "$VEM_VM_HOST_SCANNER_CODE_FILE" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json"

      - name: Remove Protected Simulated Scanner Code
        if: always()
        shell: bash
        run: rm -f -- "${VEM_VM_HOST_SCANNER_CODE_FILE:-}"

      - name: Bind Refreshed Kiosk Session For Native Audio Capture
        if: success()
        run: |
          set -euo pipefail
          report="artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json"
          node - "$report" >> "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const value = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const runtime = value.runtimeAcceptanceReport;
          const kiosk = runtime.kioskRuntime;
          if (
            value.ok !== true ||
            value.bringUpStateProgression?.postSaleRuntimeAcceptance !== "passed" ||
            value.displayBinding?.cdpTargetId !== kiosk?.cdpTargetId ||
            runtime.result?.runtimeReady?.status !== "passed" ||
            kiosk?.sessionUser !== "VEMKiosk" ||
            kiosk?.acceptanceOverlayCdp !== true ||
            !Number.isInteger(kiosk.sessionId) ||
            kiosk.sessionId < 1 ||
            typeof kiosk.url !== "string" ||
            kiosk.url !== "http://tauri.localhost/#/" ||
            typeof kiosk.cdpTargetId !== "string" ||
            !/^[A-Za-z0-9._:-]{8,256}$/.test(kiosk.cdpTargetId) ||
            !Number.isInteger(kiosk.processId) ||
            !Number.isInteger(kiosk.cdpListenerProcessId) ||
            kiosk.cdpListenerSessionId !== kiosk.sessionId ||
            kiosk.cdpMachineAncestorProcessId !== kiosk.processId
          ) throw new Error("runtime acceptance did not observe an active VEMKiosk session");
          process.stdout.write(`VEM_ACTIVE_KIOSK_SESSION_USER=${kiosk.sessionUser}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_SESSION_ID=${kiosk.sessionId}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_TAURI_ROUTE=${kiosk.url}\n`);
          process.stdout.write(`VEM_ACTIVE_KIOSK_CDP_TARGET_ID=${kiosk.cdpTargetId}\n`);
          NODE

      - name: Capture Windows Display Evidence Through Host Adapter
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation capture-display \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --maintenance-relay-session-json "$VM_TESTBED_MAINTENANCE_SESSION_JSON" \
            --maintenance-endpoint-policy-json "$VM_TESTBED_ENDPOINT_POLICY_JSON" \
            --active-kiosk-session-user "$VEM_ACTIVE_KIOSK_SESSION_USER" \
            --active-kiosk-session-id "$VEM_ACTIVE_KIOSK_SESSION_ID" \
            --tauri-route "$VEM_ACTIVE_KIOSK_TAURI_ROUTE" \
            --cdp-target-id "$VEM_ACTIVE_KIOSK_CDP_TARGET_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-display-capture-report.json"

      - name: Capture Windows Default Audio Evidence Through Host Adapter
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation capture-default-audio \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --maintenance-relay-session-json "$VM_TESTBED_MAINTENANCE_SESSION_JSON" \
            --maintenance-endpoint-policy-json "$VM_TESTBED_ENDPOINT_POLICY_JSON" \
            --active-kiosk-session-user "$VEM_ACTIVE_KIOSK_SESSION_USER" \
            --active-kiosk-session-id "$VEM_ACTIVE_KIOSK_SESSION_ID" \
            --selected-audio-endpoint-id "$VEM_VM_AUDIO_ENDPOINT_ID" \
            --daemon-calibration-response-out "artifacts/vm-runtime-acceptance/${RUN_ID}/daemon-audio-calibration-response.json" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-audio-capture-report.json"

      - name: Verify Windows Native Audio Evidence
        if: success()
        run: |
          set -euo pipefail
          node scripts/testbed/windows-native-audio-evidence.mjs \
            --run-id "$RUN_ID" \
            --runtime-report "artifacts/vm-runtime-acceptance/${RUN_ID}/win10-runtime-acceptance-report.json" \
            --adapter-report "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-audio-capture-report.json" \
            --daemon-calibration-response "artifacts/vm-runtime-acceptance/${RUN_ID}/daemon-audio-calibration-response.json" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/windows-native-audio-evidence.json"

      - name: Cleanup VM Host Adapter Overlay
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          node scripts/testbed/run-vm-host-adapter.mjs \
            --operation cleanup \
            --run-id "$RUN_ID" \
            --target-identity "$VEM_VM_HOST_TARGET_ID" \
            --approved-runtime-base "$VEM_VM_HOST_APPROVED_BASE_ID" \
            --out "artifacts/vm-runtime-acceptance/${RUN_ID}/vm-host-cleanup-report.json"

      - name: Cleanup Ephemeral Services
        if: always()
        run: |
          set +e
          cleanup_status=0
          ssh_directory="${VM_RUNTIME_SSH_DIR:-$RUNNER_TEMP/vem-vm-runtime-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          if [ -f service-api.pid ]; then kill "$(cat service-api.pid)" 2>/dev/null || true; fi
          docker rm -f "vem-runtime-postgres-${GITHUB_RUN_ID}" "vem-runtime-mqtt-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true
          rm -rf -- "$ssh_directory"
          ssh_cleanup_status="$?"
          if [ "$ssh_cleanup_status" -ne 0 ] || [ -e "$ssh_directory" ]; then
            echo "::error::Run-scoped VM runtime SSH directory cleanup failed."
            cleanup_status=1
          fi
          mkdir -p "artifacts/vm-runtime-acceptance/${RUN_ID}"
          {
            echo "cleanup.sshDirectoryRemoved=$([ "$ssh_cleanup_status" -eq 0 ] && [ ! -e "$ssh_directory" ] && echo true || echo false)"
            echo "cleanup.localServicesStopped=true"
          } >> "artifacts/vm-runtime-acceptance/${RUN_ID}/local-direct-cleanup-diagnostics.txt" 2>/dev/null || true
          exit "$cleanup_status"

      - name: Guard Local VM Acceptance Credential Evidence
        id: credential_leak_guard
        if: always()
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const sshDirectory = process.env.VM_RUNTIME_SSH_DIR ?? path.join(
            process.env.RUNNER_TEMP,
            `vem-vm-runtime-ssh-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}`,
          );
          const leaks = [];
          for (const name of ["id_ed25519", "id_ed25519.pub", "id_ed25519-cert.pub", "known_hosts"]) {
            const candidate = path.join(sshDirectory, name);
            if (fs.existsSync(candidate)) leaks.push(candidate);
          }
          if (fs.existsSync(sshDirectory)) leaks.push(sshDirectory);
          const roots = [
            path.join("artifacts", "vm-runtime-acceptance", process.env.RUN_ID),
            "service-api.log",
          ];
          const jwt = /\beyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\b/;
          const plaintextTokenField = /"(?:accessToken|idToken)"\s*:\s*"(?!\[REDACTED\])[^"\r\n]+"/;
          function visit(candidate) {
            if (!fs.existsSync(candidate)) return;
            const stat = fs.statSync(candidate);
            if (stat.isDirectory()) {
              for (const entry of fs.readdirSync(candidate)) visit(path.join(candidate, entry));
              return;
            }
            if (stat.size > 10 * 1024 * 1024) return;
            const content = fs.readFileSync(candidate);
            if (content.includes(0)) return;
            const text = content.toString("utf8");
            if (jwt.test(text) || plaintextTokenField.test(text)) leaks.push(candidate);
          }
          for (const root of roots) visit(root);
          if (leaks.length > 0) {
            throw new Error(`VM runtime credential material found in: ${leaks.join(", ")}`);
          }
          console.log("vm-runtime-local-credential-leak-guard=passed");
          NODE

      - name: Upload VM Runtime Acceptance Artifacts
        if: always() && steps.credential_leak_guard.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-runtime-acceptance-${{ env.RUN_ID }}
          path: |
            artifacts/vm-runtime-acceptance/${{ env.RUN_ID }}/
            service-api.log
          if-no-files-found: warn
          retention-days: 14
