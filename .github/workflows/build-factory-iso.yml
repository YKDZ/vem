name: Build Factory ISO

on:
  workflow_dispatch:
permissions:
  actions: read
  contents: read

jobs:
  trust-gate:
    name: Authorize Factory Build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Reject Untrusted Event Ref Actor Or Workflow
        shell: bash
        env:
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch) ;;
            *) echo "Factory media is unavailable to this event" >&2; exit 1 ;;
          esac
          case "$GITHUB_REF" in
            refs/heads/main|refs/tags/factory-v*) ;;
            *) echo "Factory media requires a trusted ref" >&2; exit 1 ;;
          esac
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          case "$OBSERVED_WORKFLOW_REF" in
            "$GITHUB_REPOSITORY"/.github/workflows/*@"$GITHUB_REF") ;;
            *) echo "Factory media requires a same-repository workflow on the trusted ref" >&2; exit 1 ;;
          esac

  build:
    name: Build Reproducible Factory ISO
    needs: trust-gate
    runs-on: [self-hosted, Linux, X64, vem-factory]
    environment: vem-factory-production
    timeout-minutes: 90
    env:
      VEM_FACTORY_WORK_ROOT: ${{ vars.VEM_FACTORY_WORK_ROOT }}
    concurrency:
      group: vem-factory-iso-single-flight
      cancel-in-progress: false
    outputs:
      iso_identity: ${{ steps.result.outputs.iso_identity }}
      provenance_artifact_name: ${{ steps.result.outputs.provenance_artifact_name }}
    steps:
      - name: Guard Protected Factory Runner Before Checkout
        shell: bash
        env:
          RUNNER_LABELS_JSON: '["self-hosted","Linux","X64","vem-factory"]'
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          test -n "${VEM_FACTORY_TRUSTED_RUNNER_NAME:-}"
          test "$RUNNER_NAME" = "$VEM_FACTORY_TRUSTED_RUNNER_NAME"
          case "$OBSERVED_WORKFLOW_REF" in
            "$GITHUB_REPOSITORY"/.github/workflows/*@"$GITHUB_REF") ;;
            *) echo "Factory media requires a same-repository workflow on the trusted ref" >&2; exit 1 ;;
          esac
          node -e '
            const labels = JSON.parse(process.env.RUNNER_LABELS_JSON);
            for (const required of ["self-hosted", "Linux", "X64", "vem-factory"]) {
              if (!labels.includes(required)) throw new Error(`missing trusted runner label: ${required}`);
            }
          '
          for name in \
            VEM_FACTORY_ASSET_STORE \
            VEM_FACTORY_MANIFEST_STORE \
            VEM_FACTORY_WINDOWS_SOURCE_STORE \
            VEM_FACTORY_EVIDENCE_STORE \
            VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT \
            VEM_FACTORY_APPROVAL_POLICY \
            VEM_FACTORY_MANIFEST_IDENTITY \
            VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT \
            VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS \
            VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS \
            VEM_FACTORY_VISION_EVIDENCE_VERIFIER \
            VEM_FACTORY_BUILDER_IMAGE \
            VEM_FACTORY_WORK_ROOT \
            VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH \
            VEM_FACTORY_UDF_EXTRACTOR_DIGEST \
            VEM_FACTORY_UDF_EXTRACTOR_VERSION \
            VEM_FACTORY_UDF_WRITER_CONTAINER_PATH \
            VEM_FACTORY_UDF_WRITER_DIGEST \
            VEM_FACTORY_UDF_WRITER_VERSION \
            VEM_FACTORY_WIMLIB_CONTAINER_PATH \
            VEM_FACTORY_WIMLIB_DIGEST \
            VEM_FACTORY_WIMLIB_VERSION \
            VEM_FACTORY_AUTHENTICODE_VERIFIER_CONTAINER_PATH \
            VEM_FACTORY_AUTHENTICODE_CA_BUNDLE; do
            test -n "${!name:-}" || { echo "runner service environment is missing $name" >&2; exit 1; }
          done
          test -z "${VEM_FACTORY_PERSONALIZATION_MEDIA_PATH:-}" || {
            echo "Factory ISO build must not receive personalization media" >&2
            exit 1
          }
          [[ "$VEM_FACTORY_MANIFEST_IDENTITY" =~ ^sha256:[a-f0-9]{64}$ ]]
          for path in "$VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH" "$VEM_FACTORY_UDF_WRITER_CONTAINER_PATH" "$VEM_FACTORY_WIMLIB_CONTAINER_PATH"; do
            [[ "$path" = /* ]]
          done
          for digest in "$VEM_FACTORY_UDF_EXTRACTOR_DIGEST" "$VEM_FACTORY_UDF_WRITER_DIGEST" "$VEM_FACTORY_WIMLIB_DIGEST"; do
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]
          done
          factory_tool_semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          for version in "$VEM_FACTORY_UDF_EXTRACTOR_VERSION" "$VEM_FACTORY_UDF_WRITER_VERSION" "$VEM_FACTORY_WIMLIB_VERSION"; do
            [[ "$version" =~ $factory_tool_semver ]]
          done
          echo "MANIFEST_IDENTITY=$VEM_FACTORY_MANIFEST_IDENTITY" >> "$GITHUB_ENV"
          factory_work_root="${VEM_FACTORY_WORK_ROOT:?}"
          case "$factory_work_root" in
            /*) ;;
            *) echo "Factory work root must be an absolute host-owned path" >&2; exit 1 ;;
          esac
          test "$factory_work_root" != / || {
            echo "Factory work root must not be the filesystem root" >&2
            exit 1
          }
          test ! -L "$factory_work_root" || {
            echo "Factory work root must not be a symlink" >&2
            exit 1
          }
          factory_work_root_canonical=$(realpath -e -- "$factory_work_root")
          test "$factory_work_root" = "$factory_work_root_canonical" || {
            echo "Factory work root must be canonical and contain no symlink components" >&2
            exit 1
          }
          test -d "$factory_work_root" || {
            echo "Factory work root is not a directory" >&2
            exit 1
          }
          factory_work_root_owner=$(stat -c %u -- "$factory_work_root")
          test "$factory_work_root_owner" = "$(id -u)" || {
            echo "Factory work root must be owned by the current runner user" >&2
            exit 1
          }
          test -w "$factory_work_root" -a -x "$factory_work_root" || {
            echo "Factory work root is not writable and searchable" >&2
            exit 1
          }
          factory_work_root_mode=$(stat -c %a -- "$factory_work_root")
          [[ "$factory_work_root_mode" =~ ^[0-7]{3,4}$ ]]
          (( (8#$factory_work_root_mode & 0077) == 0 )) || {
            echo "Factory work root must not grant group or other permissions" >&2
            exit 1
          }
          for path in \
            "$VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT" \
            "$VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS" \
            "$VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS" \
            "$VEM_FACTORY_VISION_EVIDENCE_VERIFIER"; do
            case "$path" in
              /*) ;;
              *) echo "Vision factory input must be an absolute host-owned Unix path" >&2; exit 1 ;;
            esac
            case "$path" in
              *\\*|*..*|//* ) echo "Vision factory input path is unsafe" >&2; exit 1 ;;
            esac
            test -f "$path" || { echo "Vision factory input is not a regular file" >&2; exit 1; }
            if test -L "$path"; then
              echo "Vision factory input must not be a symlink" >&2
              exit 1
            fi
          done

      - name: Checkout Trusted Ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Exact Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0

      - name: Prepare Factory Disk Scratch and Recover Container State
        id: factory_scratch
        shell: bash
        run: |
          set -euo pipefail
          factory_work_root="${VEM_FACTORY_WORK_ROOT:?}"
          case "$factory_work_root" in
            /*) ;;
            *) echo "Factory work root must be an absolute host-owned path" >&2; exit 1 ;;
          esac
          test "$factory_work_root" != /
          test ! -L "$factory_work_root"
          factory_work_root_canonical=$(realpath -e -- "$factory_work_root")
          test "$factory_work_root" = "$factory_work_root_canonical"
          test -d "$factory_work_root"
          factory_work_root_owner=$(stat -c %u -- "$factory_work_root")
          test "$factory_work_root_owner" = "$(id -u)"
          test -w "$factory_work_root" -a -x "$factory_work_root"
          factory_work_root_mode=$(stat -c %a -- "$factory_work_root")
          [[ "$factory_work_root_mode" =~ ^[0-7]{3,4}$ ]]
          (( (8#$factory_work_root_mode & 0077) == 0 ))
          factory_mount_metadata() {
            factory_mount_path="$1"
            factory_mount_json=$(findmnt --json --target "$factory_mount_path" --output TARGET,SOURCE,FSTYPE,FSROOT,MAJ:MIN) || return 1
            FACTORY_MOUNT_JSON="$factory_mount_json" node -e '
              const mounts = JSON.parse(process.env.FACTORY_MOUNT_JSON).filesystems;
              const mount = Array.isArray(mounts) ? mounts[0] : undefined;
              if (
                typeof mount?.target !== "string" || !mount.target.startsWith("/") ||
                typeof mount?.source !== "string" || !mount.source ||
                typeof mount?.fstype !== "string" || !mount.fstype ||
                typeof mount?.fsroot !== "string" || !mount.fsroot.startsWith("/") ||
                !/^[0-9]+:[0-9]+$/.test(mount?.["maj:min"] ?? "")
              ) process.exit(1);
              process.stdout.write(`${mount.target}\t${mount.source}\t${mount.fstype}\t${mount.fsroot}\t${mount["maj:min"]}\n`);
            '
          }
          factory_mount_effective_path() {
            FACTORY_MOUNT_TARGET="$1" \
              FACTORY_MOUNT_FSROOT="$2" \
              FACTORY_CONFIGURED_PATH="$3" node -e '
                const path = require("node:path").posix;
                const target = process.env.FACTORY_MOUNT_TARGET;
                const fsroot = process.env.FACTORY_MOUNT_FSROOT;
                const configured = process.env.FACTORY_CONFIGURED_PATH;
                const valid = (value) =>
                  typeof value === "string" &&
                  value.startsWith("/") &&
                  !value.split("/").some((part) => part === "." || part === "..");
                if (!valid(target) || !valid(fsroot) || !valid(configured)) process.exit(1);
                const relative = path.relative(target, configured);
                if (relative === ".." || relative.startsWith("../") || path.isAbsolute(relative)) process.exit(1);
                const effective = path.normalize(path.join(fsroot, relative));
                if (!effective.startsWith("/")) process.exit(1);
                process.stdout.write(effective);
              '
          }
          read -r factory_mount_target factory_mount_source factory_filesystem_type factory_mount_fsroot factory_mount_device < <(
            factory_mount_metadata "$factory_work_root"
          ) || {
            echo "Factory work root mount is incomplete" >&2
            exit 1
          }
          factory_mount_target=$(realpath -e -- "$factory_mount_target") || exit 1
          if [[ "$factory_mount_target" != / && "$factory_work_root" != "$factory_mount_target" && "$factory_work_root" != "$factory_mount_target"/* ]]; then
            echo "Factory work root mount does not contain the configured path" >&2
            exit 1
          fi
          factory_work_effective_path=$(factory_mount_effective_path "$factory_mount_target" "$factory_mount_fsroot" "$factory_work_root") || {
            echo "Factory work root mount metadata is unsafe" >&2
            exit 1
          }
          case "$factory_filesystem_type" in
            ext2/ext3|ext2|ext3|ext4|xfs|btrfs|zfs) ;;
            *overlay*|fuse.overlayfs)
              echo "Factory work root must not use an overlay filesystem" >&2
              exit 1
              ;;
            *)
              echo "Factory work root must use an approved host disk filesystem" >&2
              exit 1
              ;;
          esac
          factory_docker_info=$(docker info --format '{{json .}}') || {
            echo "Docker daemon information cannot be confirmed" >&2
            exit 1
          }
          factory_docker_root=$(FACTORY_DOCKER_INFO="$factory_docker_info" node -e '
            const info = JSON.parse(process.env.FACTORY_DOCKER_INFO);
            if (typeof info.DockerRootDir !== "string" || !info.DockerRootDir.startsWith("/")) process.exit(1);
            process.stdout.write(info.DockerRootDir);
          ') || {
            echo "Docker data-root cannot be confirmed" >&2
            exit 1
          }
          factory_docker_root=$(realpath -e -- "$factory_docker_root") || {
            echo "Docker data-root cannot be resolved" >&2
            exit 1
          }
          case "$factory_work_root/" in
            "$factory_docker_root/"*)
              echo "Factory work root must not be inside Docker data-root" >&2
              exit 1
              ;;
          esac
          read -r factory_docker_mount_target factory_docker_mount_source factory_docker_filesystem_type factory_docker_mount_fsroot factory_docker_mount_device < <(
            factory_mount_metadata "$factory_docker_root"
          ) || {
            echo "Docker data-root mount cannot be confirmed" >&2
            exit 1
          }
          factory_docker_mount_target=$(realpath -e -- "$factory_docker_mount_target") || exit 1
          factory_docker_effective_path=$(factory_mount_effective_path "$factory_docker_mount_target" "$factory_docker_mount_fsroot" "$factory_docker_root") || {
            echo "Docker data-root mount metadata is unsafe" >&2
            exit 1
          }
          if [[ "$factory_mount_device" = "$factory_docker_mount_device" ]]; then
            if FACTORY_DOCKER_EFFECTIVE_PATH="$factory_docker_effective_path" \
              FACTORY_WORK_EFFECTIVE_PATH="$factory_work_effective_path" node -e '
                const path = require("node:path").posix;
                const docker = process.env.FACTORY_DOCKER_EFFECTIVE_PATH;
                const work = process.env.FACTORY_WORK_EFFECTIVE_PATH;
                const relative = path.relative(docker, work);
                process.exit(relative === "" || (!relative.startsWith("../") && relative !== ".." && !path.isAbsolute(relative)) ? 0 : 1);
              '; then
              echo "Factory work root falls within Docker data-root on the same device" >&2
              exit 1
            fi
          fi
          factory_docker_builder_image="${VEM_FACTORY_BUILDER_IMAGE#oci://}"
          [[ "$factory_docker_builder_image" != "$VEM_FACTORY_BUILDER_IMAGE" ]]
          [[ "$factory_docker_builder_image" =~ ^[a-z0-9]+([._-][a-z0-9]+)*(:[0-9]+)?(/[a-z0-9]+([._-][a-z0-9]+)*)+@sha256:[a-f0-9]{64}$ ]]
          docker pull "$factory_docker_builder_image"
          factory_builder_image_id=$(docker image inspect --format '{{.Id}}' "$factory_docker_builder_image")
          factory_labeled_containers=$(docker ps -aq \
            --filter "label=io.vem.factory.role=build" \
            --filter "label=io.vem.factory.runner=$RUNNER_NAME")
          if test -n "$factory_labeled_containers"; then
            docker rm -f $factory_labeled_containers
          fi
          factory_container_absent() {
            factory_container_candidate="$1"
            [[ "$factory_container_candidate" =~ ^[a-f0-9]{64}$ ]] || return 2
            factory_container_matches=$(docker ps -aq --no-trunc --filter "id=$factory_container_candidate") || return 2
            if test -z "$factory_container_matches"; then
              return 0
            fi
            while IFS= read -r factory_container_match; do
              test "$factory_container_match" = "$factory_container_candidate" || return 2
              return 1
            done <<< "$factory_container_matches"
            return 2
          }
          for factory_orphan_container in $(docker ps -aq --no-trunc --filter "ancestor=$factory_docker_builder_image"); do
            if ! factory_orphan_inspection=$(docker inspect "$factory_orphan_container" 2>/dev/null); then
              factory_orphan_absence=0
              factory_container_absent "$factory_orphan_container" || factory_orphan_absence=$?
              if (( factory_orphan_absence == 0 )); then
                continue
              fi
              echo "Factory orphan container cannot be inspected or confirmed absent" >&2
              exit 1
            fi
            if FACTORY_ORPHAN_INSPECTION="$factory_orphan_inspection" \
              FACTORY_BUILDER_IMAGE_ID="$factory_builder_image_id" node -e '
                const [container] = JSON.parse(process.env.FACTORY_ORPHAN_INSPECTION);
                const args = container?.Args;
                const exact =
                  container?.Image === process.env.FACTORY_BUILDER_IMAGE_ID &&
                  container?.Path === "node" &&
                  Array.isArray(args) &&
                  args[0] === "/workspace/repo/scripts/factory/factory-cli.mjs" &&
                  container?.HostConfig?.NetworkMode === "none" &&
                  container?.HostConfig?.ReadonlyRootfs === true &&
                  args.includes("--manifest-store") &&
                  args.includes("--reproducibility");
                process.exit(exact ? 0 : 1);
              '; then
              docker rm -f "$factory_orphan_container"
            fi
          done
          test ! -L "$factory_work_root"
          test "$(realpath -e -- "$factory_work_root")" = "$factory_work_root"
          test -d "$factory_work_root"
          test "$(stat -c %u -- "$factory_work_root")" = "$(id -u)"
          test -w "$factory_work_root" -a -x "$factory_work_root"
          factory_work_root_mode=$(stat -c %a -- "$factory_work_root")
          [[ "$factory_work_root_mode" =~ ^[0-7]{3,4}$ ]]
          (( (8#$factory_work_root_mode & 0077) == 0 ))
          while IFS= read -r -d '' factory_stale_name; do
            [[ "$factory_stale_name" =~ ^vem-factory-work-[0-9]+-[0-9]+-[A-Za-z0-9]{6}$ ]] || continue
            factory_stale_directory="$factory_work_root/$factory_stale_name"
            test -d "$factory_stale_directory"
            test ! -L "$factory_stale_directory"
            rm -rf -- "$factory_stale_directory"
          done < <(find "$factory_work_root" -mindepth 1 -maxdepth 1 -type d -printf '%f\0')
          manifest_path="$VEM_FACTORY_MANIFEST_STORE/sha256/${MANIFEST_IDENTITY#sha256:}.json"
          test -f "$manifest_path"
          test ! -L "$manifest_path"
          windows_source_digest=$(MANIFEST_PATH="$manifest_path" node -e '
            const fs = require("node:fs");
            const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, "utf8"));
            const media = manifest?.source?.windowsMedia;
            if (media?.role !== "windows-source-iso" || !/^sha256:[a-f0-9]{64}$/.test(media?.digest ?? "")) process.exit(1);
            process.stdout.write(media.digest);
          ')
          windows_source_path="$VEM_FACTORY_WINDOWS_SOURCE_STORE/sha256/${windows_source_digest#sha256:}"
          test -f "$windows_source_path"
          test ! -L "$windows_source_path"
          windows_source_bytes=$(stat -c %s -- "$windows_source_path")
          [[ "$windows_source_bytes" =~ ^[1-9][0-9]*$ ]]
          (( windows_source_bytes <= 922337203685477580 )) || {
            echo "Windows source is too large for Factory scratch capacity arithmetic" >&2
            exit 1
          }
          factory_required_bytes=$((120 * 1024 * 1024 * 1024))
          factory_source_required_bytes=$((windows_source_bytes * 10))
          if (( factory_source_required_bytes > factory_required_bytes )); then
            factory_required_bytes=$factory_source_required_bytes
          fi
          read -r factory_available_blocks factory_block_size factory_available_inodes < <(
            stat -f -c '%a %S %d' -- "$factory_work_root"
          )
          [[ "$factory_available_blocks" =~ ^[0-9]+$ ]]
          [[ "$factory_block_size" =~ ^[1-9][0-9]*$ ]]
          [[ "$factory_available_inodes" =~ ^[0-9]+$ ]]
          factory_required_blocks=$((factory_required_bytes / factory_block_size))
          if (( factory_required_bytes % factory_block_size != 0 )); then
            (( factory_required_blocks += 1 ))
          fi
          (( factory_available_blocks >= factory_required_blocks )) || {
            echo "Factory work root has insufficient available bytes" >&2
            exit 1
          }
          case "$factory_filesystem_type" in
            ext2/ext3|ext2|ext3|ext4)
              (( factory_available_inodes >= 100000 )) || {
                echo "Factory work root has insufficient available inodes" >&2
                exit 1
              }
              ;;
            btrfs|xfs|zfs) ;;
          esac
          umask 077
          factory_work_directory=$(mktemp -d -- "$factory_work_root/vem-factory-work-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-XXXXXX")
          test -d "$factory_work_directory"
          test ! -L "$factory_work_directory"
          test "$(dirname "$factory_work_directory")" = "$factory_work_root"
          install -d -m 0700 "$factory_work_directory/tmp" "$factory_work_directory/home" "$factory_work_directory/output"
          printf 'FACTORY_WORK_DIRECTORY=%s\n' "$factory_work_directory" >> "$GITHUB_ENV"
          printf 'FACTORY_OUTPUT_DIRECTORY=%s\n' "$factory_work_directory/output" >> "$GITHUB_ENV"
          factory_container_name="vem-factory-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            printf 'FACTORY_DOCKER_BUILDER_IMAGE=%s\n' "$factory_docker_builder_image"
            printf 'FACTORY_CONTAINER_NAME=%s\n' "$factory_container_name"
          } >> "$GITHUB_ENV"
          {
            printf 'factory_output_directory=%s\n' "$factory_work_directory/output"
          } >> "$GITHUB_OUTPUT"

      - name: Build Through Manifest-Pinned Offline Toolchain
        shell: bash
        run: |
          set -euo pipefail
          factory_expected_container_name="vem-factory-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          test "$FACTORY_CONTAINER_NAME" = "$factory_expected_container_name"
          test -d "$FACTORY_OUTPUT_DIRECTORY"
          test "$(dirname "$FACTORY_OUTPUT_DIRECTORY")" = "$FACTORY_WORK_DIRECTORY"
          factory_build_log="$FACTORY_WORK_DIRECTORY/factory-build.log"
          if ! docker run --name "$FACTORY_CONTAINER_NAME" \
            --cidfile "$FACTORY_WORK_DIRECTORY/factory-container.cid" \
            --label "io.vem.factory.role=build" \
            --label "io.vem.factory.runner=$RUNNER_NAME" \
            --label "io.vem.factory.run=$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" \
            --network none --read-only --user "$(id -u):$(id -g)" \
            --memory 16g --memory-swap 16g --pids-limit 512 --cpus 6 \
            --log-driver=none \
            --tmpfs /tmp:rw,nosuid,nodev,size=512m \
            --env "VEM_FACTORY_EXECUTED_BUILDER_IMAGE=$VEM_FACTORY_BUILDER_IMAGE" \
            --env TMPDIR=/factory-work/tmp \
            --env HOME=/factory-work/home \
            --env "VEM_FACTORY_EXPECTED_UDF_EXTRACTOR_DIGEST=$VEM_FACTORY_UDF_EXTRACTOR_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_UDF_EXTRACTOR_VERSION=$VEM_FACTORY_UDF_EXTRACTOR_VERSION" \
            --env "VEM_FACTORY_EXPECTED_UDF_WRITER_DIGEST=$VEM_FACTORY_UDF_WRITER_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_UDF_WRITER_VERSION=$VEM_FACTORY_UDF_WRITER_VERSION" \
            --env "VEM_FACTORY_EXPECTED_WIMLIB_DIGEST=$VEM_FACTORY_WIMLIB_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_WIMLIB_VERSION=$VEM_FACTORY_WIMLIB_VERSION" \
            --mount "type=bind,src=$GITHUB_WORKSPACE,dst=/workspace/repo,readonly" \
            --mount "type=bind,src=$FACTORY_WORK_DIRECTORY,dst=/factory-work" \
            --mount "type=bind,src=$VEM_FACTORY_ASSET_STORE,dst=/factory-assets" \
            --mount "type=bind,src=$VEM_FACTORY_MANIFEST_STORE,dst=/factory-manifests,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_WINDOWS_SOURCE_STORE,dst=/windows-source,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_EVIDENCE_STORE,dst=/factory-evidence,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_APPROVAL_POLICY,dst=/factory-policy/approval.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT,dst=/factory-vision/delivery-unit.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS,dst=/factory-vision/repository-trust.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS,dst=/factory-vision/factory-trust.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_VISION_EVIDENCE_VERIFIER,dst=/factory-vision/vision-release-verifier,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_AUTHENTICODE_CA_BUNDLE,dst=/factory-policy/authenticode-ca.pem,readonly" \
            --mount "type=bind,src=$FACTORY_OUTPUT_DIRECTORY,dst=/factory-output" \
            "$FACTORY_DOCKER_BUILDER_IMAGE" \
            node /workspace/repo/scripts/factory/factory-cli.mjs \
              --manifest-store /factory-manifests \
              --asset-store /factory-assets \
              --windows-source-store /windows-source \
              --evidence-store /factory-evidence \
              --approval-policy /factory-policy/approval.json \
              --vision-release-delivery-unit /factory-vision/delivery-unit.json \
              --repository-vision-trusted-roots /factory-vision/repository-trust.json \
              --factory-vision-trusted-roots /factory-vision/factory-trust.json \
              --vision-evidence-verifier /factory-vision/vision-release-verifier \
              --udf-extractor "$VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH" \
              --udf-writer "$VEM_FACTORY_UDF_WRITER_CONTAINER_PATH" \
              --wimlib "$VEM_FACTORY_WIMLIB_CONTAINER_PATH" \
              --authenticode-verifier "$VEM_FACTORY_AUTHENTICODE_VERIFIER_CONTAINER_PATH" \
              --authenticode-ca-bundle /factory-policy/authenticode-ca.pem \
              --output-dir /factory-output \
              --manifest-identity "$MANIFEST_IDENTITY" \
              --reproducibility >"$factory_build_log" 2>&1; then
            tail -c 65536 "$factory_build_log" >&2
            exit 1
          fi

      - name: Validate Sanitized Evidence Allowlist
        id: result
        shell: bash
        run: |
          set -euo pipefail
          node scripts/factory/sanitize-build-evidence.mjs \
            --directory "$FACTORY_OUTPUT_DIRECTORY"
          iso_identity=$(node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).isoIdentity)' "$FACTORY_OUTPUT_DIRECTORY/factory-build-result.json")
          echo "iso_identity=$iso_identity" >> "$GITHUB_OUTPUT"
          echo "provenance_artifact_name=factory-provenance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Publish Immutable Factory Acceptance Handoff
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT" = /* ]]
          handoff="$VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT"
          staging="${handoff}.tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$staging"
          install -d -m 0700 "$staging"
          install -m 0444 "$FACTORY_OUTPUT_DIRECTORY/factory-build-result.json" "$staging/factory-build-result.json"
          install -m 0444 "$FACTORY_OUTPUT_DIRECTORY/factory-provenance.json" "$staging/factory-provenance.json"
          rm -rf "$handoff"
          mv "$staging" "$handoff"

      - name: Upload Sanitized Factory Evidence Only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: factory-provenance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ steps.factory_scratch.outputs.factory_output_directory }}/factory-provenance.json
            ${{ steps.factory_scratch.outputs.factory_output_directory }}/factory-build-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Remove Run-Isolated Factory Work Scratch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          factory_work_directory="${FACTORY_WORK_DIRECTORY:-}"
          factory_work_root="${VEM_FACTORY_WORK_ROOT:?}"
          test "$factory_work_root" != /
          test ! -L "$factory_work_root"
          factory_work_root_canonical=$(realpath -e -- "$factory_work_root")
          test "$factory_work_root" = "$factory_work_root_canonical"
          test -d "$factory_work_root"
          test "$(stat -c %u -- "$factory_work_root")" = "$(id -u)"
          test -w "$factory_work_root" -a -x "$factory_work_root"
          factory_work_root_mode=$(stat -c %a -- "$factory_work_root")
          [[ "$factory_work_root_mode" =~ ^[0-7]{3,4}$ ]]
          (( (8#$factory_work_root_mode & 0077) == 0 ))
          factory_work_prefix="$factory_work_root/vem-factory-work-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-"
          factory_expected_container_name="vem-factory-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          factory_expected_run="$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          factory_container_absent() {
            factory_container_candidate="$1"
            if [[ "$factory_container_candidate" =~ ^[a-f0-9]{64}$ ]]; then
              factory_container_matches=$(docker ps -aq --no-trunc --filter "id=$factory_container_candidate") || return 2
              if test -z "$factory_container_matches"; then
                return 0
              fi
              while IFS= read -r factory_container_match; do
                test "$factory_container_match" = "$factory_container_candidate" || return 2
                return 1
              done <<< "$factory_container_matches"
              return 2
            fi
            factory_container_matches=$(docker ps -aq --filter "name=^/${factory_container_candidate}$") || return 2
            test -z "$factory_container_matches"
          }
          factory_container_is_current() {
            factory_container_candidate="$1"
            if ! factory_container_inspection=$(docker inspect "$factory_container_candidate" 2>/dev/null); then
              factory_container_absence=0
              factory_container_absent "$factory_container_candidate" || factory_container_absence=$?
              case "$factory_container_absence" in
                0) return 1 ;;
                1) echo "Factory container cannot be inspected: $factory_container_candidate" >&2; return 2 ;;
                *) echo "Factory container absence cannot be confirmed: $factory_container_candidate" >&2; return 2 ;;
              esac
            fi
            FACTORY_EXPECTED_RUN="$factory_expected_run" \
              FACTORY_RUNNER_NAME="$RUNNER_NAME" node -e '
                const [container] = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
                const labels = container?.Config?.Labels;
                process.exit(
                  labels?.["io.vem.factory.role"] === "build" &&
                    labels?.["io.vem.factory.runner"] === process.env.FACTORY_RUNNER_NAME &&
                    labels?.["io.vem.factory.run"] === process.env.FACTORY_EXPECTED_RUN
                    ? 0
                    : 1,
                );
              ' <<< "$factory_container_inspection"
          }
          factory_remove_current_container() {
            factory_container_candidate="$1"
            factory_container_status=0
            factory_container_is_current "$factory_container_candidate" || factory_container_status=$?
            case "$factory_container_status" in
              0) ;;
              1) return 0 ;;
              *) return 1 ;;
            esac
            if ! docker rm -f "$factory_container_candidate" >/dev/null; then
              factory_container_absence=0
              factory_container_absent "$factory_container_candidate" || factory_container_absence=$?
              if (( factory_container_absence == 0 )); then
                return 0
              fi
              echo "Factory container removal or absence confirmation failed: $factory_container_candidate" >&2
              return 1
            fi
            factory_container_absence=0
            factory_container_absent "$factory_container_candidate" || factory_container_absence=$?
            if (( factory_container_absence != 0 )); then
              echo "Factory container remains or absence cannot be confirmed: $factory_container_candidate" >&2
              return 1
            fi
          }
          factory_container_id=""
          if test -n "$factory_work_directory"; then
            case "$factory_work_directory" in
              "$factory_work_prefix"*) ;;
              *) echo "Refusing to remove Factory work directory outside this run" >&2; exit 1 ;;
            esac
            test "$(dirname "$factory_work_directory")" = "$factory_work_root"
            if test -e "$factory_work_directory"; then
              test -d "$factory_work_directory"
              test ! -L "$factory_work_directory"
              test "$(stat -c %u -- "$factory_work_directory")" = "$(id -u)"
              if test -f "$factory_work_directory/factory-container.cid" && test ! -L "$factory_work_directory/factory-container.cid"; then
                factory_container_id=$(<"$factory_work_directory/factory-container.cid")
                [[ "$factory_container_id" =~ ^[a-f0-9]{64}$ ]] || factory_container_id=""
              fi
            fi
          fi
          if test -n "$factory_container_id"; then
            factory_remove_current_container "$factory_container_id"
          fi
          factory_remove_current_container "$factory_expected_container_name"
          test -n "$factory_work_directory" || exit 0
          test -d "$factory_work_directory" || exit 0
          rm -rf -- "$factory_work_directory"
