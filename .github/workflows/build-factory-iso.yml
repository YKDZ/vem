name: Build Factory ISO

on:
  workflow_dispatch:
permissions:
  actions: read
  contents: read

jobs:
  trust-gate:
    name: Authorize Factory Build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Reject Untrusted Event Ref Actor Or Workflow
        shell: bash
        env:
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch) ;;
            *) echo "Factory media is unavailable to this event" >&2; exit 1 ;;
          esac
          case "$GITHUB_REF" in
            refs/heads/main|refs/tags/factory-v*) ;;
            *) echo "Factory media requires a trusted ref" >&2; exit 1 ;;
          esac
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          case "$OBSERVED_WORKFLOW_REF" in
            "$GITHUB_REPOSITORY"/.github/workflows/*@"$GITHUB_REF") ;;
            *) echo "Factory media requires a same-repository workflow on the trusted ref" >&2; exit 1 ;;
          esac

  build:
    name: Build Reproducible Factory ISO
    needs: trust-gate
    runs-on: [self-hosted, Linux, X64, vem-factory]
    environment: vem-factory-production
    timeout-minutes: 90
    outputs:
      iso_identity: ${{ steps.result.outputs.iso_identity }}
      provenance_artifact_name: ${{ steps.result.outputs.provenance_artifact_name }}
    steps:
      - name: Guard Protected Factory Runner Before Checkout
        shell: bash
        env:
          RUNNER_LABELS_JSON: '["self-hosted","Linux","X64","vem-factory"]'
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          test -n "${VEM_FACTORY_TRUSTED_RUNNER_NAME:-}"
          test "$RUNNER_NAME" = "$VEM_FACTORY_TRUSTED_RUNNER_NAME"
          case "$OBSERVED_WORKFLOW_REF" in
            "$GITHUB_REPOSITORY"/.github/workflows/*@"$GITHUB_REF") ;;
            *) echo "Factory media requires a same-repository workflow on the trusted ref" >&2; exit 1 ;;
          esac
          node -e '
            const labels = JSON.parse(process.env.RUNNER_LABELS_JSON);
            for (const required of ["self-hosted", "Linux", "X64", "vem-factory"]) {
              if (!labels.includes(required)) throw new Error(`missing trusted runner label: ${required}`);
            }
          '
          for name in \
            VEM_FACTORY_ASSET_STORE \
            VEM_FACTORY_MANIFEST_STORE \
            VEM_FACTORY_WINDOWS_SOURCE_STORE \
            VEM_FACTORY_EVIDENCE_STORE \
            VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT \
            VEM_FACTORY_APPROVAL_POLICY \
            VEM_FACTORY_MANIFEST_IDENTITY \
            VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT \
            VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS \
            VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS \
            VEM_FACTORY_VISION_EVIDENCE_VERIFIER \
            VEM_FACTORY_BUILDER_IMAGE \
            VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH \
            VEM_FACTORY_UDF_EXTRACTOR_DIGEST \
            VEM_FACTORY_UDF_EXTRACTOR_VERSION \
            VEM_FACTORY_UDF_WRITER_CONTAINER_PATH \
            VEM_FACTORY_UDF_WRITER_DIGEST \
            VEM_FACTORY_UDF_WRITER_VERSION \
            VEM_FACTORY_WIMLIB_CONTAINER_PATH \
            VEM_FACTORY_WIMLIB_DIGEST \
            VEM_FACTORY_WIMLIB_VERSION \
            VEM_FACTORY_AUTHENTICODE_VERIFIER_CONTAINER_PATH \
            VEM_FACTORY_AUTHENTICODE_CA_BUNDLE; do
            test -n "${!name:-}" || { echo "runner service environment is missing $name" >&2; exit 1; }
          done
          test -z "${VEM_FACTORY_PERSONALIZATION_MEDIA_PATH:-}" || {
            echo "Factory ISO build must not receive personalization media" >&2
            exit 1
          }
          [[ "$VEM_FACTORY_MANIFEST_IDENTITY" =~ ^sha256:[a-f0-9]{64}$ ]]
          for path in "$VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH" "$VEM_FACTORY_UDF_WRITER_CONTAINER_PATH" "$VEM_FACTORY_WIMLIB_CONTAINER_PATH"; do
            [[ "$path" = /* ]]
          done
          for digest in "$VEM_FACTORY_UDF_EXTRACTOR_DIGEST" "$VEM_FACTORY_UDF_WRITER_DIGEST" "$VEM_FACTORY_WIMLIB_DIGEST"; do
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]
          done
          factory_tool_semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          for version in "$VEM_FACTORY_UDF_EXTRACTOR_VERSION" "$VEM_FACTORY_UDF_WRITER_VERSION" "$VEM_FACTORY_WIMLIB_VERSION"; do
            [[ "$version" =~ $factory_tool_semver ]]
          done
          echo "MANIFEST_IDENTITY=$VEM_FACTORY_MANIFEST_IDENTITY" >> "$GITHUB_ENV"
          for path in \
            "$VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT" \
            "$VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS" \
            "$VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS" \
            "$VEM_FACTORY_VISION_EVIDENCE_VERIFIER"; do
            case "$path" in
              /*) ;;
              *) echo "Vision factory input must be an absolute host-owned Unix path" >&2; exit 1 ;;
            esac
            case "$path" in
              *\\*|*..*|//* ) echo "Vision factory input path is unsafe" >&2; exit 1 ;;
            esac
            test -f "$path" || { echo "Vision factory input is not a regular file" >&2; exit 1; }
            if test -L "$path"; then
              echo "Vision factory input must not be a symlink" >&2
              exit 1
            fi
          done

      - name: Checkout Trusted Ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Exact Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0

      - name: Build Through Manifest-Pinned Offline Toolchain
        shell: bash
        run: |
          set -euo pipefail
          docker_builder_image="${VEM_FACTORY_BUILDER_IMAGE#oci://}"
          [[ "$docker_builder_image" != "$VEM_FACTORY_BUILDER_IMAGE" ]]
          [[ "$docker_builder_image" =~ ^[a-z0-9]+([._-][a-z0-9]+)*(:[0-9]+)?(/[a-z0-9]+([._-][a-z0-9]+)*)+@sha256:[a-f0-9]{64}$ ]]
          docker pull "$docker_builder_image"
          rm -rf "$RUNNER_TEMP/vem-factory-output"
          mkdir -p "$RUNNER_TEMP/vem-factory-output"
          docker run --rm --network none --read-only --tmpfs /tmp \
            --env "VEM_FACTORY_EXECUTED_BUILDER_IMAGE=$VEM_FACTORY_BUILDER_IMAGE" \
            --env "VEM_FACTORY_EXPECTED_UDF_EXTRACTOR_DIGEST=$VEM_FACTORY_UDF_EXTRACTOR_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_UDF_EXTRACTOR_VERSION=$VEM_FACTORY_UDF_EXTRACTOR_VERSION" \
            --env "VEM_FACTORY_EXPECTED_UDF_WRITER_DIGEST=$VEM_FACTORY_UDF_WRITER_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_UDF_WRITER_VERSION=$VEM_FACTORY_UDF_WRITER_VERSION" \
            --env "VEM_FACTORY_EXPECTED_WIMLIB_DIGEST=$VEM_FACTORY_WIMLIB_DIGEST" \
            --env "VEM_FACTORY_EXPECTED_WIMLIB_VERSION=$VEM_FACTORY_WIMLIB_VERSION" \
            --mount "type=bind,src=$GITHUB_WORKSPACE,dst=/workspace/repo,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_ASSET_STORE,dst=/factory-assets" \
            --mount "type=bind,src=$VEM_FACTORY_MANIFEST_STORE,dst=/factory-manifests,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_WINDOWS_SOURCE_STORE,dst=/windows-source,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_EVIDENCE_STORE,dst=/factory-evidence,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_APPROVAL_POLICY,dst=/factory-policy/approval.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_VISION_RELEASE_DELIVERY_UNIT,dst=/factory-vision/delivery-unit.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_REPOSITORY_VISION_TRUSTED_ROOTS,dst=/factory-vision/repository-trust.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_FACTORY_VISION_TRUSTED_ROOTS,dst=/factory-vision/factory-trust.json,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_VISION_EVIDENCE_VERIFIER,dst=/factory-vision/vision-release-verifier,readonly" \
            --mount "type=bind,src=$VEM_FACTORY_AUTHENTICODE_CA_BUNDLE,dst=/factory-policy/authenticode-ca.pem,readonly" \
            --mount "type=bind,src=$RUNNER_TEMP/vem-factory-output,dst=/factory-output" \
            "$docker_builder_image" \
            node /workspace/repo/scripts/factory/factory-cli.mjs \
              --manifest-store /factory-manifests \
              --asset-store /factory-assets \
              --windows-source-store /windows-source \
              --evidence-store /factory-evidence \
              --approval-policy /factory-policy/approval.json \
              --vision-release-delivery-unit /factory-vision/delivery-unit.json \
              --repository-vision-trusted-roots /factory-vision/repository-trust.json \
              --factory-vision-trusted-roots /factory-vision/factory-trust.json \
              --vision-evidence-verifier /factory-vision/vision-release-verifier \
              --udf-extractor "$VEM_FACTORY_UDF_EXTRACTOR_CONTAINER_PATH" \
              --udf-writer "$VEM_FACTORY_UDF_WRITER_CONTAINER_PATH" \
              --wimlib "$VEM_FACTORY_WIMLIB_CONTAINER_PATH" \
              --authenticode-verifier "$VEM_FACTORY_AUTHENTICODE_VERIFIER_CONTAINER_PATH" \
              --authenticode-ca-bundle /factory-policy/authenticode-ca.pem \
              --output-dir /factory-output \
              --manifest-identity "$MANIFEST_IDENTITY" \
              --reproducibility >/dev/null

      - name: Validate Sanitized Evidence Allowlist
        id: result
        shell: bash
        run: |
          set -euo pipefail
          node scripts/factory/sanitize-build-evidence.mjs \
            --directory "$RUNNER_TEMP/vem-factory-output"
          iso_identity=$(node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).isoIdentity)' "$RUNNER_TEMP/vem-factory-output/factory-build-result.json")
          echo "iso_identity=$iso_identity" >> "$GITHUB_OUTPUT"
          echo "provenance_artifact_name=factory-provenance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Publish Immutable Factory Acceptance Handoff
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT" = /* ]]
          handoff="$VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT"
          staging="${handoff}.tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$staging"
          install -d -m 0700 "$staging"
          install -m 0444 "$RUNNER_TEMP/vem-factory-output/factory-build-result.json" "$staging/factory-build-result.json"
          install -m 0444 "$RUNNER_TEMP/vem-factory-output/factory-provenance.json" "$staging/factory-provenance.json"
          rm -rf "$handoff"
          mv "$staging" "$handoff"

      - name: Upload Sanitized Factory Evidence Only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: factory-provenance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/vem-factory-output/factory-provenance.json
            ${{ runner.temp }}/vem-factory-output/factory-build-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Remove Ephemeral Sanitized Output
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/vem-factory-output"
