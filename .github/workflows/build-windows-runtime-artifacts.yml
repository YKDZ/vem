name: Build Windows Runtime Artifacts

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Name for the uploaded runtime artifact
        required: false
        default: windows-runtime-artifacts
        type: string
      retention_days:
        description: Artifact retention in days
        required: false
        default: 7
        type: number
    outputs:
      artifact_name:
        description: Uploaded runtime artifact name
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_identity:
        description: Content identity of WINDOWS-RUNTIME-ARTIFACTS.json
        value: ${{ jobs.build.outputs.artifact_identity }}
      commit:
        description: Exact source commit bound by the descriptor
        value: ${{ jobs.build.outputs.commit }}
      workflow_run_identity:
        description: Exact workflow run and attempt bound by the descriptor
        value: ${{ jobs.build.outputs.workflow_run_identity }}
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Name for the uploaded runtime artifact
        required: false
        default: windows-runtime-artifacts
      retention_days:
        description: Artifact retention in days
        required: false
        default: 7
        type: number

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Runtime Artifacts
    runs-on: windows-2022
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.stage.outputs.artifact_name }}
      artifact_identity: ${{ steps.stage.outputs.artifact_identity }}
      commit: ${{ steps.stage.outputs.commit }}
      workflow_run_identity: ${{ steps.stage.outputs.workflow_run_identity }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Setup Exact Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc
          components: llvm-tools-preview

      - name: Restore Cargo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-windows-runtime-${{ hashFiles('Cargo.lock', '.github/workflows/build-windows-runtime-artifacts.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-windows-runtime-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-windows-runtime-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-windows-runtime-
            ${{ runner.os }}-turbo-

      - name: Build Shared Package
        run: pnpm turbo build --filter @vem/shared

      - name: Build Vending Daemon
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: -Ctarget-feature=+crt-static
        run: cargo build -p vending-daemon --release --target x86_64-pc-windows-msvc

      - name: Verify Vending Daemon Static CRT Imports
        run: |
          $ErrorActionPreference = "Stop"
          $daemonExe = Join-Path $env:GITHUB_WORKSPACE "target\x86_64-pc-windows-msvc\release\vending-daemon.exe"
          if (-not (Test-Path $daemonExe)) { throw "vending-daemon.exe not found: $daemonExe" }

          $rustSysroot = (rustc --print sysroot).Trim()
          $llvmReadobj = Join-Path $rustSysroot "lib\rustlib\x86_64-pc-windows-msvc\bin\llvm-readobj.exe"
          if (-not (Test-Path $llvmReadobj)) { throw "llvm-readobj.exe not found in pinned Rust llvm-tools-preview: $llvmReadobj" }

          $coffImports = & $llvmReadobj --coff-imports $daemonExe 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "llvm-readobj.exe failed to inspect ${daemonExe}: $coffImports" }
          if ($coffImports -match '(?i)\b(?:VCRUNTIME140[^\s"]*\.dll|api-ms-win-crt-[^\s"]*\.dll)\b') {
            throw "vending-daemon.exe imports a dynamic MSVC CRT: $Matches[0]"
          }

      - name: Build Machine UI Kiosk
        working-directory: apps/machine
        run: pnpm exec tauri build --config src-tauri/tauri.windows.conf.json --no-bundle

      - name: Stage Runtime Artifacts
        id: stage
        run: |
          $ErrorActionPreference = "Stop"
          $artifactRoot = Join-Path $env:RUNNER_TEMP "vem-runtime-artifacts"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $artifactRoot
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

          $daemonExe = Join-Path $env:GITHUB_WORKSPACE "target\x86_64-pc-windows-msvc\release\vending-daemon.exe"
          if (-not (Test-Path $daemonExe)) { throw "vending-daemon.exe not found: $daemonExe" }
          Copy-Item -Force -Path $daemonExe -Destination (Join-Path $artifactRoot "vending-daemon.exe")

          $machineExe = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "machine.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\debug\\" -and $_.FullName -notmatch "\\node_modules\\" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $machineExe) { throw "machine.exe release artifact not found" }
          Copy-Item -Force -Path $machineExe.FullName -Destination (Join-Path $artifactRoot "machine.exe")

          $machineExeDir = Split-Path -Parent $machineExe.FullName
          $webView2Loader = Get-ChildItem -Path $machineExeDir -Recurse -Filter "WebView2Loader.dll" |
            Where-Object { $_.FullName -notmatch "\\node_modules\\" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $webView2Loader) {
            $webView2Loader = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "target") -Recurse -Filter "WebView2Loader.dll" |
              Where-Object { $_.FullName -match "\\webview2-com-sys-[^\\]+\\out\\x64\\WebView2Loader\.dll$" } |
              Sort-Object FullName |
              Select-Object -First 1
          }
          if (-not $webView2Loader) { throw "WebView2Loader.dll sidecar not found in machine.exe output or WebView2 build output" }
          Copy-Item -Force -Path $webView2Loader.FullName -Destination (Join-Path $artifactRoot "WebView2Loader.dll")

          $artifactName = "${{ inputs.artifact_name || 'windows-runtime-artifacts' }}"
          $workflowRunIdentity = "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
          $toolchain = [ordered]@{
            runnerImage = "windows-2022"
            runnerImageVersion = $env:ImageVersion
            node = ((node --version).Trim()).TrimStart('v')
            pnpm = (pnpm --version).Trim()
            rustc = ((rustc --version) -split ' ')[1]
            cargo = ((cargo --version) -split ' ')[1]
            tauriCli = (((pnpm --filter machine exec tauri --version).Trim()) -split ' ')[-1]
          }
          $descriptorJson = & node scripts/factory/runtime-artifact-descriptor.mjs `
            --directory $artifactRoot `
            --commit "${{ github.sha }}" `
            --artifact-name $artifactName `
            --workflow-run-identity $workflowRunIdentity `
            --toolchain-json ($toolchain | ConvertTo-Json -Compress)
          if ($LASTEXITCODE -ne 0) { throw "runtime artifact descriptor generation failed" }
          $descriptor = $descriptorJson | ConvertFrom-Json
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_identity=$($descriptor.identity)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "commit=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "workflow_run_identity=$workflowRunIdentity" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Runtime Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.stage.outputs.artifact_name }}
          path: ${{ runner.temp }}/vem-runtime-artifacts/
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days || 7 }}
