name: Windows Bring-up Bundle

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: Bundle intent
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - field
          - release
  push:
    branches:
      - main
    paths:
      - .github/workflows/windows-bringup-bundle.yml
      - .github/workflows/build-windows-runtime-artifacts.yml
      - apps/machine/**
      - apps/vending-daemon/**
      - crates/**
      - packages/shared/**
      - scripts/windows/**
      - Cargo.lock
      - Cargo.toml
      - pnpm-lock.yaml
      - package.json
      - pnpm-workspace.yaml
concurrency:
  group: windows-bringup-bundle-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-windows-artifacts:
    name: Build Windows Runtime Artifacts
    uses: ./.github/workflows/build-windows-runtime-artifacts.yml
    with:
      artifact_name: windows-runtime-artifacts-${{ github.run_id }}
      retention_days: 7

  build:
    name: Build Bring-up Bundle
    needs: build-windows-artifacts
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows Runtime Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-runtime-artifacts-${{ github.run_id }}
          path: ${{ runner.temp }}/vem-runtime-artifacts

      - name: Stage Bring-up Bundle
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = Join-Path $env:RUNNER_TEMP "vem-bringup-bundle"
          $scriptDir = Join-Path $bundleRoot "scripts\windows"
          New-Item -ItemType Directory -Force -Path $scriptDir | Out-Null

          $runtimeRoot = Join-Path $env:RUNNER_TEMP "vem-runtime-artifacts"
          $daemonExe = Join-Path $runtimeRoot "vending-daemon.exe"
          $machineExe = Join-Path $runtimeRoot "machine.exe"
          $webView2Loader = Join-Path $runtimeRoot "WebView2Loader.dll"
          foreach ($path in @($daemonExe, $machineExe, $webView2Loader)) {
            if (-not (Test-Path $path)) { throw "runtime artifact not found: $path" }
            Copy-Item -Force -Path $path -Destination (Join-Path $bundleRoot (Split-Path -Leaf $path))
          }

          Copy-Item -Force -Path (Join-Path $env:GITHUB_WORKSPACE "scripts\windows\vending-daemon-smoke.ps1") -Destination $scriptDir
          Copy-Item -Force -Path (Join-Path $env:GITHUB_WORKSPACE "scripts\windows\setup-scheduled-tasks.ps1") -Destination $scriptDir
          Copy-Item -Force -Path (Join-Path $env:GITHUB_WORKSPACE "scripts\windows\machine-config.bringup.example.json") -Destination (Join-Path $bundleRoot "machine-config.bringup.example.json")

          $readme = @(
            'VEM Windows bring-up bundle',
            '',
            'Contents:',
            '- vending-daemon.exe',
            '- machine.exe',
            '- WebView2Loader.dll',
            '- machine-config.bringup.example.json',
            '- scripts/windows/vending-daemon-smoke.ps1',
            '- scripts/windows/setup-scheduled-tasks.ps1',
            '- VERSION.txt',
            '',
            'Install or update machine services/tasks:',
            '  powershell -ExecutionPolicy Bypass -File C:\VEM\bringup\scripts\windows\setup-scheduled-tasks.ps1 -StartNow',
            '',
            'Before installing services or running field smoke:',
            '1. Copy machine-config.bringup.example.json to C:\VEM\bringup\machine-config.json.',
            '2. Fill machineCode, API/MQTT URLs, COM ports and scanner settings for the target machine.',
            '3. Provision machineSecret, mqttSigningSecret and mqttPassword through the controlled field secret path. Do not store real secrets in this bundle.',
            '4. setup-scheduled-tasks.ps1 seeds C:\ProgramData\VEM\vending-daemon\machine-config.json from C:\VEM\bringup\machine-config.json only when the ProgramData config does not already exist.',
            '',
            'Example:',
            '  powershell -ExecutionPolicy Bypass -File C:\VEM\bringup\scripts\windows\vending-daemon-smoke.ps1 `',
            '    -DaemonExe C:\VEM\bringup\vending-daemon.exe `',
            '    -MachineUiExe C:\VEM\bringup\machine.exe `',
            '    -DataDir C:\ProgramData\VEM\vending-daemon `',
            '    -MachineConfig C:\VEM\bringup\machine-config.json `',
            '    -ComPort COM3 `',
            '    -ScannerPort COM4'
          )
          $readme | Set-Content -Encoding UTF8 (Join-Path $bundleRoot "README.txt")

          $hashLines = Get-ChildItem -Path $bundleRoot -File -Recurse |
            Where-Object { $_.Name -ne "VERSION.txt" } |
            Sort-Object FullName |
            ForEach-Object {
              $relative = [System.IO.Path]::GetRelativePath($bundleRoot, $_.FullName)
              $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
              "sha256:$relative=$($hash.Hash)"
            }
          $metadata = @(
            "commit=${{ github.sha }}",
            "ref=${{ github.ref_name }}",
            "run_id=${{ github.run_id }}",
            "run_number=${{ github.run_number }}",
            "release_kind=${{ github.event.inputs.release_kind || 'ci' }}",
            "built_at_utc=$((Get-Date).ToUniversalTime().ToString('o'))",
            "runner=$env:RUNNER_NAME",
            "runtime_artifact=${{ needs.build-windows-artifacts.outputs.artifact_name }}",
            "daemon_source=$daemonExe",
            "machine_ui_source=$machineExe",
            "webview2_loader_source=$webView2Loader",
            "",
            "hashes:",
            $hashLines
          )
          $metadata | Set-Content -Encoding UTF8 (Join-Path $bundleRoot "VERSION.txt")

          Get-ChildItem -Path $bundleRoot -Recurse | Format-Table FullName, Length

      - name: Upload Bring-up Bundle
        uses: actions/upload-artifact@v4
        with:
          name: vem-bringup-bundle-${{ github.run_number }}-${{ github.sha }}
          path: ${{ runner.temp }}/vem-bringup-bundle/
          if-no-files-found: error
          retention-days: 14
