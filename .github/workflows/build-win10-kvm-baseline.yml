name: Build Win10 KVM Baseline

on:
  workflow_dispatch:
    inputs:
      baseline_config_path:
        description: Absolute path to the host-owned baseline configuration JSON
        required: true
        type: string
      source_commit:
        description: Optional diagnostic source commit SHA
        required: false
        type: string
      runner_label:
        description: Self-hosted runner capability label
        required: false
        default: vem-runtime
        type: string

permissions:
  contents: read

concurrency:
  group: vem-windows-runtime-testbed
  cancel-in-progress: false

jobs:
  build:
    name: Build And Verify Local Baseline
    runs-on: [self-hosted, Linux, X64, "${{ inputs.runner_label }}"]
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline contracts
        run: node --test scripts/testbed/kvm-baseline/kvm-baseline.test.mjs

      - name: Build verified local baseline
        shell: bash
        env:
          BASELINE_CONFIG_PATH: ${{ inputs.baseline_config_path }}
          SOURCE_COMMIT: ${{ inputs.source_commit || github.sha }}
        run: |
          set -euo pipefail
          test "${BASELINE_CONFIG_PATH#/}" != "$BASELINE_CONFIG_PATH"
          test -f "$BASELINE_CONFIG_PATH"
          node scripts/testbed/kvm-baseline/build-win10-baseline.mjs \
            --config "$BASELINE_CONFIG_PATH" \
            --source-commit "$SOURCE_COMMIT" \
            --execute
