name: Build Win10 KVM Baseline

on:
  workflow_dispatch:
    inputs:
      baseline_config_path:
        description: Absolute path to the host-owned baseline configuration JSON
        required: true
        type: string
      source_commit:
        description: Optional diagnostic source commit SHA
        required: false
        type: string
      runner_label:
        description: Self-hosted runner capability label
        required: false
        default: vem-runtime
        type: string

permissions:
  contents: read

concurrency:
  group: vem-windows-runtime-testbed
  cancel-in-progress: true

jobs:
  build:
    name: Build And Verify Local Baseline
    runs-on: [self-hosted, Linux, X64, "${{ inputs.runner_label }}"]
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline contracts
        run: node --test scripts/testbed/kvm-baseline/kvm-baseline.test.mjs

      - name: Build verified local baseline
        shell: bash
        env:
          BASELINE_CONFIG_PATH: ${{ inputs.baseline_config_path }}
          SOURCE_COMMIT: ${{ inputs.source_commit || github.sha }}
          VEM_VM_HOST_LOCK_PATH: ${{ vars.VEM_VM_HOST_LOCK_PATH }}
        run: |
          set -euo pipefail
          test "${BASELINE_CONFIG_PATH#/}" != "$BASELINE_CONFIG_PATH"
          test -f "$BASELINE_CONFIG_PATH"
          node - "$BASELINE_CONFIG_PATH" <<'NODE'
          const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (
            typeof process.env.VEM_VM_HOST_LOCK_PATH !== "string" ||
            !process.env.VEM_VM_HOST_LOCK_PATH.startsWith("/") ||
            config.host?.lockPath !== process.env.VEM_VM_HOST_LOCK_PATH
          ) {
            throw new Error("baseline config host.lockPath must equal VEM_VM_HOST_LOCK_PATH");
          }
          NODE
          mkdir -p "$(dirname "$VEM_VM_HOST_LOCK_PATH")"
          exec {lock_fd}>"$VEM_VM_HOST_LOCK_PATH"
          if ! flock -n "$lock_fd"; then
            echo "another VM runtime operation already holds the host-global lock: $VEM_VM_HOST_LOCK_PATH" >&2
            exit 1
          fi
          trap 'exit 0' TERM INT
          node scripts/testbed/kvm-baseline/build-win10-baseline.mjs \
            --config "$BASELINE_CONFIG_PATH" \
            --source-commit "$SOURCE_COMMIT" \
            --execute
