name: Factory Image Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trust-gate:
    name: Authorize Personalization Consumer
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
    steps:
      - id: gate
        name: Reject Untrusted Event Ref Actor Or Workflow
        shell: bash
        env:
          OBSERVED_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          case "$GITHUB_REF" in
            refs/heads/main|refs/tags/factory-v*) ;;
            *) echo "Factory personalization requires a trusted ref" >&2; exit 1 ;;
          esac
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          test "$OBSERVED_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/factory-image-acceptance.yml@$GITHUB_REF"
          echo "approved=approved" >> "$GITHUB_OUTPUT"

  accept:
    name: Run Factory Image Acceptance
    needs: trust-gate
    runs-on: [self-hosted, Linux, X64, vem-factory]
    environment: vem-factory-production
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    env:
      VEM_FACTORY_PERSONALIZATION_TRUSTED_GATE: ${{ needs.trust-gate.outputs.approved }}
      VEM_FACTORY_PERSONALIZATION_RUNNER_LABELS: '["self-hosted","Linux","X64","vem-factory"]'
      VEM_FACTORY_CLEAN_INSTALL_ADAPTER_TIMEOUT_MS: "2700000"
      RUN_ID: RUN-${{ github.run_id }}-${{ github.run_attempt }}
      DATABASE_URL: postgresql://vem:vem_password@127.0.0.1:55433/vem_factory_acceptance
      EPHEMERAL_API_READY_URL: http://127.0.0.1:26850/api
      EPHEMERAL_MQTT_LOCAL_URL: mqtt://127.0.0.1:18884
      VEM_FACTORY_PLATFORM_INGRESS_HOST: ${{ vars.VEM_FACTORY_PLATFORM_INGRESS_HOST }}
      MAINTENANCE_CONTROL_PLANE_URL: ${{ vars.VEM_MAINTENANCE_CONTROL_PLANE_URL }}
      MAINTENANCE_ALLOW_INSECURE_HTTP: ${{ vars.VEM_MAINTENANCE_ALLOW_INSECURE_HTTP }}
      MAINTENANCE_RELAY_ENDPOINT: ${{ vars.VEM_MAINTENANCE_RELAY_ENDPOINT }}
      MAINTENANCE_RUNNER_PEER_ID: ${{ vars.VEM_MAINTENANCE_RUNNER_PEER_ID }}
      MAINTENANCE_TARGET_MACHINE_ID: ${{ vars.VEM_MAINTENANCE_TARGET_MACHINE_ID }}
      VEM_MAINTENANCE_RELAY_INTERFACE: ${{ vars.VEM_MAINTENANCE_RELAY_INTERFACE }}
      VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY }}
      VEM_VM_HOST_EXPECTED_ADAPTER_SHA256: ${{ vars.VEM_VM_HOST_EXPECTED_ADAPTER_SHA256 }}
      MACHINE_CLAIM_CODE_TTL_SECONDS: "7200"
      PAYMENT_MOCK_ENABLED: "true"
    steps:
      - name: Guard Exact Protected Runner Before Checkout
        shell: bash
        run: |
          set -euo pipefail
          export VEM_VM_HOST_EVIDENCE_EXPORT_DIR="$RUNNER_TEMP/vem-factory-host-evidence/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'VEM_VM_HOST_EVIDENCE_EXPORT_DIR=%s\n' "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR" >> "$GITHUB_ENV"
          export VEM_FACTORY_PERSONALIZATION_RUNNER_NAME="$RUNNER_NAME"
          test -n "${VEM_FACTORY_PERSONALIZATION_TRUSTED_RUNNER_NAME:-}"
          test "$VEM_FACTORY_PERSONALIZATION_RUNNER_NAME" = "$VEM_FACTORY_PERSONALIZATION_TRUSTED_RUNNER_NAME"
          node -e '
            const labels = JSON.parse(process.env.VEM_FACTORY_PERSONALIZATION_RUNNER_LABELS);
            for (const required of ["self-hosted", "Linux", "X64", "vem-factory"]) {
              if (!labels.includes(required)) throw new Error(`missing protected runner label: ${required}`);
            }
          '
          test -n "${VEM_FACTORY_PERSONALIZATION_MEDIA_PATH:-}"
          test -n "${VEM_VM_HOST_FACTORY_PERSONALIZATION_MEDIA_ID:-}"
          test -n "${VEM_VM_HOST_ADAPTER:-}"
          for name in \
            VEM_VM_HOST_TARGET_ID \
            VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT \
            VEM_FACTORY_ASSET_STORE \
            VEM_FACTORY_MANIFEST_STORE \
            VEM_FACTORY_UDF_EXTRACTOR_HOST_PATH \
            VEM_FACTORY_UDF_WRITER_HOST_PATH \
            VEM_FACTORY_WIMLIB_HOST_PATH \
            VEM_FACTORY_WORK_ROOT \
            VEM_VM_HOST_EVIDENCE_EXPORT_DIR \
            VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY \
            VEM_VM_HOST_EXPECTED_ADAPTER_SHA256 \
            VEM_FACTORY_EXPECTED_TESTBED_USER \
            VEM_FACTORY_PLATFORM_INGRESS_HOST \
            MAINTENANCE_RELAY_ENDPOINT; do
            test -n "${!name:-}" || { echo "missing protected factory host variable: $name" >&2; exit 1; }
          done
          [[ "$VEM_FACTORY_PLATFORM_INGRESS_HOST" =~ ^[A-Za-z0-9][A-Za-z0-9.-]{0,253}$ ]] || {
            echo "VEM_FACTORY_PLATFORM_INGRESS_HOST must be a hostname or IP literal" >&2
            exit 1
          }
          [[ "$MAINTENANCE_RELAY_ENDPOINT" =~ ^([A-Za-z0-9.-]+|\[[0-9A-Fa-f:]+\]):([0-9]{1,5})$ ]] &&
            (( 10#${BASH_REMATCH[2]} >= 1 && 10#${BASH_REMATCH[2]} <= 65535 )) || {
            echo "MAINTENANCE_RELAY_ENDPOINT must be host:port with a valid port" >&2
            exit 1
          }
          [[ "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR" = /* ]] || {
            echo "VEM_VM_HOST_EVIDENCE_EXPORT_DIR must be absolute" >&2
            exit 1
          }
          [[ "$VEM_FACTORY_WORK_ROOT" = /* && "$VEM_FACTORY_WORK_ROOT" != / && -d "$VEM_FACTORY_WORK_ROOT" && -w "$VEM_FACTORY_WORK_ROOT" ]] || {
            echo "VEM_FACTORY_WORK_ROOT must be a writable absolute non-root host directory" >&2
            exit 1
          }
          [[ "$VEM_VM_HOST_ADAPTER" = /* && -f "$VEM_VM_HOST_ADAPTER" && -x "$VEM_VM_HOST_ADAPTER" ]] || {
            echo "VEM_VM_HOST_ADAPTER must be an absolute executable host path" >&2
            exit 1
          }
          [[ "$VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY" =~ ^vm-host-adapter://[A-Za-z0-9._/-]+@[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY must be a versioned adapter identity" >&2
            exit 1
          }
          [[ "$VEM_VM_HOST_EXPECTED_ADAPTER_SHA256" =~ ^[a-f0-9]{64}$ ]] || {
            echo "VEM_VM_HOST_EXPECTED_ADAPTER_SHA256 must be a lowercase SHA-256 digest" >&2
            exit 1
          }
          observed_adapter_sha256="$(sha256sum "$VEM_VM_HOST_ADAPTER" | awk '{print $1}')"
          test "$observed_adapter_sha256" = "$VEM_VM_HOST_EXPECTED_ADAPTER_SHA256"
          for path in \
            "$VEM_FACTORY_UDF_EXTRACTOR_HOST_PATH" \
            "$VEM_FACTORY_UDF_WRITER_HOST_PATH" \
            "$VEM_FACTORY_WIMLIB_HOST_PATH"; do
            [[ "$path" = /* && -f "$path" && -x "$path" ]] || {
              echo "Factory admission tool must be an absolute executable host path: $path" >&2
              exit 1
            }
          done
      - name: Checkout Trusted Ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Maintenance Relay Session
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          for name in MAINTENANCE_CONTROL_PLANE_URL MAINTENANCE_RUNNER_PEER_ID MAINTENANCE_TARGET_MACHINE_ID; do test -n "${!name:-}"; done
          node -e 'for (const name of ["MAINTENANCE_RUNNER_PEER_ID", "MAINTENANCE_TARGET_MACHINE_ID"]) if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(process.env[name] || "")) throw new Error(`${name} must be UUID`); const url = new URL(process.env.MAINTENANCE_CONTROL_PLANE_URL); const insecureAllowed = process.env.MAINTENANCE_ALLOW_INSECURE_HTTP === "true"; if (!(["https:", ...(insecureAllowed ? ["http:"] : [])].includes(url.protocol)) || url.username || url.password || url.search || url.hash) throw new Error("MAINTENANCE_CONTROL_PLANE_URL must be credential-free HTTPS unless insecure HTTP is explicitly enabled");'
          control_plane="${MAINTENANCE_CONTROL_PLANE_URL%/}"
          oidc="$RUNNER_TEMP/factory-maintenance-oidc.json"
          exchange="$RUNNER_TEMP/factory-maintenance-exchange.json"
          created="$RUNNER_TEMP/factory-maintenance-session-created.json"
          session="$RUNNER_TEMP/factory-maintenance-session.json"
          automation_token="$RUNNER_TEMP/factory-maintenance-token"
          ssh_dir="$RUNNER_TEMP/vem-factory-maintenance-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          ssh_key_path="$ssh_dir/id_ed25519"
          ssh_public_key_path="$ssh_dir/id_ed25519.pub"
          ssh_certificate_path="$ssh_dir/id_ed25519-cert.pub"
          ssh_request_path="$ssh_dir/certificate-request.json"
          ssh_response_path="$ssh_dir/certificate-response.json"
          rm -f "$oidc" "$exchange" "$exchange.request" "$created" "$session" "$automation_token"
          rm -rf -- "$ssh_dir"
          install -d -m 0700 "$ssh_dir"
          { printf 'url = "%s&audience=vem-maintenance"\n' "$ACTIONS_ID_TOKEN_REQUEST_URL"; printf 'header = "Authorization: Bearer %s"\n' "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"; } | curl --config - --fail-with-body --silent --show-error --output "$oidc"
          node - "$oidc" "$exchange.request" <<'NODE'
          const fs = require("node:fs");
          const token = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).value;
          if (typeof token !== "string" || token.split(".").length !== 3) throw new Error("OIDC endpoint returned no JWT");
          fs.writeFileSync(process.argv[3], JSON.stringify({ idToken: token, runId: process.env.GITHUB_RUN_ID, runAttempt: process.env.GITHUB_RUN_ATTEMPT, sha: process.env.GITHUB_SHA, sourcePeerId: process.env.MAINTENANCE_RUNNER_PEER_ID, targetMachineId: process.env.MAINTENANCE_TARGET_MACHINE_ID, reason: "Run Factory Image Acceptance" }), { mode: 0o600 });
          NODE
          curl --fail-with-body --silent --show-error --header 'Content-Type: application/json' --data-binary @"$exchange.request" --output "$exchange" "$control_plane/maintenance-automation/exchange"
          node - "$exchange" "$automation_token" <<'NODE'
          const fs = require("node:fs"); const value = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data;
          if (typeof value?.accessToken !== "string" || value.actor?.runId !== process.env.GITHUB_RUN_ID || value.actor?.runAttempt !== process.env.GITHUB_RUN_ATTEMPT) throw new Error("maintenance automation exchange invalid");
          fs.writeFileSync(process.argv[3], value.accessToken, { mode: 0o600 });
          NODE
          token="$(<"$automation_token")"
          printf '::add-mask::%s\n' "$token"
          { printf 'header = "Authorization: Bearer %s"\n' "$token"; printf 'request = "POST"\n'; } | curl --config - --fail-with-body --silent --show-error --output "$created" "$control_plane/maintenance-automation/session"
          for attempt in $(seq 1 60); do
            { printf 'header = "Authorization: Bearer %s"\n' "$token"; printf 'request = "GET"\n'; } | curl --config - --fail-with-body --silent --show-error --output "$session" "$control_plane/maintenance-automation/session"
            node - "$session" <<'NODE' && break
          const fs = require("node:fs");
          const session = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data;
          process.exit(session?.relayConvergence?.state === "applied" ? 0 : 1);
          NODE
            test "$attempt" -lt 60 || { echo "maintenance Relay session did not converge" >&2; exit 1; }
            sleep 2
          done
          node - "$created" "$session" <<'NODE'
          const fs = require("node:fs"); const created = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data; const session = JSON.parse(fs.readFileSync(process.argv[3], "utf8")).data;
          if (session?.id !== created?.id || session?.kind !== "ci" || session?.status !== "active" || session?.sourcePeer?.id !== process.env.MAINTENANCE_RUNNER_PEER_ID || session?.targetMachine?.id !== process.env.MAINTENANCE_TARGET_MACHINE_ID || session?.relayPeer?.role !== "relay" || session?.relayConvergence?.state !== "applied" || Date.parse(session?.expiresAt) <= Date.now()) throw new Error("maintenance session control-plane binding invalid");
          const normalized = {
            id: session.id,
            kind: session.kind,
            status: session.status,
            issuedAt: session.issuedAt,
            expiresAt: session.expiresAt,
            sourcePeer: session.sourcePeer,
            targetMachine: {
              id: session.targetMachine.id,
              maintenancePeerId: session.targetMachine.maintenancePeerId,
              tunnelAddress: session.targetMachine.tunnelAddress,
            },
            relay: session.relayPeer,
            relayConvergence: { state: session.relayConvergence.state },
          };
          fs.writeFileSync(process.argv[3], JSON.stringify(normalized), { mode: 0o600 });
          NODE
          node - "$session" <<'NODE' >> "$GITHUB_ENV"
          const fs = require("node:fs"); const session = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          process.stdout.write(`MAINTENANCE_RELAY_PEER_ID=${session.relay.id}\nMAINTENANCE_RELAY_PUBLIC_KEY=${session.relay.publicKey}\nMAINTENANCE_RELAY_TUNNEL_ADDRESS=${session.relay.tunnelAddress}\n`);
          NODE
          printf 'VEM_FACTORY_MAINTENANCE_SESSION_PATH=%s\n' "$session" >> "$GITHUB_ENV"
          ssh-keygen -q -t ed25519 -N '' -f "$ssh_key_path"
          chmod 600 "$ssh_key_path" "$ssh_public_key_path"
          node - "$ssh_public_key_path" "$ssh_request_path" <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const publicKey = fs.readFileSync(process.argv[2], "utf8").trim().split(/\s+/).slice(0, 2).join(" ");
          if (!publicKey.startsWith("ssh-ed25519 ")) throw new Error("runner SSH public key must be ed25519");
          fs.writeFileSync(process.argv[3], JSON.stringify({ publicKey, requestId: crypto.randomUUID() }), { mode: 0o600 });
          NODE
          { printf 'header = "Authorization: Bearer %s"\n' "$token"; printf 'request = "POST"\n'; } | curl --config - --fail-with-body --silent --show-error --header 'Content-Type: application/json' --data-binary @"$ssh_request_path" --output "$ssh_response_path" "$control_plane/maintenance-automation/session/ssh-certificate"
          node - "$ssh_response_path" "$ssh_certificate_path" <<'NODE'
          const fs = require("node:fs");
          const certificate = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data?.certificate;
          if (typeof certificate !== "string" || !certificate.startsWith("ssh-ed25519-cert-v01@openssh.com ")) throw new Error("maintenance SSH certificate response is invalid");
          fs.writeFileSync(process.argv[3], `${certificate}\n`, { mode: 0o600 });
          NODE
          chmod 600 "$ssh_certificate_path"
          rm -f "$ssh_request_path" "$ssh_response_path"
          {
            printf 'VEM_FACTORY_MAINTENANCE_SSH_DIR=%s\n' "$ssh_dir"
            printf 'VEM_FACTORY_MAINTENANCE_SSH_IDENTITY_PATH=%s\n' "$ssh_key_path"
            printf 'VEM_FACTORY_MAINTENANCE_SSH_CERTIFICATE_PATH=%s\n' "$ssh_certificate_path"
          } >> "$GITHUB_ENV"

      - name: Prove Relay WireGuard Bootstrap Route
        shell: bash
        run: |
          set -euo pipefail
          proof="$RUNNER_TEMP/factory-maintenance-relay-attestation.json"
          node scripts/testbed/factory-maintenance-relay-attestation.mjs --session "$VEM_FACTORY_MAINTENANCE_SESSION_PATH" --out "$proof"
          printf 'VEM_FACTORY_MAINTENANCE_RELAY_ATTESTATION_PATH=%s\n' "$proof" >> "$GITHUB_ENV"

      - name: Start Ephemeral Postgres And MQTT
        run: |
          set -euo pipefail
          postgres_name="vem-factory-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mqtt_name="vem-factory-mqtt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker rm -fv "$postgres_name" "$mqtt_name" >/dev/null 2>&1 || true
          docker run -d --name "$postgres_name" \
            -e POSTGRES_DB=vem_factory_acceptance \
            -e POSTGRES_USER=vem \
            -e POSTGRES_PASSWORD=vem_password \
            -p 55433:5432 postgres:16
          mkdir -p "$RUNNER_TEMP/vem-factory-mosquitto"
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > "$RUNNER_TEMP/vem-factory-mosquitto/mosquitto.conf"
          docker run -d --name "$mqtt_name" -p 18884:1883 \
            -v "$RUNNER_TEMP/vem-factory-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          wait_for_tcp() { timeout 2 bash -c "</dev/tcp/$1/$2" >/dev/null 2>&1; }
          for attempt in $(seq 1 90); do
            if wait_for_tcp 127.0.0.1 55433; then break; fi
            test "$(docker inspect -f '{{.State.Status}}' "$postgres_name" 2>/dev/null || true)" = running || { docker logs "$postgres_name"; exit 1; }
            test "$attempt" -lt 90 || { echo "Postgres did not become ready" >&2; exit 1; }
            sleep 2
          done
          for attempt in $(seq 1 60); do
            if wait_for_tcp 127.0.0.1 18884; then break; fi
            test "$(docker inspect -f '{{.State.Status}}' "$mqtt_name" 2>/dev/null || true)" = running || { docker logs "$mqtt_name"; exit 1; }
            test "$attempt" -lt 60 || { echo "MQTT did not become ready" >&2; exit 1; }
            sleep 1
          done

      - name: Build And Start Service API
        run: |
          set -euo pipefail
          pnpm turbo build --filter @vem/shared --filter @vem/db --filter service-api
          pnpm --filter @vem/db migrate
          node apps/service-api/dist/main.js > service-api.log 2>&1 &
          echo "$!" > service-api.pid
          for attempt in $(seq 1 60); do
            curl -fsS "$EPHEMERAL_API_READY_URL/health" >/dev/null 2>&1 && exit 0
            sleep 2
          done
          cat service-api.log
          exit 1
        env:
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-chars!!
          MACHINE_JWT_SECRET: ci-machine-jwt-secret-min-32-chars-long!
          MACHINE_CREDENTIAL_ENCRYPTION_KEY: ci-machine-cred-enc-key-32-chars!!
          MACHINE_PROVISIONING_PROFILE: testbed
          MQTT_URL: ${{ env.EPHEMERAL_MQTT_LOCAL_URL }}
          MACHINE_MQTT_URL: ${{ format('mqtt://{0}:18884', vars.VEM_FACTORY_PLATFORM_INGRESS_HOST) }}
          MACHINE_API_BASE_URL: ${{ format('http://{0}:26850/api', vars.VEM_FACTORY_PLATFORM_INGRESS_HOST) }}
          PAYMENT_WEBHOOK_BASE_URL: http://127.0.0.1:26850
          BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!
          SERVICE_PORT: "26850"
          SERVICE_HOST: "0.0.0.0"

      - name: Prepare Same-Run Ephemeral Platform
        run: |
          set -euo pipefail
          evidence_root="$GITHUB_WORKSPACE/artifacts/factory-image-acceptance/lifecycle/$RUN_ID"
          mkdir -p "$evidence_root"
          machine_prefix="VEM-TESTBED-FACTORY"
          pnpm --filter service-api testbed:prepare-ephemeral-platform -- \
            --run-id "$RUN_ID" \
            --machine-code-prefix "$machine_prefix" \
            --database-url "$DATABASE_URL" \
            --api-base-url "http://${VEM_FACTORY_PLATFORM_INGRESS_HOST}:26850/api" \
            --mqtt-url "mqtt://${VEM_FACTORY_PLATFORM_INGRESS_HOST}:18884" \
            --maintenance-relay-peer-id "$MAINTENANCE_RELAY_PEER_ID" \
            --maintenance-relay-public-key "$MAINTENANCE_RELAY_PUBLIC_KEY" \
            --maintenance-relay-tunnel-address "$MAINTENANCE_RELAY_TUNNEL_ADDRESS" \
            --allow-ephemeral-target \
            --allow-mock-payment \
            --reset \
            --output "$evidence_root/ephemeral-platform.json"
          printf 'VEM_FACTORY_EPHEMERAL_PLATFORM_EVIDENCE=%s\n' "$evidence_root/ephemeral-platform.json" >> "$GITHUB_ENV"

      - name: Generate Typed Factory Lifecycle Input
        run: |
          set -euo pipefail
          input_path="$RUNNER_TEMP/factory-image-acceptance-input.json"
          node - "$input_path" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const outputRoot = process.env.VEM_FACTORY_ACCEPTANCE_OUTPUT_ROOT;
          const buildResultPath = path.join(outputRoot, "factory-build-result.json");
          const build = JSON.parse(fs.readFileSync(buildResultPath, "utf8"));
          const manifestHash = String(build.manifestIdentity).replace(/^sha256:/, "");
          const manifestPath = path.join(process.env.VEM_FACTORY_MANIFEST_STORE, "sha256", `${manifestHash}.json`);
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          const controlPlaneSession = JSON.parse(fs.readFileSync(process.env.VEM_FACTORY_MAINTENANCE_SESSION_PATH, "utf8"));
          const sshIdentityPath = process.env.VEM_FACTORY_MAINTENANCE_SSH_IDENTITY_PATH;
          const sshCertificatePath = process.env.VEM_FACTORY_MAINTENANCE_SSH_CERTIFICATE_PATH;
          const maintenanceRelaySession = {
            sessionId: controlPlaneSession.id,
            relayPeer: {
              publicKey: controlPlaneSession.relay.publicKey,
              tunnelAddress: controlPlaneSession.relay.tunnelAddress,
            },
            sourceTunnelAddress: controlPlaneSession.sourcePeer.tunnelAddress,
            endpointTunnelAddress: controlPlaneSession.targetMachine.tunnelAddress,
          };
          const runId = process.env.RUN_ID;
          const evidenceRoot = path.join(process.env.GITHUB_WORKSPACE, "artifacts", "factory-image-acceptance");
          const machineCode = `VEM-TESTBED-FACTORY-${runId}`;
          if (!/^sha256:[a-f0-9]{64}$/.test(build.manifestIdentity) ||
              !/^factory-cas:\/\/sha256\/[a-f0-9]{64}$/.test(build.isoIdentity) ||
              !/^factory-evidence:\/\/sha256\/[a-f0-9]{64}$/.test(build.provenanceIdentity) ||
              !/^sha256:[a-f0-9]{64}$/.test(build.provenanceDigest) ||
              !["bios", "uefi"].includes(manifest.source?.targetFirmware) ||
              !/^[A-Z0-9][A-Z0-9-]{2,63}$/.test(runId) ||
              !/^VEM-TESTBED-[A-Z0-9-]+$/.test(machineCode) ||
              typeof sshIdentityPath !== "string" ||
              typeof sshCertificatePath !== "string" ||
              !sshIdentityPath.startsWith(process.env.RUNNER_TEMP + "/vem-factory-maintenance-ssh-") ||
              !sshCertificatePath.startsWith(process.env.RUNNER_TEMP + "/vem-factory-maintenance-ssh-")) {
            throw new Error("protected factory host values cannot form a typed lifecycle input");
          }
          const input = {
            schemaVersion: "vem-factory-image-acceptance-input/v1",
            kind: "factory-image-acceptance-input",
            runId,
            targetIdentity: process.env.VEM_VM_HOST_TARGET_ID,
            factory: {
              assemblyMode: "windows-serviced-iso",
              targetFirmware: manifest.source.targetFirmware,
              isoIdentity: build.isoIdentity,
              manifestIdentity: build.manifestIdentity,
              provenanceIdentity: build.provenanceIdentity,
              provenanceDigest: build.provenanceDigest,
              manifestPath,
              provenancePath: path.join(outputRoot, build.provenanceFileName),
              isoPath: path.join(process.env.VEM_FACTORY_ASSET_STORE, "sha256", build.isoDigest.replace(/^sha256:/, "")),
              udfExtractorPath: process.env.VEM_FACTORY_UDF_EXTRACTOR_HOST_PATH,
              udfWriterPath: process.env.VEM_FACTORY_UDF_WRITER_HOST_PATH,
              wimlibPath: process.env.VEM_FACTORY_WIMLIB_HOST_PATH,
            },
            endpoint: {
              expectedTestbedUser: process.env.VEM_FACTORY_EXPECTED_TESTBED_USER,
              maintenanceRelaySession,
            },
            ephemeralPlatform: {
              evidencePath: process.env.VEM_FACTORY_EPHEMERAL_PLATFORM_EVIDENCE,
              platformTarget: `factory-ephemeral-${runId.toLowerCase()}`,
              machineCode,
            },
            ssh: {
              identityPath: sshIdentityPath,
              certificatePath: sshCertificatePath,
            },
            maintenanceRelayAttestation: JSON.parse(fs.readFileSync(process.env.VEM_FACTORY_MAINTENANCE_RELAY_ATTESTATION_PATH, "utf8")),
            evidence: {
              root: evidenceRoot,
              lifecycleReport: path.join(evidenceRoot, "lifecycle", "report.json"),
              sanitizedUpload: path.join(evidenceRoot, "sanitized-upload"),
            },
          };
          fs.writeFileSync(process.argv[2], `${JSON.stringify(input)}\n`, { mode: 0o600 });
          NODE
          printf 'VEM_FACTORY_IMAGE_ACCEPTANCE_INPUT_PATH=%s\n' "$input_path" >> "$GITHUB_ENV"

      - name: Run Typed Factory Lifecycle
        shell: bash
        run: |
          set -euo pipefail
          export VEM_FACTORY_PERSONALIZATION_RUNNER_NAME="$RUNNER_NAME"
          export VEM_FACTORY_EPHEMERAL_DATABASE_URL="$DATABASE_URL"
          admission_tmp="$VEM_FACTORY_WORK_ROOT/acceptance-tmp/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$admission_tmp"
          mkdir -p "$admission_tmp"
          chmod 700 "$admission_tmp"
          export TMPDIR="$admission_tmp"
          mkdir -p "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR"
          chmod 700 "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR"
          node scripts/testbed/factory-image-acceptance.mjs
          unset VEM_FACTORY_EPHEMERAL_DATABASE_URL
          node - "$VEM_FACTORY_IMAGE_ACCEPTANCE_INPUT_PATH" <<'NODE'
          const fs = require("node:fs");
          const input = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const lifecycle = JSON.parse(fs.readFileSync(input.evidence.lifecycleReport, "utf8"));
          const expected = process.env.VEM_VM_HOST_EXPECTED_ADAPTER_IDENTITY;
          const observed = [];
          const visit = (value, path = "reports") => {
            if (!value || typeof value !== "object") return;
            if (value.adapter && typeof value.adapter.identity === "string") {
              observed.push({ path, identity: value.adapter.identity });
            }
            for (const [key, item] of Object.entries(value)) visit(item, `${path}.${key}`);
          };
          visit(lifecycle.reports);
          if (observed.length === 0) throw new Error("Factory lifecycle report did not include adapter identity evidence");
          const mismatch = observed.find((entry) => entry.identity !== expected);
          if (mismatch) throw new Error(`Factory VM Host Adapter identity mismatch at ${mismatch.path}: ${mismatch.identity}`);
          NODE

      - name: Independently Finalize Adapter Lifecycle
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          export VEM_FACTORY_PERSONALIZATION_RUNNER_NAME="$RUNNER_NAME"
          if [[ -n "${VEM_FACTORY_IMAGE_ACCEPTANCE_INPUT_PATH:-}" && -f "$VEM_FACTORY_IMAGE_ACCEPTANCE_INPUT_PATH" ]]; then
            node scripts/testbed/factory-image-acceptance.mjs --cleanup-only
          fi

      - name: Cleanup Ephemeral Services
        if: ${{ always() }}
        run: |
          set -euo pipefail
          failed=0
          automation_token_path="$RUNNER_TEMP/factory-maintenance-token"
          revoke_response_path="$RUNNER_TEMP/factory-maintenance-session-revoke.json"
          session_path="$RUNNER_TEMP/factory-maintenance-session.json"
          ssh_directory="${VEM_FACTORY_MAINTENANCE_SSH_DIR:-$RUNNER_TEMP/vem-factory-maintenance-ssh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          if [ -s "$automation_token_path" ]; then
            control_plane="${MAINTENANCE_CONTROL_PLANE_URL%/}"
            automation_token="$(<"$automation_token_path")"
            if ! { printf 'header = "Authorization: Bearer %s"\n' "$automation_token"; printf 'request = "POST"\n'; } | curl --config - --fail-with-body --silent --show-error --output "$revoke_response_path" "$control_plane/maintenance-automation/session/revoke"; then
              echo "Maintenance Session explicit revoke request failed" >&2
              failed=1
            elif ! node - "$revoke_response_path" "$session_path" <<'NODE'
          const fs = require("node:fs");
          const revoked = JSON.parse(fs.readFileSync(process.argv[2], "utf8")).data;
          const session = JSON.parse(fs.readFileSync(process.argv[3], "utf8"));
          if (!revoked?.id || revoked.id !== session.id || revoked.status !== "revoked") {
            throw new Error("maintenance session revoke response is invalid");
          }
          NODE
            then
              echo "Maintenance Session explicit revoke response was not revoked" >&2
              failed=1
            fi
            unset automation_token
          elif [ -s "$session_path" ]; then
            echo "Maintenance Session token missing before explicit revoke" >&2
            failed=1
          fi
          if [ -f service-api.pid ]; then
            service_api_pid="$(cat service-api.pid)"
            if kill -0 "$service_api_pid" 2>/dev/null; then
              kill "$service_api_pid" || failed=1
              for _ in $(seq 1 10); do
                kill -0 "$service_api_pid" 2>/dev/null || break
                sleep 1
              done
              if kill -0 "$service_api_pid" 2>/dev/null; then
                echo "Service API process remained after cleanup: $service_api_pid" >&2
                failed=1
              fi
            fi
          fi
          for container in \
            "vem-factory-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            "vem-factory-mqtt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"; do
            if docker inspect "$container" >/dev/null 2>&1; then
              docker rm -fv "$container" >/dev/null || failed=1
            fi
            if docker inspect "$container" >/dev/null 2>&1; then
              echo "ephemeral container remained after cleanup: $container" >&2
              failed=1
            fi
          done
          rm -rf "$RUNNER_TEMP/vem-factory-mosquitto" "$RUNNER_TEMP/factory-image-acceptance-input.json" "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR"
          if [[ "$VEM_FACTORY_WORK_ROOT" = /* && "$VEM_FACTORY_WORK_ROOT" != / ]]; then
            admission_tmp="$VEM_FACTORY_WORK_ROOT/acceptance-tmp/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            rm -rf "$admission_tmp"
          else
            echo "refusing to clean an invalid VEM_FACTORY_WORK_ROOT" >&2
            failed=1
          fi
          rm -f "$automation_token_path" "$revoke_response_path"
          rm -rf -- "$ssh_directory" || failed=1
          if [ -e "$ssh_directory" ]; then
            echo "run-scoped Factory Maintenance SSH directory remained after cleanup: $ssh_directory" >&2
            failed=1
          fi
          rm -rf "$RUNNER_TEMP/vem-factory-mosquitto" "$RUNNER_TEMP/factory-image-acceptance-input.json" "$VEM_VM_HOST_EVIDENCE_EXPORT_DIR" "$RUNNER_TEMP/factory-maintenance-oidc.json" "$RUNNER_TEMP/factory-maintenance-exchange.json" "$RUNNER_TEMP/factory-maintenance-exchange.json.request" "$RUNNER_TEMP/factory-maintenance-session-created.json" "$RUNNER_TEMP/factory-maintenance-session.json" "$RUNNER_TEMP/factory-maintenance-relay-attestation.json"
          exit "$failed"

      - name: Upload Sanitized Factory Acceptance Evidence
        if: ${{ always() && env.VEM_FACTORY_IMAGE_ACCEPTANCE_INPUT_PATH != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: factory-image-acceptance-evidence
          if-no-files-found: warn
          path: artifacts/factory-image-acceptance/sanitized-upload/**
