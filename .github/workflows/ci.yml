name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      vending_daemon_rust: ${{ steps.filter.outputs.vending_daemon_rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - '.github/workflows/ci.yml'
              - 'packages/**'
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'tools/**'
              - 'scripts/windows/**'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'oxlint.config.ts'
              - 'oxfmt.config.ts'
            vending_daemon_rust:
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  static:
    name: Static Checks
    needs: changes
    uses: ./.github/workflows/static-quality.yml

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Unit Tests
        run: node tools/check-ci.mjs --job unit

  windows-dpapi-tests:
    name: Windows DPAPI Secret Store
    needs: changes
    if: needs.changes.outputs.vending_daemon_rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run protected secret store DPAPI round-trip
        run: cargo test -p vending-daemon secret::tests::protected_local_secret_store_round_trips_status_and_clear_without_exposing_values -- --exact

  windows-vision-main-consumer:
    name: Windows Vision Main Consumer
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vision main consumer contract checks
        run: pnpm check:vision-main-consumer

      - name: Run Vision main consumer harness
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File
          ./scripts/windows/vision-main-consumer.windows-harness.ps1

  admin-browser-tests:
    name: Admin Browser Acceptance
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/admin-browser-acceptance.yml

  rust-tests:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Rust Tests
        run: node tools/check-ci.mjs --job rust

  windows-service-check:
    name: Windows Service Compile
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check Windows service wrapper
        run: cargo check -p vending-daemon --target x86_64-pc-windows-msvc

  timing-summary:
    name: CI Timing Summary
    needs:
      - changes
      - static
      - unit-tests
      - windows-dpapi-tests
      - windows-vision-main-consumer
      - admin-browser-tests
      - rust-tests
      - windows-service-check
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Summarize job queue, run, and cache timing
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const workflowJobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );
            const jobs = workflowJobs.filter(
              (job) => job.status === "completed",
            );

            const millisecondsBetween = (start, end) => {
              if (!start || !end) return null;
              const startMilliseconds = Date.parse(start);
              const endMilliseconds = Date.parse(end);
              if (
                !Number.isFinite(startMilliseconds) ||
                !Number.isFinite(endMilliseconds) ||
                endMilliseconds < startMilliseconds
              ) {
                return null;
              }
              return endMilliseconds - startMilliseconds;
            };
            const formatDuration = (milliseconds) => {
              if (milliseconds === null || milliseconds < 0) return "-";
              const totalSeconds = Math.round(milliseconds / 1000);
              const minutes = Math.floor(totalSeconds / 60);
              const seconds = totalSeconds % 60;
              return minutes ? `${minutes}m ${seconds}s` : `${seconds}s`;
            };
            const jobTimings = jobs.map((job) => ({
              name: job.name,
              conclusion: job.conclusion ?? job.status,
              queueMilliseconds: millisecondsBetween(job.created_at, job.started_at),
              runMilliseconds: millisecondsBetween(job.started_at, job.completed_at),
              cacheSteps: (job.steps ?? [])
                .filter((step) => /cache/i.test(step.name))
                .map((step) => ({
                  name: step.name,
                  conclusion: step.conclusion ?? step.status,
                  runMilliseconds: millisecondsBetween(step.started_at, step.completed_at),
                })),
            }));
            const completedAt = jobs
              .map((job) => job.completed_at)
              .filter(Boolean)
              .sort()
              .at(-1);
            const createdAt = jobs
              .map((job) => job.created_at)
              .filter(Boolean)
              .sort()
              .at(0);
            const cacheSteps = jobTimings.flatMap((job) =>
              job.cacheSteps.map((step) => ({ job: job.name, ...step })),
            );

            await core.summary
              .addHeading("CI timing summary")
              .addRaw(
                `Observed workflow elapsed time: ${formatDuration(millisecondsBetween(createdAt, completedAt))}.`,
              )
              .addTable([
                [
                  { data: "Job", header: true },
                  { data: "Conclusion", header: true },
                  { data: "Queue", header: true },
                  { data: "Run", header: true },
                ],
                ...jobTimings.map((job) => [
                  job.name,
                  job.conclusion,
                  formatDuration(job.queueMilliseconds),
                  formatDuration(job.runMilliseconds),
                ]),
              ])
              .addHeading("Cache step timing")
              .addTable([
                [
                  { data: "Job", header: true },
                  { data: "Cache step", header: true },
                  { data: "Conclusion", header: true },
                  { data: "Run", header: true },
                ],
                ...cacheSteps.map((step) => [
                  step.job,
                  step.name,
                  step.conclusion,
                  formatDuration(step.runMilliseconds),
                ]),
              ])
              .write();

            require("node:fs").writeFileSync(
              "ci-timing-summary.json",
              JSON.stringify(
                {
                  workflowElapsedMilliseconds: millisecondsBetween(createdAt, completedAt),
                  jobs: jobTimings,
                },
                null,
                2,
              ),
            );

      - name: Upload CI timing summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ci-timing-summary
          path: ci-timing-summary.json
          if-no-files-found: error
          retention-days: 14
