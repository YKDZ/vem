name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      machine_runtime_screenshot_scenarios:
        description: "Optional comma-separated Machine Runtime Console screenshot scenario ids. Empty runs all included scenarios."
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      vending_daemon_rust: ${{ steps.filter.outputs.vending_daemon_rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'oxlint.config.ts'
              - 'oxfmt.config.ts'
            vending_daemon_rust:
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  static:
    name: Static Checks
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Admin API Contracts
        run: pnpm check:admin-api-contracts

      - name: Format Check
        run: pnpm fmt:check

      - name: Typecheck
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm turbo typecheck

      - name: Lint
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm turbo lint

  unit-tests:
    name: Unit Tests
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        run: pnpm turbo build --filter @vem/shared --filter @vem/db

      - name: Run Unit Tests
        run: pnpm turbo test

  windows-dpapi-tests:
    name: Windows DPAPI Secret Store
    needs: changes
    if: needs.changes.outputs.vending_daemon_rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run protected secret store DPAPI round-trip
        run: cargo test -p vending-daemon secret::tests::protected_local_secret_store_round_trips_status_and_clear_without_exposing_values -- --exact

  machine-e2e-tests:
    name: Machine UI Daemon E2E
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Chrome Browser
        run: google-chrome --version

      - name: Run Machine UI daemon E2E tests
        run: pnpm -F machine test:e2e -- machine-daemon-client.spec.ts machine-real-daemon.spec.ts

      - name: Run Machine Runtime Console touch smoke
        run: pnpm -F machine test:e2e:touch-smoke

      - name: Upload Machine Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: machine-playwright-report
          path: apps/machine/playwright-report/
          retention-days: 7

  machine-runtime-screenshots:
    name: Machine Runtime Screenshot Artifacts
    needs: [static]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Chrome Browser
        run: google-chrome --version

      - name: Capture Machine Runtime Console screenshots
        run: pnpm -F machine test:e2e:screenshots
        env:
          VEM_MACHINE_RUNTIME_SCREENSHOT_SCENARIOS: ${{ inputs.machine_runtime_screenshot_scenarios || '' }}

      - name: Stitch Machine Runtime Console overview
        run: pnpm -F machine screenshots:runtime:stitch

      - name: Upload Machine Runtime Console screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: machine-runtime-screenshot-artifacts
          path: apps/machine/runtime-screenshot-artifacts/
          if-no-files-found: error
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vem
          POSTGRES_USER: vem
          POSTGRES_PASSWORD: vem_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vem -d vem"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MQTT Broker
        run: |
          mkdir -p /tmp/mosquitto-ci
          printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > /tmp/mosquitto-ci/mosquitto.conf
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto-ci/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2

      - name: Build Service API
        run: pnpm turbo build --filter service-api

      - name: Run Database Migrations
        run: pnpm --filter @vem/db migrate
        env:
          DATABASE_URL: postgresql://vem:vem_password@localhost:5432/vem

      - name: Start Service API
        working-directory: apps/service-api
        run: node dist/main.js > ../../service-api.log 2>&1 &
        env:
          DATABASE_URL: postgresql://vem:vem_password@localhost:5432/vem
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-32-chars!!
          MACHINE_JWT_SECRET: ci-machine-jwt-secret-min-32-chars-long!
          MACHINE_CREDENTIAL_ENCRYPTION_KEY: ci-machine-cred-enc-key-32-chars!!
          MQTT_URL: mqtt://localhost:1883
          PAYMENT_MOCK_ENABLED: "true"
          PAYMENT_WEBHOOK_BASE_URL: http://localhost:3000
          BOOTSTRAP_ADMIN_PASSWORD: AdminPassword123!

      - name: Wait for Service API
        timeout-minutes: 2
        run: |
          echo "Waiting for Service API..."
          RETRIES=60
          until curl -s -f http://localhost:3000/api/health > /dev/null 2>&1; do
            printf '.'
            sleep 2
            RETRIES=$((RETRIES-1))
            if [ $RETRIES -le 0 ]; then
              echo " Timeout!"
              cat service-api.log
              exit 1
            fi
          done
          echo " Ready!"

      - name: Start Admin UI Dev Server
        working-directory: apps/admin-ui
        run: pnpm dev > ../../admin-ui.log 2>&1 &

      - name: Wait for Admin UI
        timeout-minutes: 2
        run: |
          echo "Waiting for Admin UI..."
          RETRIES=60
          until curl -s -f http://localhost:5173 > /dev/null 2>&1; do
            printf '.'
            sleep 2
            RETRIES=$((RETRIES-1))
            if [ $RETRIES -le 0 ]; then
              echo " Timeout!"
              cat admin-ui.log
              exit 1
            fi
          done
          echo " Ready!"

      - name: Verify Chrome Browser
        run: google-chrome --version

      - name: Run E2E Tests
        working-directory: apps/admin-ui
        run: pnpm test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin-ui/playwright-report/
          retention-days: 7

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            service-api.log
            admin-ui.log
          retention-days: 3

  rust-tests:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust Format
        run: cargo fmt --all -- --check

      - name: Rust Check core and daemon
        run: cargo check -p vending-core -p vending-daemon --all-targets

      - name: Rust Check Tauri shell
        run: cargo check -p machine --lib

      - name: Rust Tests core and daemon
        run: cargo test -p vending-core -p vending-daemon --all-targets

  windows-service-check:
    name: Windows Service Compile
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Windows service wrapper
        run: cargo check -p vending-daemon --target x86_64-pc-windows-msvc
