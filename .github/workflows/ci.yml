name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      machine_runtime_screenshot_scenarios:
        description: "Optional comma-separated Machine Runtime Console screenshot scenario ids. Empty runs all included scenarios."
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      vending_daemon_rust: ${{ steps.filter.outputs.vending_daemon_rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - '.github/workflows/ci.yml'
              - 'packages/**'
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'tools/**'
              - 'scripts/factory/**'
              - 'scripts/windows/**'
              - 'scripts/check-factory-manifest.test.mjs'
              - 'scripts/check-windows-oobe-registry.test.mjs'
              - 'public/factory-manifest-v1.schema.json'
              - '.github/workflows/build-factory-iso.yml'
              - '.github/workflows/build-windows-runtime-artifacts.yml'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'oxlint.config.ts'
              - 'oxfmt.config.ts'
            vending_daemon_rust:
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  static:
    name: Static Checks
    runs-on: ubuntu-24.04
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-typify
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Factory Media Test Toolchain
        run: |
          docker build \
            --file scripts/factory/Dockerfile \
            --tag vem-factory-media-test:${{ github.sha }} \
            .

      - name: Load Factory Manifest Runtime Dependency Without Host node_modules
        run: |
          docker run --rm --network none --read-only --tmpfs /tmp \
            --mount type=bind,src="$GITHUB_WORKSPACE/scripts",dst=/workspace/repo/scripts,readonly \
            --mount type=bind,src="$GITHUB_WORKSPACE/public",dst=/workspace/repo/public,readonly \
            vem-factory-media-test:${{ github.sha }} \
            node --input-type=module --eval 'import("/workspace/repo/scripts/factory/factory-manifest.mjs")'

      - name: Run Factory Host Docker Lifecycle Contract
        run: >
          node --test --test-name-pattern
          "does not remove a real Docker name collision without current Factory labels"
          scripts/check-factory-manifest.test.mjs

      - name: Run Factory Media Contract Tests In Builder
        run: |
          docker run --rm \
            --env CI=true \
            --env HOME=/tmp \
            --env VEM_FACTORY_TEST_SKIP_HOST_DOCKER_LIFECYCLE=1 \
            --user "$(id -u):$(id -g)" \
            --mount type=bind,src="$GITHUB_WORKSPACE",dst=/workspace \
            --workdir /workspace \
            vem-factory-media-test:${{ github.sha }} \
            sh -lc '
              export VEM_FACTORY_TEST_UDF_EXTRACTOR=/usr/bin/7z
              export VEM_FACTORY_TEST_UDF_WRITER=/usr/bin/genisoimage
              export VEM_FACTORY_TEST_WIMLIB=/usr/bin/wimlib-imagex
              export VEM_FACTORY_TEST_XORRISO=/usr/bin/xorriso
              export VEM_FACTORY_TEST_UDF_WRITER_DIGEST="sha256:$(sha256sum /usr/bin/genisoimage | awk "{print \$1}")"
              pnpm check:factory-manifest
            '

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Static Checks
        run: node tools/check-ci.mjs --job static

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Unit Tests
        run: node tools/check-ci.mjs --job unit

  maintenance-relay-privileged:
    name: Maintenance Relay Privileged Kernel Test
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Run required WireGuard and nftables test
        run: pnpm --filter maintenance-relay test:privileged

  windows-dpapi-tests:
    name: Windows DPAPI Secret Store
    needs: changes
    if: needs.changes.outputs.vending_daemon_rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run protected secret store DPAPI round-trip
        run: cargo test -p vending-daemon secret::tests::protected_local_secret_store_round_trips_status_and_clear_without_exposing_values -- --exact

  windows-vision-release-installer:
    name: Windows Vision Release Installer
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    # This compatibility harness uses Windows certificate-store cmdlets. Keep it
    # on the known-good image instead of the moving windows-latest label.
    runs-on: windows-2022
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Factory personalization behavior checks
        run: node --test scripts/check-windows-factory-maintenance.test.mjs

      - name: Run Vision installer behavioral checks
        run: pnpm check:vision-release-installer

      - name: Run Vision installer harness behavior checks
        timeout-minutes: 3
        run: ./scripts/windows/vision-release-install-harness.behavior.ps1

      - name: Run Vision Candidate entrypoint harness with Windows PowerShell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File
          ./scripts/windows/test-vision-candidate.windows-harness.ps1

      - name: Run signed Vision installer harness
        run: >-
          ./scripts/windows/vision-release-install.windows-harness.ps1
          -InstallerPath ./scripts/windows/install-vision-release.ps1
          -CorePowerShellPaths pwsh,powershell.exe

  machine-e2e-tests:
    name: Machine UI Daemon E2E
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Machine UI daemon E2E tests
        run: node tools/check-ci.mjs --job machine-e2e

      - name: Upload Machine Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: machine-playwright-report
          path: apps/machine/playwright-report/
          retention-days: 7

  machine-runtime-screenshots:
    name: Machine Runtime Screenshot Artifacts
    needs: [static]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Verify Chrome Browser
        run: google-chrome --version

      - name: Capture Machine Runtime Console screenshots
        run: pnpm -F machine test:e2e:screenshots
        env:
          VEM_MACHINE_RUNTIME_SCREENSHOT_SCENARIOS: ${{ inputs.machine_runtime_screenshot_scenarios || '' }}

      - name: Stitch Machine Runtime Console overview
        run: pnpm -F machine screenshots:runtime:stitch

      - name: Upload Machine Runtime Console screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: machine-runtime-screenshot-artifacts
          path: apps/machine/runtime-screenshot-artifacts/
          if-no-files-found: error
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run E2E Tests
        run: node tools/check-ci.mjs --job admin-e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin-ui/playwright-report/
          retention-days: 7

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            service-api.log
            admin-ui.log
          retention-days: 3

  admin-contract-e2e-tests:
    name: Admin Contract E2E
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Production readiness candidate check for Admin API Contract browser flows.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Admin Contract E2E Tests
        run: node tools/check-ci.mjs --job admin-contract-e2e

      - name: Upload Admin Contract Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-contract-playwright-artifacts
          path: apps/admin-ui/test-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Admin Contract Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-contract-ci-logs
          path: |
            admin-contract-service-api.log
            admin-contract-admin-ui.log
          if-no-files-found: error
          retention-days: 3

  rust-tests:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js and restore pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Rust Tests
        run: node tools/check-ci.mjs --job rust

  windows-service-check:
    name: Windows Service Compile
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check Windows service wrapper
        run: cargo check -p vending-daemon --target x86_64-pc-windows-msvc

      - name: Test Windows OOBE registry preservation
        run: node --test scripts/check-windows-oobe-registry.test.mjs

  timing-summary:
    name: CI Timing Summary
    needs:
      - changes
      - static
      - unit-tests
      - maintenance-relay-privileged
      - windows-dpapi-tests
      - windows-vision-release-installer
      - machine-e2e-tests
      - machine-runtime-screenshots
      - e2e-tests
      - admin-contract-e2e-tests
      - rust-tests
      - windows-service-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize job queue, run, and cache timing
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );

            const millisecondsBetween = (start, end) => {
              if (!start || !end) return null;
              return Date.parse(end) - Date.parse(start);
            };
            const formatDuration = (milliseconds) => {
              if (milliseconds === null || milliseconds < 0) return "-";
              const totalSeconds = Math.round(milliseconds / 1000);
              const minutes = Math.floor(totalSeconds / 60);
              const seconds = totalSeconds % 60;
              return minutes ? `${minutes}m ${seconds}s` : `${seconds}s`;
            };
            const jobTimings = jobs.map((job) => ({
              name: job.name,
              conclusion: job.conclusion ?? job.status,
              queueMilliseconds: millisecondsBetween(job.created_at, job.started_at),
              runMilliseconds: millisecondsBetween(job.started_at, job.completed_at),
              cacheSteps: (job.steps ?? [])
                .filter((step) => /cache/i.test(step.name))
                .map((step) => ({
                  name: step.name,
                  conclusion: step.conclusion ?? step.status,
                  runMilliseconds: millisecondsBetween(step.started_at, step.completed_at),
                })),
            }));
            const completedAt = jobs
              .map((job) => job.completed_at)
              .filter(Boolean)
              .sort()
              .at(-1);
            const createdAt = jobs
              .map((job) => job.created_at)
              .filter(Boolean)
              .sort()
              .at(0);
            const cacheSteps = jobTimings.flatMap((job) =>
              job.cacheSteps.map((step) => ({ job: job.name, ...step })),
            );

            await core.summary
              .addHeading("CI timing summary")
              .addRaw(
                `Observed workflow elapsed time: ${formatDuration(millisecondsBetween(createdAt, completedAt))}.`,
              )
              .addTable([
                [
                  { data: "Job", header: true },
                  { data: "Conclusion", header: true },
                  { data: "Queue", header: true },
                  { data: "Run", header: true },
                ],
                ...jobTimings.map((job) => [
                  job.name,
                  job.conclusion,
                  formatDuration(job.queueMilliseconds),
                  formatDuration(job.runMilliseconds),
                ]),
              ])
              .addHeading("Cache step timing")
              .addTable([
                [
                  { data: "Job", header: true },
                  { data: "Cache step", header: true },
                  { data: "Conclusion", header: true },
                  { data: "Run", header: true },
                ],
                ...cacheSteps.map((step) => [
                  step.job,
                  step.name,
                  step.conclusion,
                  formatDuration(step.runMilliseconds),
                ]),
              ])
              .write();

            require("node:fs").writeFileSync(
              "ci-timing-summary.json",
              JSON.stringify(
                {
                  workflowElapsedMilliseconds: millisecondsBetween(createdAt, completedAt),
                  jobs: jobTimings,
                },
                null,
                2,
              ),
            );

      - name: Upload CI timing summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-timing-summary
          path: ci-timing-summary.json
          if-no-files-found: error
          retention-days: 14
