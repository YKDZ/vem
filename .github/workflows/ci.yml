name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      machine_runtime_screenshot_scenarios:
        description: "Optional comma-separated Machine Runtime Console screenshot scenario ids. Empty runs all included scenarios."
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      vending_daemon_rust: ${{ steps.filter.outputs.vending_daemon_rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - '.github/workflows/ci.yml'
              - 'packages/**'
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'tools/**'
              - 'scripts/factory/**'
              - 'scripts/windows/**'
              - 'scripts/check-factory-manifest.test.mjs'
              - 'public/factory-manifest-v1.schema.json'
              - '.github/workflows/build-factory-iso.yml'
              - '.github/workflows/build-windows-runtime-artifacts.yml'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'oxlint.config.ts'
              - 'oxfmt.config.ts'
            vending_daemon_rust:
              - 'apps/vending-daemon/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  static:
    name: Static Checks
    runs-on: ubuntu-24.04
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-typify
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Factory Media Fixture Tools
        run: |
          sudo apt-get update
          apt-cache policy genisoimage=9:1.1.11-3.5 7zip xorriso
          apt-cache show genisoimage=9:1.1.11-3.5 >/dev/null
          apt-cache show 7zip=23.01+dfsg-11 >/dev/null
          apt-cache show xorriso=1:1.5.6-1.1ubuntu3 >/dev/null
          sudo apt-get install -y --no-install-recommends \
            genisoimage=9:1.1.11-3.5 \
            7zip=23.01+dfsg-11 \
            xorriso=1:1.5.6-1.1ubuntu3 \
            osslsigncode \
            gcc-mingw-w64-x86-64 \
            wimtools=1.14.4-1.1build2

      - name: Run Factory Media Contract Tests
        env:
          VEM_FACTORY_TEST_UDF_WRITER_DIGEST: sha256:9bacc5951ca0767701cfd8e6b47537f199977e51a6e943f4edfdcf9d639d99d2
        run: pnpm check:factory-manifest

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Static Checks
        run: node tools/check-ci.mjs --job static

  unit-tests:
    name: Unit Tests
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Unit Tests
        run: node tools/check-ci.mjs --job unit

  maintenance-relay-privileged:
    name: Maintenance Relay Privileged Kernel Test
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Run required WireGuard and nftables test
        run: pnpm --filter maintenance-relay test:privileged

  windows-dpapi-tests:
    name: Windows DPAPI Secret Store
    needs: changes
    if: needs.changes.outputs.vending_daemon_rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run protected secret store DPAPI round-trip
        run: cargo test -p vending-daemon secret::tests::protected_local_secret_store_round_trips_status_and_clear_without_exposing_values -- --exact

  windows-vision-release-installer:
    name: Windows Vision Release Installer
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    # This compatibility harness uses Windows certificate-store cmdlets. Keep it
    # on the known-good image instead of the moving windows-latest label.
    runs-on: windows-2022
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Vision installer behavioral checks
        run: pnpm check:vision-release-installer

      - name: Run signed Vision installer harness
        run: >-
          ./scripts/windows/vision-release-install.windows-harness.ps1
          -InstallerPath ./scripts/windows/install-vision-release.ps1

  machine-e2e-tests:
    name: Machine UI Daemon E2E
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Machine UI daemon E2E tests
        run: node tools/check-ci.mjs --job machine-e2e

      - name: Upload Machine Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: machine-playwright-report
          path: apps/machine/playwright-report/
          retention-days: 7

  machine-runtime-screenshots:
    name: Machine Runtime Screenshot Artifacts
    needs: [static]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Verify Chrome Browser
        run: google-chrome --version

      - name: Capture Machine Runtime Console screenshots
        run: pnpm -F machine test:e2e:screenshots
        env:
          VEM_MACHINE_RUNTIME_SCREENSHOT_SCENARIOS: ${{ inputs.machine_runtime_screenshot_scenarios || '' }}

      - name: Stitch Machine Runtime Console overview
        run: pnpm -F machine screenshots:runtime:stitch

      - name: Upload Machine Runtime Console screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: machine-runtime-screenshot-artifacts
          path: apps/machine/runtime-screenshot-artifacts/
          if-no-files-found: error
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run E2E Tests
        run: node tools/check-ci.mjs --job admin-e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin-ui/playwright-report/
          retention-days: 7

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            service-api.log
            admin-ui.log
          retention-days: 3

  admin-contract-e2e-tests:
    name: Admin Contract E2E
    needs: [changes, static]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Production readiness candidate check for Admin API Contract browser flows.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Admin Contract E2E Tests
        run: node tools/check-ci.mjs --job admin-contract-e2e

      - name: Upload Admin Contract Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-contract-playwright-artifacts
          path: apps/admin-ui/test-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Admin Contract Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-contract-ci-logs
          path: |
            admin-contract-service-api.log
            admin-contract-admin-ui.log
          if-no-files-found: error
          retention-days: 3

  rust-tests:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Run Rust Tests
        run: node tools/check-ci.mjs --job rust

  windows-service-check:
    name: Windows Service Compile
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check Windows service wrapper
        run: cargo check -p vending-daemon --target x86_64-pc-windows-msvc
